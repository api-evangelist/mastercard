naftiko: 1.0.0-alpha2
info:
  label: Mastercard Account to Account Commerce for Creditor Service Providers — Agreement
  description: 'Mastercard Account to Account Commerce for Creditor Service Providers — Agreement. 2 operations. Lead operation:
    Mastercard Agreement Request Status Retrieval Request.. Self-contained Naftiko capability covering one Mastercard business
    surface.'
  tags:
  - Mastercard
  - Agreement
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-to-account-commerce-for-creditor-service-providers-agreement
    baseUri: https://mtf.services.mastercard.com/zapp/pbarfp/csp
    description: Mastercard Account to Account Commerce for Creditor Service Providers — Agreement business capability. Self-contained,
      no shared references.
    resources:
    - name: agreements-agreement_id-status-retrievals
      path: /agreements/{agreement_id}/status-retrievals
      operations:
      - name: retrieveagreementstatus
        method: POST
        description: Mastercard Agreement Request Status Retrieval Request.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: agreements-agreement_id-updates
      path: /agreements/{agreement_id}/updates
      operations:
      - name: updateagreement
        method: POST
        description: Mastercard Update Agreement.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: account-to-account-commerce-for-creditor-service-providers-agreement-rest
    port: 8080
    description: REST adapter for Mastercard Account to Account Commerce for Creditor Service Providers — Agreement. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/agreements/{agreement-id}/status-retrievals
      name: agreements-agreement-id-status-retrievals
      description: REST surface for agreements-agreement_id-status-retrievals.
      operations:
      - method: POST
        name: retrieveagreementstatus
        description: Mastercard Agreement Request Status Retrieval Request.
        call: account-to-account-commerce-for-creditor-service-providers-agreement.retrieveagreementstatus
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/agreements/{agreement-id}/updates
      name: agreements-agreement-id-updates
      description: REST surface for agreements-agreement_id-updates.
      operations:
      - method: POST
        name: updateagreement
        description: Mastercard Update Agreement.
        call: account-to-account-commerce-for-creditor-service-providers-agreement.updateagreement
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-to-account-commerce-for-creditor-service-providers-agreement-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Account to Account Commerce for Creditor Service Providers — Agreement. One tool
      per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: mastercard-agreement-request-status-retrieval
      description: Mastercard Agreement Request Status Retrieval Request.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-to-account-commerce-for-creditor-service-providers-agreement.retrieveagreementstatus
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: mastercard-update-agreement
      description: Mastercard Update Agreement.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-to-account-commerce-for-creditor-service-providers-agreement.updateagreement
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

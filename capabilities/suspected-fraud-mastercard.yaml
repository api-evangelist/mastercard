    port: 9090
    transport: http
    description: MCP adapter for Mastercard Suspected Fraud — Mastercard. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: add-new-suspected-fraud-record
      description: Add a New Suspected Fraud Record Using Minimal Input Parameters for Mastercard Built Transactions.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: suspected-fraud-mastercard.submitsuspectedfraud
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: change-existing-suspected-fraud-record
      description: Change an Existing Suspected Fraud Record Using Minimal Input Parameters for Mastercard Built Transactions.

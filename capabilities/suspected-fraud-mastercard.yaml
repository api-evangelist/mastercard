    namespace: suspected-fraud-mastercard-rest
    port: 8080
    description: REST adapter for Mastercard Suspected Fraud — Mastercard. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/mastercard-frauds
      name: mastercard-frauds
      description: REST surface for mastercard-frauds.
      operations:
      - method: POST
        name: submitsuspectedfraud
        description: Add a New Suspected Fraud Record Using Minimal Input Parameters for Mastercard Built Transactions.
        call: suspected-fraud-mastercard.submitsuspectedfraud
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesuspectedfraud
        description: Change an Existing Suspected Fraud Record Using Minimal Input Parameters for Mastercard Built Transactions.
        call: suspected-fraud-mastercard.updatesuspectedfraud
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp

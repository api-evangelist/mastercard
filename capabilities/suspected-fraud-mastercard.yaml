    baseUri: https://api.mastercard.com/fld/suspected-frauds
    description: Mastercard Suspected Fraud — Mastercard business capability. Self-contained, no shared references.
    resources:
    - name: mastercard-frauds
      path: /mastercard-frauds
      operations:
      - name: submitsuspectedfraud
        method: POST
        description: Add a New Suspected Fraud Record Using Minimal Input Parameters for Mastercard Built Transactions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: updatesuspectedfraud
        method: PUT
        description: Change an Existing Suspected Fraud Record Using Minimal Input Parameters for Mastercard Built Transactions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:

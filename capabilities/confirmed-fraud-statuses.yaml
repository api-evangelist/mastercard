naftiko: 1.0.0-alpha2
info:
  label: Mastercard Confirmed Fraud — Statuses
  description: 'Mastercard Confirmed Fraud — Statuses. 1 operations. Lead operation: Get Status of an Existing Fraud Record
    for Both Mastercard and Issuer Built Transactions.. Self-contained Naftiko capability covering one Mastercard business
    surface.'
  tags:
  - Mastercard
  - Statuses
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: confirmed-fraud-statuses
    baseUri: https://api.mastercard.com/fld/confirmed-frauds
    description: Mastercard Confirmed Fraud — Statuses business capability. Self-contained, no shared references.
    resources:
    - name: fraud-statuses-icas-ica
      path: /fraud-statuses/icas/{ica}
      operations:
      - name: fraudrequeststatus
        method: GET
        description: Get Status of an Existing Fraud Record for Both Mastercard and Issuer Built Transactions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: confirmed-fraud-statuses-rest
    port: 8080
    description: REST adapter for Mastercard Confirmed Fraud — Statuses. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/fraud-statuses/icas/{ica}
      name: fraud-statuses-icas-ica
      description: REST surface for fraud-statuses-icas-ica.
      operations:
      - method: GET
        name: fraudrequeststatus
        description: Get Status of an Existing Fraud Record for Both Mastercard and Issuer Built Transactions.
        call: confirmed-fraud-statuses.fraudrequeststatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confirmed-fraud-statuses-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Confirmed Fraud — Statuses. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-status-existing-fraud-record
      description: Get Status of an Existing Fraud Record for Both Mastercard and Issuer Built Transactions.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: confirmed-fraud-statuses.fraudrequeststatus
      outputParameters:
      - type: object
        mapping: $.

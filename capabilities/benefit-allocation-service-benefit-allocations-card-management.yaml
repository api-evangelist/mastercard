naftiko: 1.0.0-alpha2
info:
  label: Mastercard Benefit Allocation Service API — Benefit-Allocations-Card-Management
  description: 'Mastercard Benefit Allocation Service API — Benefit-Allocations-Card-Management. 2 operations. Lead operation:
    Mastercard Replace Card Number for a Cardholder. Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Benefit-Allocations-Card-Management
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: benefit-allocation-service-benefit-allocations-card-management
    baseUri: https://sandbox.api.mastercard.com/loyalty/benefits
    description: Mastercard Benefit Allocation Service API — Benefit-Allocations-Card-Management business capability. Self-contained,
      no shared references.
    resources:
    - name: cards
      path: /cards
      operations:
      - name: cardreplacement
        method: POST
        description: Mastercard Replace Card Number for a Cardholder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: freezeunfreeze
        method: PUT
        description: Mastercard Freeze/unfreeze a Card for Benefits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: benefit-allocation-service-benefit-allocations-card-management-rest
    port: 8080
    description: REST adapter for Mastercard Benefit Allocation Service API — Benefit-Allocations-Card-Management. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/cards
      name: cards
      description: REST surface for cards.
      operations:
      - method: POST
        name: cardreplacement
        description: Mastercard Replace Card Number for a Cardholder
        call: benefit-allocation-service-benefit-allocations-card-management.cardreplacement
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: freezeunfreeze
        description: Mastercard Freeze/unfreeze a Card for Benefits
        call: benefit-allocation-service-benefit-allocations-card-management.freezeunfreeze
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: benefit-allocation-service-benefit-allocations-card-management-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Benefit Allocation Service API — Benefit-Allocations-Card-Management. One tool
      per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: mastercard-replace-card-number-cardholder
      description: Mastercard Replace Card Number for a Cardholder
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: benefit-allocation-service-benefit-allocations-card-management.cardreplacement
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: mastercard-freeze-unfreeze-card-benefits
      description: Mastercard Freeze/unfreeze a Card for Benefits
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: benefit-allocation-service-benefit-allocations-card-management.freezeunfreeze
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

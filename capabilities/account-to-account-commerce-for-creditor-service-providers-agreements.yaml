naftiko: 1.0.0-alpha2
info:
  label: Mastercard Account to Account Commerce for Creditor Service Providers — Agreements
  description: 'Mastercard Account to Account Commerce for Creditor Service Providers — Agreements. 1 operations. Lead operation:
    Mastercard Agreement Creation.. Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Agreements
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-to-account-commerce-for-creditor-service-providers-agreements
    baseUri: https://mtf.services.mastercard.com/zapp/pbarfp/csp
    description: Mastercard Account to Account Commerce for Creditor Service Providers — Agreements business capability. Self-contained,
      no shared references.
    resources:
    - name: agreements
      path: /agreements
      operations:
      - name: createagreement
        method: POST
        description: Mastercard Agreement Creation.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: account-to-account-commerce-for-creditor-service-providers-agreements-rest
    port: 8080
    description: REST adapter for Mastercard Account to Account Commerce for Creditor Service Providers — Agreements. One
      Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/agreements
      name: agreements
      description: REST surface for agreements.
      operations:
      - method: POST
        name: createagreement
        description: Mastercard Agreement Creation.
        call: account-to-account-commerce-for-creditor-service-providers-agreements.createagreement
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-to-account-commerce-for-creditor-service-providers-agreements-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Account to Account Commerce for Creditor Service Providers — Agreements. One tool
      per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: mastercard-agreement-creation
      description: Mastercard Agreement Creation.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-to-account-commerce-for-creditor-service-providers-agreements.createagreement
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

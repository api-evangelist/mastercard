naftiko: 1.0.0-alpha2
info:
  label: Mastercard Unified Checkout Solutions — Srci
  description: 'Mastercard Unified Checkout Solutions — Srci. 2 operations. Lead operation: Mastercard Update Dpa Data. Self-contained
    Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Srci
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: unified-checkout-solutions-srci
    baseUri: https://sandbox.api.mastercard.com/srci/onboarding
    description: Mastercard Unified Checkout Solutions — Srci business capability. Self-contained, no shared references.
    resources:
    - name: org-organization_id-dpas-srci_dpa_id
      path: /org/{organization_id}/dpas/{srci_dpa_id}
      operations:
      - name: updatemerchant
        method: PUT
        description: Mastercard Update Dpa Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletemerchant
        method: DELETE
        description: Mastercard Delete Merchant From Customer's Organization Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: unified-checkout-solutions-srci-rest
    port: 8080
    description: REST adapter for Mastercard Unified Checkout Solutions — Srci. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/org/{organization-id}/dpas/{srci-dpa-id}
      name: org-organization-id-dpas-srci-dpa-id
      description: REST surface for org-organization_id-dpas-srci_dpa_id.
      operations:
      - method: PUT
        name: updatemerchant
        description: Mastercard Update Dpa Data
        call: unified-checkout-solutions-srci.updatemerchant
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletemerchant
        description: Mastercard Delete Merchant From Customer's Organization Id.
        call: unified-checkout-solutions-srci.deletemerchant
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: unified-checkout-solutions-srci-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Unified Checkout Solutions — Srci. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: mastercard-update-dpa-data
      description: Mastercard Update Dpa Data
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: unified-checkout-solutions-srci.updatemerchant
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: mastercard-delete-merchant-customer-s-organization
      description: Mastercard Delete Merchant From Customer's Organization Id.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: unified-checkout-solutions-srci.deletemerchant
      outputParameters:
      - type: object
        mapping: $.

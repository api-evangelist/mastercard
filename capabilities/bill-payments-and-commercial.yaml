naftiko: 1.0.0-alpha2
info:
  label: Mastercard Bill Payments and Commercial
  description: Unified workflow for treasury teams and accounts payable to manage bill payments, business payment controls,
    virtual cards, commercial event notifications, and installment plans.
  tags:
  - Mastercard
  - Bill Payments
  - Commercial
  - Treasury
  - Business Payments
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
    MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY
capability:
  consumes:
  - type: http
    namespace: bill-pay
    baseUri: https://api.mastercard.com/bill-pay
    description: Mastercard Bill Pay API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: billers
      path: /billers
      description: Biller management
      operations:
      - name: search-billers
        method: POST
        description: Search for billers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            search: '{{tools.search}}'
      - name: get-biller
        method: GET
        description: Get biller details
        inputParameters:
        - name: biller_id
          in: path
          type: string
          required: true
          description: Biller identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: bill-payment-validator
    baseUri: https://api.mastercard.com/bill-payment-validator
    description: Mastercard Bill Payment Validator API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: validations
      path: /validations
      description: Bill payment validation
      operations:
      - name: validate-payment
        method: POST
        description: Validate a bill payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            payment: '{{tools.payment}}'
  - type: http
    namespace: business-payment-controls
    baseUri: https://api.mastercard.com/business-payment-controls
    description: Mastercard Business Payment Controls API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: controls
      path: /controls
      description: Payment control management
      operations:
      - name: create-control
        method: POST
        description: Create a spending control rule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            control: '{{tools.control}}'
      - name: list-controls
        method: GET
        description: List spending control rules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: in-control-commercial
    baseUri: https://api.mastercard.com/in-control/commercial
    description: Mastercard In Control for Commercial Payments API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: virtual-cards
      path: /virtual-cards
      description: Virtual card management
      operations:
      - name: create-virtual-card
        method: POST
        description: Create a virtual card
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            card: '{{tools.card}}'
  - type: http
    namespace: commercial-notifications
    baseUri: https://api.mastercard.com/commercial/notifications
    description: Mastercard Commercial Event Notifications API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: notifications
      path: /notifications
      description: Event notification management
      operations:
      - name: get-notifications
        method: GET
        description: Retrieve commercial event notifications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8087
    namespace: bill-commercial-api
    description: Unified REST API for bill payments and commercial payment workflows.
    resources:
    - path: /v1/billers
      name: billers
      description: Biller management
      operations:
      - method: POST
        name: search-billers
        description: Search for billers
        call: bill-pay.search-billers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payment-validations
      name: payment-validations
      description: Bill payment validation
      operations:
      - method: POST
        name: validate-payment
        description: Validate a bill payment
        call: bill-payment-validator.validate-payment
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/spending-controls
      name: spending-controls
      description: Business spending controls
      operations:
      - method: POST
        name: create-spending-control
        description: Create a spending control rule
        call: business-payment-controls.create-control
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/virtual-cards
      name: virtual-cards
      description: Virtual card management
      operations:
      - method: POST
        name: create-virtual-card
        description: Create a virtual card
        call: in-control-commercial.create-virtual-card
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9097
    namespace: bill-commercial-mcp
    transport: http
    description: MCP server for AI-assisted bill payment and commercial operations.
    tools:
    - name: search-billers
      description: Search for billers in the RPPS network
      hints:
        readOnly: true
      call: bill-pay.search-billers
      outputParameters:
      - type: object
        mapping: $.
    - name: get-biller-details
      description: Get biller details
      hints:
        readOnly: true
      call: bill-pay.get-biller
      with:
        biller_id: tools.biller_id
      outputParameters:
      - type: object
        mapping: $.
    - name: validate-bill-payment
      description: Validate a bill payment before processing
      hints:
        readOnly: true
      call: bill-payment-validator.validate-payment
      outputParameters:
      - type: object
        mapping: $.
    - name: create-spending-control
      description: Create a business spending control rule
      hints:
        readOnly: false
      call: business-payment-controls.create-control
      outputParameters:
      - type: object
        mapping: $.
    - name: list-spending-controls
      description: List business spending control rules
      hints:
        readOnly: true
      call: business-payment-controls.list-controls
      outputParameters:
      - type: object
        mapping: $.
    - name: create-virtual-card
      description: Create a virtual card for commercial payments
      hints:
        readOnly: false
      call: in-control-commercial.create-virtual-card
      outputParameters:
      - type: object
        mapping: $.
    - name: get-commercial-notifications
      description: Retrieve commercial event notifications
      hints:
        readOnly: true
      call: commercial-notifications.get-notifications
      outputParameters:
      - type: object
        mapping: $.

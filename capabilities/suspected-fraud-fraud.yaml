naftiko: 1.0.0-alpha2
info:
  label: Mastercard Suspected Fraud — Fraud
  description: 'Mastercard Suspected Fraud — Fraud. 2 operations. Lead operation: Mastercard Confirm, Delete or Mark Record
    as Not Fraud for an Existing Suspected Fraud Record.. Self-contained Naftiko capability covering one Mastercard business
    surface.'
  tags:
  - Mastercard
  - Fraud
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: suspected-fraud-fraud
    baseUri: https://api.mastercard.com/fld/suspected-frauds
    description: Mastercard Suspected Fraud — Fraud business capability. Self-contained, no shared references.
    resources:
    - name: fraud-states
      path: /fraud-states
      operations:
      - name: fraudstate
        method: PUT
        description: Mastercard Confirm, Delete or Mark Record as Not Fraud for an Existing Suspected Fraud Record.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: fraud-statuses-icas-ica
      path: /fraud-statuses/icas/{ica}
      operations:
      - name: fraudrequeststatus
        method: GET
        description: Get Status of an Existing Suspected Fraud Record for Mastercard Built Transactions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: suspected-fraud-fraud-rest
    port: 8080
    description: REST adapter for Mastercard Suspected Fraud — Fraud. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/fraud-states
      name: fraud-states
      description: REST surface for fraud-states.
      operations:
      - method: PUT
        name: fraudstate
        description: Mastercard Confirm, Delete or Mark Record as Not Fraud for an Existing Suspected Fraud Record.
        call: suspected-fraud-fraud.fraudstate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fraud-statuses/icas/{ica}
      name: fraud-statuses-icas-ica
      description: REST surface for fraud-statuses-icas-ica.
      operations:
      - method: GET
        name: fraudrequeststatus
        description: Get Status of an Existing Suspected Fraud Record for Mastercard Built Transactions.
        call: suspected-fraud-fraud.fraudrequeststatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: suspected-fraud-fraud-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Suspected Fraud — Fraud. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mastercard-confirm-delete-mark-record
      description: Mastercard Confirm, Delete or Mark Record as Not Fraud for an Existing Suspected Fraud Record.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: suspected-fraud-fraud.fraudstate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-status-existing-suspected-fraud
      description: Get Status of an Existing Suspected Fraud Record for Mastercard Built Transactions.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: suspected-fraud-fraud.fraudrequeststatus
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Mastercard Carbon Calculator Experience API — Dashboards
  description: 'Mastercard Carbon Calculator Experience API — Dashboards. 1 operations. Lead operation: Mastercard Used to
    Retrieve the Short-lived Url of a User''s Dashboard to View Their Carbon Footprints and Contributions to Priceless Planet..
    Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Dashboards
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: carbon-calculator-experience-dashboards
    baseUri: https://api.mastercard.com/cts
    description: Mastercard Carbon Calculator Experience API — Dashboards business capability. Self-contained, no shared references.
    resources:
    - name: issuers-users-userid-dashboards
      path: /issuers/users/{userid}/dashboards
      operations:
      - name: getauthtoken
        method: GET
        description: Mastercard Used to Retrieve the Short-lived Url of a User's Dashboard to View Their Carbon Footprints
          and Contributions to Priceless Planet.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: carbon-calculator-experience-dashboards-rest
    port: 8080
    description: REST adapter for Mastercard Carbon Calculator Experience API — Dashboards. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/issuers/users/{userid}/dashboards
      name: issuers-users-userid-dashboards
      description: REST surface for issuers-users-userid-dashboards.
      operations:
      - method: GET
        name: getauthtoken
        description: Mastercard Used to Retrieve the Short-lived Url of a User's Dashboard to View Their Carbon Footprints
          and Contributions to Priceless Planet.
        call: carbon-calculator-experience-dashboards.getauthtoken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: carbon-calculator-experience-dashboards-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Carbon Calculator Experience API — Dashboards. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: mastercard-used-retrieve-short-lived
      description: Mastercard Used to Retrieve the Short-lived Url of a User's Dashboard to View Their Carbon Footprints and
        Contributions to Priceless Planet.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: carbon-calculator-experience-dashboards.getauthtoken
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Mastercard Community Pass Payment APIs — Callbacks
  description: 'Mastercard Community Pass Payment APIs — Callbacks. 1 operations. Lead operation: Mastercard Callbacks Api.
    Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Callbacks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: community-pass-payment-apis-callbacks
    baseUri: https://api.mastercard.com/community-pass/payments
    description: Mastercard Community Pass Payment APIs — Callbacks business capability. Self-contained, no shared references.
    resources:
    - name: callbacks
      path: /callbacks
      operations:
      - name: callback
        method: POST
        description: Mastercard Callbacks Api
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: community-pass-payment-apis-callbacks-rest
    port: 8080
    description: REST adapter for Mastercard Community Pass Payment APIs — Callbacks. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/callbacks
      name: callbacks
      description: REST surface for callbacks.
      operations:
      - method: POST
        name: callback
        description: Mastercard Callbacks Api
        call: community-pass-payment-apis-callbacks.callback
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: community-pass-payment-apis-callbacks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Community Pass Payment APIs — Callbacks. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: mastercard-callbacks-api
      description: Mastercard Callbacks Api
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: community-pass-payment-apis-callbacks.callback
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Mastercard Loyalty and Offers
  description: Unified workflow for loyalty managers and marketing teams to manage loyalty programs, personalized offers,
    rewards, benefits, and the Priceless experiences platform.
  tags:
  - Mastercard
  - Loyalty
  - Offers
  - Rewards
  - Priceless
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
    MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY
capability:
  consumes:
  - type: http
    namespace: loyalty-promotions
    baseUri: https://api.mastercard.com/loyalty/promotions
    description: Mastercard Loyalty Promotions API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: promotions
      path: /promotions
      description: Loyalty promotion management
      operations:
      - name: list-promotions
        method: GET
        description: List available loyalty promotions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: enroll-promotion
        method: POST
        description: Enroll a cardholder in a promotion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            enrollment: '{{tools.enrollment}}'
  - type: http
    namespace: loyalty-user-mgmt
    baseUri: https://api.mastercard.com/loyalty/users
    description: Mastercard Loyalty User Management API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: users
      path: /users
      description: Loyalty user management
      operations:
      - name: create-user
        method: POST
        description: Create a loyalty program user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            user: '{{tools.user}}'
      - name: get-user
        method: GET
        description: Get loyalty user details
        inputParameters:
        - name: user_id
          in: path
          type: string
          required: true
          description: User identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: loyalty-insurance
    baseUri: https://api.mastercard.com/loyalty/insurance
    description: Mastercard Loyalty Insurance API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: claims
      path: /claims
      description: Insurance claim operations
      operations:
      - name: submit-claim
        method: POST
        description: Submit an insurance claim
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            claim: '{{tools.claim}}'
  - type: http
    namespace: personalized-offers
    baseUri: https://api.mastercard.com/personalized-offers
    description: Mastercard Personalized Offers API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: offers
      path: /offers
      description: Personalized offer operations
      operations:
      - name: get-offers
        method: POST
        description: Get personalized offers for a cardholder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            cardholder: '{{tools.cardholder}}'
      - name: activate-offer
        method: POST
        description: Activate an offer for a cardholder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            activation: '{{tools.activation}}'
  - type: http
    namespace: offers-merchant-content
    baseUri: https://api.mastercard.com/offers/merchant-content
    description: Mastercard Offers Merchant Content API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: content
      path: /content
      description: Merchant offer content
      operations:
      - name: get-merchant-content
        method: GET
        description: Get merchant offer content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: priceless-platform
    baseUri: https://api.mastercard.com/priceless
    description: Mastercard Priceless Platform API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: experiences
      path: /experiences
      description: Priceless experience management
      operations:
      - name: list-experiences
        method: GET
        description: List available Priceless experiences
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: benefit-eligibility
    baseUri: https://api.mastercard.com/eligibility
    description: Mastercard Benefit Eligibility Service API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: eligibility
      path: /eligibility
      description: Benefit eligibility checks
      operations:
      - name: check-eligibility
        method: POST
        description: Check cardholder benefit eligibility
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            card: '{{tools.card}}'
  - type: http
    namespace: benefit-allocation
    baseUri: https://api.mastercard.com/benefit-allocation
    description: Mastercard Benefit Allocation Service API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: allocations
      path: /allocations
      description: Benefit allocation operations
      operations:
      - name: allocate-benefit
        method: POST
        description: Allocate a benefit to a cardholder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            allocation: '{{tools.allocation}}'
  - type: http
    namespace: pay-with-rewards
    baseUri: https://api.mastercard.com/pay-with-rewards
    description: Mastercard Pay with Rewards API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: rewards
      path: /rewards
      description: Rewards payment operations
      operations:
      - name: pay-with-rewards
        method: POST
        description: Apply rewards as payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            payment: '{{tools.payment}}'
  - type: http
    namespace: donate
    baseUri: https://api.mastercard.com/donate
    description: Mastercard Donate API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: donations
      path: /donations
      description: Donation operations
      operations:
      - name: create-donation
        method: POST
        description: Create a donation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            donation: '{{tools.donation}}'
  - type: http
    namespace: points-activity
    baseUri: https://api.mastercard.com/loyalty/points
    description: Mastercard Points Activity Service API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: points
      path: /points
      description: Points activity operations
      operations:
      - name: get-points-balance
        method: GET
        description: Get loyalty points balance
        inputParameters:
        - name: account_id
          in: path
          type: string
          required: true
          description: Account identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8085
    namespace: loyalty-offers-api
    description: Unified REST API for Mastercard loyalty and offers workflows.
    resources:
    - path: /v1/promotions
      name: promotions
      description: Loyalty promotions
      operations:
      - method: GET
        name: list-promotions
        description: List available loyalty promotions
        call: loyalty-promotions.list-promotions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/offers
      name: offers
      description: Personalized offers
      operations:
      - method: POST
        name: get-personalized-offers
        description: Get personalized offers for a cardholder
        call: personalized-offers.get-offers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/experiences
      name: experiences
      description: Priceless experiences
      operations:
      - method: GET
        name: list-experiences
        description: List Priceless experiences
        call: priceless-platform.list-experiences
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eligibility
      name: eligibility
      description: Benefit eligibility checks
      operations:
      - method: POST
        name: check-eligibility
        description: Check cardholder benefit eligibility
        call: benefit-eligibility.check-eligibility
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9095
    namespace: loyalty-offers-mcp
    transport: http
    description: MCP server for AI-assisted loyalty and offers management.
    tools:
    - name: list-promotions
      description: List available loyalty promotions
      hints:
        readOnly: true
      call: loyalty-promotions.list-promotions
      outputParameters:
      - type: object
        mapping: $.
    - name: enroll-in-promotion
      description: Enroll a cardholder in a loyalty promotion
      hints:
        readOnly: false
      call: loyalty-promotions.enroll-promotion
      outputParameters:
      - type: object
        mapping: $.
    - name: create-loyalty-user
      description: Create a loyalty program user
      hints:
        readOnly: false
      call: loyalty-user-mgmt.create-user
      outputParameters:
      - type: object
        mapping: $.
    - name: get-loyalty-user
      description: Get loyalty user details
      hints:
        readOnly: true
      call: loyalty-user-mgmt.get-user
      with:
        user_id: tools.user_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-personalized-offers
      description: Get personalized merchant offers for a cardholder
      hints:
        readOnly: true
      call: personalized-offers.get-offers
      outputParameters:
      - type: object
        mapping: $.
    - name: activate-offer
      description: Activate an offer for a cardholder
      hints:
        readOnly: false
      call: personalized-offers.activate-offer
      outputParameters:
      - type: object
        mapping: $.
    - name: check-benefit-eligibility
      description: Check cardholder benefit eligibility by PAN
      hints:
        readOnly: true
      call: benefit-eligibility.check-eligibility
      outputParameters:
      - type: object
        mapping: $.
    - name: allocate-benefit
      description: Allocate a benefit to a cardholder
      hints:
        readOnly: false
      call: benefit-allocation.allocate-benefit
      outputParameters:
      - type: object
        mapping: $.
    - name: pay-with-rewards
      description: Apply loyalty rewards as payment
      hints:
        readOnly: false
      call: pay-with-rewards.pay-with-rewards
      outputParameters:
      - type: object
        mapping: $.
    - name: get-points-balance
      description: Get loyalty points balance
      hints:
        readOnly: true
      call: points-activity.get-points-balance
      with:
        account_id: tools.account_id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-priceless-experiences
      description: List available Priceless experiences
      hints:
        readOnly: true
      call: priceless-platform.list-experiences
      outputParameters:
      - type: object
        mapping: $.
    - name: submit-insurance-claim
      description: Submit a loyalty insurance claim
      hints:
        readOnly: false
      call: loyalty-insurance.submit-claim
      outputParameters:
      - type: object
        mapping: $.
    - name: create-donation
      description: Create a charitable donation
      hints:
        readOnly: false
      call: donate.create-donation
      outputParameters:
      - type: object
        mapping: $.
    - name: get-merchant-offer-content
      description: Get merchant offer content and promotional materials
      hints:
        readOnly: true
      call: offers-merchant-content.get-merchant-content
      outputParameters:
      - type: object
        mapping: $.

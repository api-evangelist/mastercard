naftiko: 1.0.0-alpha2
info:
  label: Mastercard Merchant Locations — Countries
  description: 'Mastercard Merchant Locations — Countries. 2 operations. Lead operation: Mastercard Get a List of Countries.
    Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Countries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: merchant-locations-countries
    baseUri: https://api.mastercard.com/locations/merchants
    description: Mastercard Merchant Locations — Countries business capability. Self-contained, no shared references.
    resources:
    - name: countries
      path: /countries
      operations:
      - name: getcountries
        method: GET
        description: Mastercard Get a List of Countries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: country-subdivisions
      path: /country-subdivisions
      operations:
      - name: getcountrysubdivisions
        method: GET
        description: Mastercard Get a List of Country Subdivisions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: merchant-locations-countries-rest
    port: 8080
    description: REST adapter for Mastercard Merchant Locations — Countries. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/countries
      name: countries
      description: REST surface for countries.
      operations:
      - method: GET
        name: getcountries
        description: Mastercard Get a List of Countries
        call: merchant-locations-countries.getcountries
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/country-subdivisions
      name: country-subdivisions
      description: REST surface for country-subdivisions.
      operations:
      - method: GET
        name: getcountrysubdivisions
        description: Mastercard Get a List of Country Subdivisions
        call: merchant-locations-countries.getcountrysubdivisions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: merchant-locations-countries-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Merchant Locations — Countries. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: mastercard-get-list-countries
      description: Mastercard Get a List of Countries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: merchant-locations-countries.getcountries
      outputParameters:
      - type: object
        mapping: $.
    - name: mastercard-get-list-country-subdivisions
      description: Mastercard Get a List of Country Subdivisions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: merchant-locations-countries.getcountrysubdivisions
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Mastercard Standard Currency Conversion Calculator — Rates
  description: 'Mastercard Standard Currency Conversion Calculator — Rates. 2 operations. Lead operation: Mastercard Get the
    Currency Conversion Rate Details.. Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Rates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: standard-currency-conversion-calculator-rates
    baseUri: https://sandbox.api.mastercard.com/settlement/currencyrate
    description: Mastercard Standard Currency Conversion Calculator — Rates business capability. Self-contained, no shared
      references.
    resources:
    - name: conversion-rate
      path: /conversion-rate
      operations:
      - name: getconversiondetailusingget
        method: GET
        description: Mastercard Get the Currency Conversion Rate Details.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fxDate
          in: query
          type: string
          description: Date of the requested FX rates.
          required: true
        - name: transCurr
          in: query
          type: string
          description: Currency of the transaction.
          required: true
        - name: crdhldBillCurr
          in: query
          type: string
          description: Cardholder billing currency.
          required: true
        - name: bankFee
          in: query
          type: number
          description: Additional fees imposed by the bank.
        - name: transAmt
          in: query
          type: number
          description: Amount in the transaction currency.
          required: true
    - name: conversion-rate-issued
      path: /conversion-rate-issued
      operations:
      - name: israteissuedusingget
        method: GET
        description: Mastercard Determine if the Settlement Rate Has Been Issued.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: date
          in: query
          type: string
          description: The date by which the rate would have been issued.
  exposes:
  - type: rest
    namespace: standard-currency-conversion-calculator-rates-rest
    port: 8080
    description: REST adapter for Mastercard Standard Currency Conversion Calculator — Rates. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/conversion-rate
      name: conversion-rate
      description: REST surface for conversion-rate.
      operations:
      - method: GET
        name: getconversiondetailusingget
        description: Mastercard Get the Currency Conversion Rate Details.
        call: standard-currency-conversion-calculator-rates.getconversiondetailusingget
        with:
          fxDate: rest.fxDate
          transCurr: rest.transCurr
          crdhldBillCurr: rest.crdhldBillCurr
          bankFee: rest.bankFee
          transAmt: rest.transAmt
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/conversion-rate-issued
      name: conversion-rate-issued
      description: REST surface for conversion-rate-issued.
      operations:
      - method: GET
        name: israteissuedusingget
        description: Mastercard Determine if the Settlement Rate Has Been Issued.
        call: standard-currency-conversion-calculator-rates.israteissuedusingget
        with:
          date: rest.date
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: standard-currency-conversion-calculator-rates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Standard Currency Conversion Calculator — Rates. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: mastercard-get-currency-conversion-rate
      description: Mastercard Get the Currency Conversion Rate Details.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: standard-currency-conversion-calculator-rates.getconversiondetailusingget
      with:
        fxDate: tools.fxDate
        transCurr: tools.transCurr
        crdhldBillCurr: tools.crdhldBillCurr
        bankFee: tools.bankFee
        transAmt: tools.transAmt
      outputParameters:
      - type: object
        mapping: $.
    - name: mastercard-determine-if-settlement-rate
      description: Mastercard Determine if the Settlement Rate Has Been Issued.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: standard-currency-conversion-calculator-rates.israteissuedusingget
      with:
        date: tools.date
      outputParameters:
      - type: object
        mapping: $.

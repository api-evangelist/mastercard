naftiko: 1.0.0-alpha2
info:
  label: Mastercard Merchant Locations — Searches
  description: 'Mastercard Merchant Locations — Searches. 1 operations. Lead operation: Mastercard Get a List of Merchant
    Details. Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Searches
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: merchant-locations-searches
    baseUri: https://api.mastercard.com/locations/merchants
    description: Mastercard Merchant Locations — Searches business capability. Self-contained, no shared references.
    resources:
    - name: searches
      path: /searches
      operations:
      - name: getmerchants
        method: POST
        description: Mastercard Get a List of Merchant Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: merchant-locations-searches-rest
    port: 8080
    description: REST adapter for Mastercard Merchant Locations — Searches. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/searches
      name: searches
      description: REST surface for searches.
      operations:
      - method: POST
        name: getmerchants
        description: Mastercard Get a List of Merchant Details
        call: merchant-locations-searches.getmerchants
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: merchant-locations-searches-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Merchant Locations — Searches. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: mastercard-get-list-merchant-details
      description: Mastercard Get a List of Merchant Details
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: merchant-locations-searches.getmerchants
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

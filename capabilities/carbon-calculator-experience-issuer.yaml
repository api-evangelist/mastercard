        name: updateissuer
        description: Mastercard Allows Issuer to Update the Issuer Details to the Carbon Calculator Experience Platform.
        call: carbon-calculator-experience-issuer.updateissuer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/issuers/user-deletions
      name: issuers-user-deletions
      description: REST surface for issuers-user-deletions.
      operations:
      - method: POST
        name: deleteusers
        description: Mastercard Delete One or More Users.
        call: carbon-calculator-experience-issuer.deleteusers
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/issuers/users
      name: issuers-users
      description: REST surface for issuers-users.
      operations:
      - method: POST
        name: userregistration
        description: Mastercard Allows Issuer to Enroll Cardholders to the Carbon Calculator Experience Platform.
        call: carbon-calculator-experience-issuer.userregistration
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/issuers/users/{userid}
      name: issuers-users-userid
      description: REST surface for issuers-users-userid.
      operations:
      - method: PUT
        name: updateuser
        description: Mastercard Allows Issuer to Update Enrolled User Information Onto Carbon Calculator Experience Platform.
        call: carbon-calculator-experience-issuer.updateuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/issuers/users/{userid}/aggregate-carbon-scores
      name: issuers-users-userid-aggregate-carbon-scores
      description: REST surface for issuers-users-userid-aggregate-carbon-scores.
      operations:
      - method: GET
        name: getaggregatecarbonscore
        description: Mastercard Fetches Monthly Aggregate Carbon Score for the Transactions Made for the Current Month.
        call: carbon-calculator-experience-issuer.getaggregatecarbonscore
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/issuers/users/{userid}/dashboards
      name: issuers-users-userid-dashboards
      description: REST surface for issuers-users-userid-dashboards.
      operations:
      - method: GET
        name: getauthtoken
        description: Mastercard Used to Retrieve the Short-lived Url of a User's Dashboard to View Their Carbon Footprints
          and Contributions to Priceless Planet.
        call: carbon-calculator-experience-issuer.getauthtoken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: carbon-calculator-experience-issuer-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Carbon Calculator Experience API — Issuer. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: mastercard-fetches-issuer-details

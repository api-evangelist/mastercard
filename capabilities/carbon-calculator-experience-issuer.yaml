naftiko: 1.0.0-alpha2
info:
  label: Mastercard Carbon Calculator Experience API — Issuer
  description: 'Mastercard Carbon Calculator Experience API — Issuer. 7 operations. Lead operation: Mastercard Fetches the
    Issuer Details.. Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Issuer
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: carbon-calculator-experience-issuer
    baseUri: https://api.mastercard.com/cts
    description: Mastercard Carbon Calculator Experience API — Issuer business capability. Self-contained, no shared references.
    resources:
    - name: issuers
      path: /issuers
      operations:
      - name: getissuer
        method: GET
        description: Mastercard Fetches the Issuer Details.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateissuer
        method: PUT
        description: Mastercard Allows Issuer to Update the Issuer Details to the Carbon Calculator Experience Platform.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: issuers-user-deletions
      path: /issuers/user-deletions
      operations:
      - name: deleteusers
        method: POST
        description: Mastercard Delete One or More Users.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: issuers-users
      path: /issuers/users
      operations:
      - name: userregistration
        method: POST
        description: Mastercard Allows Issuer to Enroll Cardholders to the Carbon Calculator Experience Platform.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: issuers-users-userid
      path: /issuers/users/{userid}
      operations:
      - name: updateuser
        method: PUT
        description: Mastercard Allows Issuer to Update Enrolled User Information Onto Carbon Calculator Experience Platform.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: issuers-users-userid-aggregate-carbon-scores
      path: /issuers/users/{userid}/aggregate-carbon-scores
      operations:
      - name: getaggregatecarbonscore
        method: GET
        description: Mastercard Fetches Monthly Aggregate Carbon Score for the Transactions Made for the Current Month.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: issuers-users-userid-dashboards
      path: /issuers/users/{userid}/dashboards
      operations:
      - name: getauthtoken
        method: GET
        description: Mastercard Used to Retrieve the Short-lived Url of a User's Dashboard to View Their Carbon Footprints
          and Contributions to Priceless Planet.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: carbon-calculator-experience-issuer-rest
    port: 8080
    description: REST adapter for Mastercard Carbon Calculator Experience API — Issuer. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/issuers
      name: issuers
      description: REST surface for issuers.
      operations:
      - method: GET
        name: getissuer
        description: Mastercard Fetches the Issuer Details.
        call: carbon-calculator-experience-issuer.getissuer
        outputParameters:
        - type: object
          mapping: $.

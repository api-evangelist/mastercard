naftiko: 1.0.0-alpha2
info:
  label: Mastercard Automatic Billing Updater API — Inquiries
  description: 'Mastercard Automatic Billing Updater API — Inquiries. 2 operations. Lead operation: Mastercard Inquiry Request
    for an Update on an Account.. Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Inquiries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: automatic-billing-updater-inquiries
    baseUri: https://api.mastercard.com/abu/accounts
    description: Mastercard Automatic Billing Updater API — Inquiries business capability. Self-contained, no shared references.
    resources:
    - name: inquiries
      path: /inquiries
      operations:
      - name: accountinquiry
        method: POST
        description: Mastercard Inquiry Request for an Update on an Account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: subscription-inquiries
      path: /subscription-inquiries
      operations:
      - name: subscriptioninquiry
        method: POST
        description: Mastercard Inquire on a Subscription to Determine if an Account Is Already Being Watched or Not.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: automatic-billing-updater-inquiries-rest
    port: 8080
    description: REST adapter for Mastercard Automatic Billing Updater API — Inquiries. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/inquiries
      name: inquiries
      description: REST surface for inquiries.
      operations:
      - method: POST
        name: accountinquiry
        description: Mastercard Inquiry Request for an Update on an Account.
        call: automatic-billing-updater-inquiries.accountinquiry
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscription-inquiries
      name: subscription-inquiries
      description: REST surface for subscription-inquiries.
      operations:
      - method: POST
        name: subscriptioninquiry
        description: Mastercard Inquire on a Subscription to Determine if an Account Is Already Being Watched or Not.
        call: automatic-billing-updater-inquiries.subscriptioninquiry
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: automatic-billing-updater-inquiries-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Automatic Billing Updater API — Inquiries. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: mastercard-inquiry-request-update-account
      description: Mastercard Inquiry Request for an Update on an Account.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: automatic-billing-updater-inquiries.accountinquiry
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: mastercard-inquire-subscription-determine-if
      description: Mastercard Inquire on a Subscription to Determine if an Account Is Already Being Watched or Not.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: automatic-billing-updater-inquiries.subscriptioninquiry
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

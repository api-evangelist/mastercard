naftiko: 1.0.0-alpha2
info:
  label: Mastercard Identity and Authentication
  description: Unified workflow for identity managers and compliance teams to verify identities, manage authentication consent,
    and leverage identity intelligence for fraud prevention across Mastercard's identity services.
  tags:
  - Mastercard
  - Identity
  - Authentication
  - Verification
  - KYC
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
    MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY
capability:
  consumes:
  - type: http
    namespace: id-verification
    baseUri: https://api.mastercard.com/id/verification
    description: Mastercard ID Verification API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: verifications
      path: /verifications
      description: Identity verification operations
      operations:
      - name: verify-identity
        method: POST
        description: Verify a consumer identity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            identity: '{{tools.identity}}'
  - type: http
    namespace: id-trust-providers
    baseUri: https://api.mastercard.com/id/trust-providers
    description: Mastercard ID for Trust Providers API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: trust-services
      path: /trust-services
      description: Trust provider operations
      operations:
      - name: submit-verification
        method: POST
        description: Submit identity verification as a trust provider
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            verification: '{{tools.verification}}'
  - type: http
    namespace: id-identity-providers
    baseUri: https://api.mastercard.com/id/identity-providers
    description: Mastercard ID for Identity Providers API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: identity-services
      path: /identity-services
      description: Identity provider operations
      operations:
      - name: provide-identity
        method: POST
        description: Provide identity data as an identity provider
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            identity: '{{tools.identity}}'
  - type: http
    namespace: authentication-consent
    baseUri: https://api.mastercard.com/authentication/consent
    description: Mastercard Authentication Consent API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: consents
      path: /consents
      description: Consent management
      operations:
      - name: create-consent
        method: POST
        description: Create an authentication consent request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            consent: '{{tools.consent}}'
      - name: get-consent
        method: GET
        description: Retrieve consent status
        inputParameters:
        - name: consent_id
          in: path
          type: string
          required: true
          description: Consent identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: authentication-facilitator
    baseUri: https://api.mastercard.com/authentication/facilitator
    description: Mastercard Authentication Facilitator API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: authentications
      path: /authentications
      description: Authentication facilitation
      operations:
      - name: initiate-authentication
        method: POST
        description: Initiate a strong customer authentication
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            authentication: '{{tools.authentication}}'
  - type: http
    namespace: identity-insights-accounts
    baseUri: https://api.mastercard.com/idinsights/accounts
    description: Mastercard Identity Insights for Accounts API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: account-insights
      path: /insights
      description: Account identity insights
      operations:
      - name: get-account-insights
        method: POST
        description: Get identity insights for an account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            account: '{{tools.account}}'
  - type: http
    namespace: identity-insights-transactions
    baseUri: https://api.mastercard.com/idinsights/transactions
    description: Mastercard Identity Insights for Transactions API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: transaction-insights
      path: /insights
      description: Transaction identity insights
      operations:
      - name: get-transaction-insights
        method: POST
        description: Get identity insights for a transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            transaction: '{{tools.transaction}}'
  exposes:
  - type: rest
    port: 8083
    namespace: identity-auth-api
    description: Unified REST API for Mastercard identity and authentication workflows.
    resources:
    - path: /v1/verifications
      name: verifications
      description: Identity verification
      operations:
      - method: POST
        name: verify-identity
        description: Verify a consumer identity
        call: id-verification.verify-identity
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/consents
      name: consents
      description: Authentication consent management
      operations:
      - method: POST
        name: create-consent
        description: Create authentication consent
        call: authentication-consent.create-consent
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/account-insights
      name: account-insights
      description: Identity insights for accounts
      operations:
      - method: POST
        name: get-account-insights
        description: Get identity insights for an account
        call: identity-insights-accounts.get-account-insights
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/transaction-insights
      name: transaction-insights
      description: Identity insights for transactions
      operations:
      - method: POST
        name: get-transaction-insights
        description: Get identity insights for a transaction
        call: identity-insights-transactions.get-transaction-insights
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9093
    namespace: identity-auth-mcp
    transport: http
    description: MCP server for AI-assisted identity verification and authentication.
    tools:
    - name: verify-identity
      description: Verify a consumer identity using Mastercard ID
      hints:
        readOnly: true
      call: id-verification.verify-identity
      outputParameters:
      - type: object
        mapping: $.
    - name: create-auth-consent
      description: Create an authentication consent request
      hints:
        readOnly: false
      call: authentication-consent.create-consent
      outputParameters:
      - type: object
        mapping: $.
    - name: get-consent-status
      description: Get authentication consent status
      hints:
        readOnly: true
      call: authentication-consent.get-consent
      with:
        consent_id: tools.consent_id
      outputParameters:
      - type: object
        mapping: $.
    - name: initiate-authentication
      description: Initiate strong customer authentication
      hints:
        readOnly: false
      call: authentication-facilitator.initiate-authentication
      outputParameters:
      - type: object
        mapping: $.
    - name: get-account-identity-insights
      description: Get identity intelligence insights for an account
      hints:
        readOnly: true
      call: identity-insights-accounts.get-account-insights
      outputParameters:
      - type: object
        mapping: $.
    - name: get-transaction-identity-insights
      description: Get identity intelligence insights for a transaction
      hints:
        readOnly: true
      call: identity-insights-transactions.get-transaction-insights
      outputParameters:
      - type: object
        mapping: $.
    - name: submit-trust-verification
      description: Submit identity verification as a trust provider
      hints:
        readOnly: false
      call: id-trust-providers.submit-verification
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Mastercard Confirmed Fraud — States
  description: 'Mastercard Confirmed Fraud — States. 1 operations. Lead operation: Delete an Existing Fraud Record or Confirm
    a Suspended Fraud Record for Both Mastercard and Issuer Built Transactions.. Self-contained Naftiko capability covering
    one Mastercard business surface.'
  tags:
  - Mastercard
  - States
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: confirmed-fraud-states
    baseUri: https://api.mastercard.com/fld/confirmed-frauds
    description: Mastercard Confirmed Fraud — States business capability. Self-contained, no shared references.
    resources:
    - name: fraud-states
      path: /fraud-states
      operations:
      - name: fraudstate
        method: PUT
        description: Delete an Existing Fraud Record or Confirm a Suspended Fraud Record for Both Mastercard and Issuer Built
          Transactions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: confirmed-fraud-states-rest
    port: 8080
    description: REST adapter for Mastercard Confirmed Fraud — States. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/fraud-states
      name: fraud-states
      description: REST surface for fraud-states.
      operations:
      - method: PUT
        name: fraudstate
        description: Delete an Existing Fraud Record or Confirm a Suspended Fraud Record for Both Mastercard and Issuer Built
          Transactions.
        call: confirmed-fraud-states.fraudstate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confirmed-fraud-states-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Confirmed Fraud — States. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: delete-existing-fraud-record-confirm
      description: Delete an Existing Fraud Record or Confirm a Suspended Fraud Record for Both Mastercard and Issuer Built
        Transactions.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: confirmed-fraud-states.fraudstate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

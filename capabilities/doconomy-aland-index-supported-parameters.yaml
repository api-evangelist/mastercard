naftiko: 1.0.0-alpha2
info:
  label: Mastercard Doconomy Aland Index — Supported  Parameters
  description: 'Mastercard Doconomy Aland Index — Supported  Parameters. 2 operations. Lead operation: Mastercard Provide
    Supported Currencies. Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Supported  Parameters
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: doconomy-aland-index-supported-parameters
    baseUri: https://sandbox.api.mastercard.com/doconomy
    description: Mastercard Doconomy Aland Index — Supported  Parameters business capability. Self-contained, no shared references.
    resources:
    - name: supported-currencies
      path: /supported-currencies
      operations:
      - name: getsupportedcurrencies
        method: GET
        description: Mastercard Provide Supported Currencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: supported-merchant-categories
      path: /supported-merchant-categories
      operations:
      - name: getsupportedmerchantcategories
        method: GET
        description: Mastercard Provide Supported Mccs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: doconomy-aland-index-supported-parameters-rest
    port: 8080
    description: REST adapter for Mastercard Doconomy Aland Index — Supported  Parameters. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/supported-currencies
      name: supported-currencies
      description: REST surface for supported-currencies.
      operations:
      - method: GET
        name: getsupportedcurrencies
        description: Mastercard Provide Supported Currencies
        call: doconomy-aland-index-supported-parameters.getsupportedcurrencies
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/supported-merchant-categories
      name: supported-merchant-categories
      description: REST surface for supported-merchant-categories.
      operations:
      - method: GET
        name: getsupportedmerchantcategories
        description: Mastercard Provide Supported Mccs
        call: doconomy-aland-index-supported-parameters.getsupportedmerchantcategories
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: doconomy-aland-index-supported-parameters-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Doconomy Aland Index — Supported  Parameters. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: mastercard-provide-supported-currencies
      description: Mastercard Provide Supported Currencies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: doconomy-aland-index-supported-parameters.getsupportedcurrencies
      outputParameters:
      - type: object
        mapping: $.
    - name: mastercard-provide-supported-mccs
      description: Mastercard Provide Supported Mccs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: doconomy-aland-index-supported-parameters.getsupportedmerchantcategories
      outputParameters:
      - type: object
        mapping: $.

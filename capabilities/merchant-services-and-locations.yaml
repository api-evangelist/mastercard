naftiko: 1.0.0-alpha2
info:
  label: Mastercard Merchant Services and Locations
  description: Unified workflow for merchants and acquirers to manage merchant/ATM locations, Places data, Track merchant
    search, and acquirer transaction processing.
  tags:
  - Mastercard
  - Merchant
  - Locations
  - Acquirer
  - Track
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
    MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY
capability:
  consumes:
  - type: http
    namespace: merchant-locations
    baseUri: https://api.mastercard.com/locations/merchants
    description: Mastercard Merchant Locations API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: countries
      path: /countries
      description: Country data for merchant locations
      operations:
      - name: get-countries
        method: GET
        description: Returns a list of countries with merchant locations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: searches
      path: /searches
      description: Merchant location search operations
      operations:
      - name: search-merchants
        method: POST
        description: Search for merchant locations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            location: '{{tools.location}}'
  - type: http
    namespace: atm-locations
    baseUri: https://api.mastercard.com/locations/atms
    description: Mastercard ATM Locations API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: countries
      path: /countries
      description: Country and subdivision data for ATM locations
      operations:
      - name: get-countries
        method: GET
        description: Returns a list of countries containing ATMs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-country-subdivisions
        method: GET
        description: Returns a list of country subdivisions for a given country
        inputParameters:
        - name: country_code
          in: query
          type: string
          required: true
          description: Country code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: searches
      path: /searches
      description: ATM search operations
      operations:
      - name: search-atms
        method: POST
        description: Search for ATMs by location and features
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            location: '{{tools.location}}'
  - type: http
    namespace: places
    baseUri: https://api.mastercard.com/places
    description: Mastercard Places API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: places
      path: /places
      description: Place search and data
      operations:
      - name: search-places
        method: POST
        description: Search for merchant places
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            search: '{{tools.search}}'
  - type: http
    namespace: track-search
    baseUri: https://api.mastercard.com/track/search
    description: Mastercard Track Search API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: searches
      path: /searches
      description: Track search operations
      operations:
      - name: search-merchants
        method: POST
        description: Search for merchants in Track
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            search: '{{tools.search}}'
  - type: http
    namespace: transaction-api-acquirers
    baseUri: https://api.mastercard.com/transactions/acquirers
    description: Mastercard Transaction API for Acquirers
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: transactions
      path: /transactions
      description: Acquirer transaction operations
      operations:
      - name: submit-transaction
        method: POST
        description: Submit a transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            transaction: '{{tools.transaction}}'
  exposes:
  - type: rest
    port: 8091
    namespace: merchant-services-api
    description: Unified REST API for merchant services and location data.
    resources:
    - path: /v1/merchant-locations
      name: merchant-locations
      description: Merchant location search
      operations:
      - method: POST
        name: search-merchant-locations
        description: Search for merchant locations
        call: merchant-locations.search-merchants
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/atm-locations
      name: atm-locations
      description: ATM location search
      operations:
      - method: POST
        name: search-atm-locations
        description: Search for ATM locations
        call: atm-locations.search-atms
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/places
      name: places
      description: Places location intelligence
      operations:
      - method: POST
        name: search-places
        description: Search for merchant places
        call: places.search-places
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/track-merchants
      name: track-merchants
      description: Track merchant data
      operations:
      - method: POST
        name: search-track-merchants
        description: Search for merchants in Track
        call: track-search.search-merchants
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9101
    namespace: merchant-services-mcp
    transport: http
    description: MCP server for AI-assisted merchant services and location queries.
    tools:
    - name: search-merchant-locations
      description: Search for Mastercard merchant locations
      hints:
        readOnly: true
        openWorld: true
      call: merchant-locations.search-merchants
      outputParameters:
      - type: object
        mapping: $.
    - name: list-merchant-countries
      description: List countries with merchant locations
      hints:
        readOnly: true
        idempotent: true
      call: merchant-locations.get-countries
      outputParameters:
      - type: object
        mapping: $.
    - name: search-atm-locations
      description: Search for Mastercard ATM locations
      hints:
        readOnly: true
        openWorld: true
      call: atm-locations.search-atms
      outputParameters:
      - type: object
        mapping: $.
    - name: list-atm-countries
      description: List countries with Mastercard ATMs
      hints:
        readOnly: true
        idempotent: true
      call: atm-locations.get-countries
      outputParameters:
      - type: object
        mapping: $.
    - name: search-places
      description: Search for merchant places with location intelligence
      hints:
        readOnly: true
        openWorld: true
      call: places.search-places
      outputParameters:
      - type: object
        mapping: $.
    - name: search-track-merchants
      description: Search for merchants in the Mastercard Track network
      hints:
        readOnly: true
      call: track-search.search-merchants
      outputParameters:
      - type: object
        mapping: $.
    - name: submit-acquirer-transaction
      description: Submit a transaction as an acquirer
      hints:
        readOnly: false
      call: transaction-api-acquirers.submit-transaction
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Mastercard Open Banking and Data Analytics
  description: Unified workflow for fintech developers and data analysts to access open banking data, consumer-permissioned
    financial data, and credit analytics across Mastercard's data platform.
  tags:
  - Mastercard
  - Open Banking
  - Data Analytics
  - Credit Analytics
  - Fintech
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
    MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY
capability:
  consumes:
  - type: http
    namespace: open-banking
    baseUri: https://api.mastercard.com/open-banking
    description: Mastercard Open Banking Solutions API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: accounts
      path: /accounts
      description: Open banking account operations
      operations:
      - name: get-accounts
        method: GET
        description: Retrieve consumer accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-transactions
        method: GET
        description: Retrieve account transactions
        inputParameters:
        - name: account_id
          in: path
          type: string
          required: true
          description: Account identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: consumer-credit-analytics
    baseUri: https://api.mastercard.com/credit-analytics/consumer
    description: Mastercard Consumer Credit Analytics API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: analytics
      path: /analytics
      description: Credit analytics operations
      operations:
      - name: get-credit-analytics
        method: POST
        description: Get consumer credit analytics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{{tools.query}}'
  - type: http
    namespace: small-biz-credit-analytics
    baseUri: https://api.mastercard.com/credit-analytics/small-business
    description: Mastercard Small Business Credit Analytics API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: analytics
      path: /analytics
      description: Small business credit analytics
      operations:
      - name: get-sb-credit-analytics
        method: POST
        description: Get small business credit analytics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{{tools.query}}'
  exposes:
  - type: rest
    port: 8086
    namespace: open-banking-data-api
    description: Unified REST API for open banking and data analytics.
    resources:
    - path: /v1/accounts
      name: accounts
      description: Open banking account data
      operations:
      - method: GET
        name: get-accounts
        description: Retrieve consumer accounts
        call: open-banking.get-accounts
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/consumer-analytics
      name: consumer-analytics
      description: Consumer credit analytics
      operations:
      - method: POST
        name: get-consumer-analytics
        description: Get consumer credit analytics
        call: consumer-credit-analytics.get-credit-analytics
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/small-business-analytics
      name: small-business-analytics
      description: Small business credit analytics
      operations:
      - method: POST
        name: get-small-business-analytics
        description: Get small business credit analytics
        call: small-biz-credit-analytics.get-sb-credit-analytics
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9096
    namespace: open-banking-data-mcp
    transport: http
    description: MCP server for AI-assisted open banking and data analytics.
    tools:
    - name: get-consumer-accounts
      description: Retrieve consumer accounts via open banking
      hints:
        readOnly: true
      call: open-banking.get-accounts
      outputParameters:
      - type: object
        mapping: $.
    - name: get-account-transactions
      description: Retrieve account transactions via open banking
      hints:
        readOnly: true
      call: open-banking.get-transactions
      with:
        account_id: tools.account_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-consumer-credit-analytics
      description: Get consumer credit analytics and spending insights
      hints:
        readOnly: true
      call: consumer-credit-analytics.get-credit-analytics
      outputParameters:
      - type: object
        mapping: $.
    - name: get-small-business-credit-analytics
      description: Get small business credit analytics
      hints:
        readOnly: true
      call: small-biz-credit-analytics.get-sb-credit-analytics
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Mastercard Carbon Calculator Experience API — Deletions
  description: 'Mastercard Carbon Calculator Experience API — Deletions. 1 operations. Lead operation: Mastercard Delete One
    or More Users.. Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Deletions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: carbon-calculator-experience-deletions
    baseUri: https://api.mastercard.com/cts
    description: Mastercard Carbon Calculator Experience API — Deletions business capability. Self-contained, no shared references.
    resources:
    - name: issuers-user-deletions
      path: /issuers/user-deletions
      operations:
      - name: deleteusers
        method: POST
        description: Mastercard Delete One or More Users.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: carbon-calculator-experience-deletions-rest
    port: 8080
    description: REST adapter for Mastercard Carbon Calculator Experience API — Deletions. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/issuers/user-deletions
      name: issuers-user-deletions
      description: REST surface for issuers-user-deletions.
      operations:
      - method: POST
        name: deleteusers
        description: Mastercard Delete One or More Users.
        call: carbon-calculator-experience-deletions.deleteusers
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: carbon-calculator-experience-deletions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Carbon Calculator Experience API — Deletions. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: mastercard-delete-one-more-users
      description: Mastercard Delete One or More Users.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: carbon-calculator-experience-deletions.deleteusers
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Mastercard Unified Checkout Solutions — Organization
  description: 'Mastercard Unified Checkout Solutions — Organization. 3 operations. Lead operation: Mastercard Store Dpa Bulk
    Load Data. Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Organization
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: unified-checkout-solutions-organization
    baseUri: https://sandbox.api.mastercard.com/srci/onboarding
    description: Mastercard Unified Checkout Solutions — Organization business capability. Self-contained, no shared references.
    resources:
    - name: org-organization_id-dpas-batch
      path: /org/{organization_id}/dpas/batch
      operations:
      - name: uploadmerchants
        method: POST
        description: Mastercard Store Dpa Bulk Load Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: org-organization_id-dpas-srci_dpa_id
      path: /org/{organization_id}/dpas/{srci_dpa_id}
      operations:
      - name: updatemerchant
        method: PUT
        description: Mastercard Update Dpa Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletemerchant
        method: DELETE
        description: Mastercard Delete Merchant From Customer's Organization Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: unified-checkout-solutions-organization-rest
    port: 8080
    description: REST adapter for Mastercard Unified Checkout Solutions — Organization. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/org/{organization-id}/dpas/batch
      name: org-organization-id-dpas-batch
      description: REST surface for org-organization_id-dpas-batch.
      operations:
      - method: POST
        name: uploadmerchants
        description: Mastercard Store Dpa Bulk Load Data
        call: unified-checkout-solutions-organization.uploadmerchants
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/org/{organization-id}/dpas/{srci-dpa-id}
      name: org-organization-id-dpas-srci-dpa-id
      description: REST surface for org-organization_id-dpas-srci_dpa_id.
      operations:
      - method: PUT
        name: updatemerchant
        description: Mastercard Update Dpa Data
        call: unified-checkout-solutions-organization.updatemerchant
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletemerchant
        description: Mastercard Delete Merchant From Customer's Organization Id.
        call: unified-checkout-solutions-organization.deletemerchant
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: unified-checkout-solutions-organization-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Unified Checkout Solutions — Organization. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: mastercard-store-dpa-bulk-load
      description: Mastercard Store Dpa Bulk Load Data
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: unified-checkout-solutions-organization.uploadmerchants
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: mastercard-update-dpa-data
      description: Mastercard Update Dpa Data
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: unified-checkout-solutions-organization.updatemerchant
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: mastercard-delete-merchant-customer-s-organization
      description: Mastercard Delete Merchant From Customer's Organization Id.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: unified-checkout-solutions-organization.deletemerchant
      outputParameters:
      - type: object
        mapping: $.

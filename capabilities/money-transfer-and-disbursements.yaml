naftiko: 1.0.0-alpha2
info:
  label: Mastercard Money Transfer and Disbursements
  description: Unified workflow for fintech developers and payment processors to manage real-time money transfers, P2P payments,
    disbursements, and cross-border services through Mastercard Send and related APIs.
  tags:
  - Mastercard
  - Money Transfer
  - Disbursements
  - Cross-Border
  - Mastercard Send
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
    MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY
capability:
  consumes:
  - type: http
    namespace: send-funding
    baseUri: https://api.mastercard.com/send/v1/partners
    description: Mastercard Send Funding API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: funding
      path: /funding
      description: Funding transactions
      operations:
      - name: create-funding
        method: POST
        description: Create a funding transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            funding: '{{tools.funding}}'
      - name: get-funding-status
        method: GET
        description: Get funding transaction status
        inputParameters:
        - name: transfer_id
          in: path
          type: string
          required: true
          description: Transfer identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: send-p2p
    baseUri: https://api.mastercard.com/send/v1/partners
    description: Mastercard Send Person to Person API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: transfers
      path: /transfers
      description: P2P transfer operations
      operations:
      - name: create-p2p-transfer
        method: POST
        description: Create a person-to-person transfer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            transfer: '{{tools.transfer}}'
  - type: http
    namespace: send-disbursements
    baseUri: https://api.mastercard.com/send/v1/partners
    description: Mastercard Send Disbursements API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: disbursements
      path: /disbursements
      description: Disbursement operations
      operations:
      - name: create-disbursement
        method: POST
        description: Create a disbursement transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            disbursement: '{{tools.disbursement}}'
  - type: http
    namespace: send-account-info
    baseUri: https://api.mastercard.com/send/v1/partners
    description: Mastercard Send Account Information Service API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: accounts
      path: /accounts
      description: Account information
      operations:
      - name: get-account-info
        method: POST
        description: Retrieve account information for a Send recipient
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            account: '{{tools.account}}'
  - type: http
    namespace: send-account-verification
    baseUri: https://api.mastercard.com/send/v1/partners
    description: Mastercard Send Account Verification Service API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: verifications
      path: /verifications
      description: Account verification
      operations:
      - name: verify-account
        method: POST
        description: Verify an account for Send eligibility
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            account: '{{tools.account}}'
  - type: http
    namespace: cross-border
    baseUri: https://api.mastercard.com/cross-border
    description: Mastercard Cross-Border Services API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: payments
      path: /payments
      description: Cross-border payment operations
      operations:
      - name: create-payment
        method: POST
        description: Create a cross-border payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            payment: '{{tools.payment}}'
      - name: get-payment-status
        method: GET
        description: Get cross-border payment status
        inputParameters:
        - name: payment_id
          in: path
          type: string
          required: true
          description: Payment identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: direct-services
    baseUri: https://api.mastercard.com/direct-services
    description: Mastercard Direct Services API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: transactions
      path: /transactions
      description: Direct service transactions
      operations:
      - name: process-transaction
        method: POST
        description: Process a direct service transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            transaction: '{{tools.transaction}}'
  - type: http
    namespace: account-validation
    baseUri: https://api.mastercard.com/account-validation
    description: Mastercard Account Validation API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: validations
      path: /validations
      description: Account validation operations
      operations:
      - name: validate-account
        method: POST
        description: Validate an account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            account: '{{tools.account}}'
  - type: http
    namespace: currency-conversion
    baseUri: https://api.mastercard.com/settlement/currencyrate
    description: Mastercard Currency Conversion API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: rates
      path: /rates
      description: Currency conversion rates
      operations:
      - name: get-conversion-rate
        method: GET
        description: Get currency conversion rate
        inputParameters:
        - name: fxDate
          in: query
          type: string
          required: true
          description: Date for the conversion rate
        - name: transCurr
          in: query
          type: string
          required: true
          description: Transaction currency
        - name: crdhldBillCurr
          in: query
          type: string
          required: true
          description: Cardholder billing currency
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8081
    namespace: money-transfer-api
    description: Unified REST API for Mastercard money transfer and disbursement workflows.
    resources:
    - path: /v1/funding
      name: funding
      description: Funding transactions
      operations:
      - method: POST
        name: create-funding
        description: Create a funding transaction
        call: send-funding.create-funding
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/transfers
      name: transfers
      description: P2P transfers
      operations:
      - method: POST
        name: create-p2p-transfer
        description: Create a person-to-person transfer
        call: send-p2p.create-p2p-transfer
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/disbursements
      name: disbursements
      description: Disbursement transactions
      operations:
      - method: POST
        name: create-disbursement
        description: Create a disbursement
        call: send-disbursements.create-disbursement
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cross-border-payments
      name: cross-border-payments
      description: Cross-border payment processing
      operations:
      - method: POST
        name: create-cross-border-payment
        description: Create a cross-border payment
        call: cross-border.create-payment
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/conversion-rates
      name: conversion-rates
      description: Currency conversion rates
      operations:
      - method: GET
        name: get-conversion-rate
        description: Get currency conversion rate
        call: currency-conversion.get-conversion-rate
        with:
          fxDate: rest.fxDate
          transCurr: rest.transCurr
          crdhldBillCurr: rest.crdhldBillCurr
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: money-transfer-mcp
    transport: http
    description: MCP server for AI-assisted money transfer and disbursement operations.
    tools:
    - name: create-funding
      description: Create a funding transaction via Mastercard Send
      hints:
        readOnly: false
      call: send-funding.create-funding
      outputParameters:
      - type: object
        mapping: $.
    - name: create-p2p-transfer
      description: Create a person-to-person money transfer
      hints:
        readOnly: false
      call: send-p2p.create-p2p-transfer
      outputParameters:
      - type: object
        mapping: $.
    - name: create-disbursement
      description: Create a disbursement to send money to a recipient
      hints:
        readOnly: false
      call: send-disbursements.create-disbursement
      outputParameters:
      - type: object
        mapping: $.
    - name: verify-send-account
      description: Verify account eligibility for Mastercard Send
      hints:
        readOnly: true
      call: send-account-verification.verify-account
      outputParameters:
      - type: object
        mapping: $.
    - name: get-account-info
      description: Get account information for a Send recipient
      hints:
        readOnly: true
      call: send-account-info.get-account-info
      outputParameters:
      - type: object
        mapping: $.
    - name: validate-account
      description: Validate account details before transfer
      hints:
        readOnly: true
      call: account-validation.validate-account
      outputParameters:
      - type: object
        mapping: $.
    - name: create-cross-border-payment
      description: Create a cross-border international payment
      hints:
        readOnly: false
      call: cross-border.create-payment
      outputParameters:
      - type: object
        mapping: $.
    - name: get-conversion-rate
      description: Get currency conversion rate for cross-border transactions
      hints:
        readOnly: true
        idempotent: true
      call: currency-conversion.get-conversion-rate
      with:
        fxDate: tools.fxDate
        transCurr: tools.transCurr
        crdhldBillCurr: tools.crdhldBillCurr
      outputParameters:
      - type: object
        mapping: $.
    - name: process-direct-transaction
      description: Process a direct service transaction
      hints:
        readOnly: false
      call: direct-services.process-transaction
      outputParameters:
      - type: object
        mapping: $.

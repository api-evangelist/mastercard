naftiko: 1.0.0-alpha2
info:
  label: Mastercard Community Pass Payment APIs — Validations
  description: 'Mastercard Community Pass Payment APIs — Validations. 1 operations. Lead operation: Mastercard Validations
    Api. Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Validations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: community-pass-payment-apis-validations
    baseUri: https://api.mastercard.com/community-pass/payments
    description: Mastercard Community Pass Payment APIs — Validations business capability. Self-contained, no shared references.
    resources:
    - name: validations
      path: /validations
      operations:
      - name: validation
        method: POST
        description: Mastercard Validations Api
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: community-pass-payment-apis-validations-rest
    port: 8080
    description: REST adapter for Mastercard Community Pass Payment APIs — Validations. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/validations
      name: validations
      description: REST surface for validations.
      operations:
      - method: POST
        name: validation
        description: Mastercard Validations Api
        call: community-pass-payment-apis-validations.validation
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: community-pass-payment-apis-validations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Community Pass Payment APIs — Validations. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: mastercard-validations-api
      description: Mastercard Validations Api
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: community-pass-payment-apis-validations.validation
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

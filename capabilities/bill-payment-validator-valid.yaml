naftiko: 1.0.0-alpha2
info:
  label: Mastercard Bill Payment Validator — Valid
  description: 'Mastercard Bill Payment Validator — Valid. 1 operations. Lead operation: Mastercard Bill Payment Validator
    Service Returns the Processing Status for a Potential Rpps Transaction. Self-contained Naftiko capability covering one
    Mastercard business surface.'
  tags:
  - Mastercard
  - Valid
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: bill-payment-validator-valid
    baseUri: https://sandbox.api.mastercard.com/billpayAPI/v1
    description: Mastercard Bill Payment Validator — Valid business capability. Self-contained, no shared references.
    resources:
    - name: isRoutingValid
      path: /isRoutingValid
      operations:
      - name: post
        method: POST
        description: Mastercard Bill Payment Validator Service Returns the Processing Status for a Potential Rpps Transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: BillPayRequest
          in: body
          type: string
          description: Contains the details of the get PAR API request message.
  exposes:
  - type: rest
    namespace: bill-payment-validator-valid-rest
    port: 8080
    description: REST adapter for Mastercard Bill Payment Validator — Valid. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/isroutingvalid
      name: isroutingvalid
      description: REST surface for isRoutingValid.
      operations:
      - method: POST
        name: post
        description: Mastercard Bill Payment Validator Service Returns the Processing Status for a Potential Rpps Transaction
        call: bill-payment-validator-valid.post
        with:
          BillPayRequest: rest.BillPayRequest
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bill-payment-validator-valid-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Bill Payment Validator — Valid. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: mastercard-bill-payment-validator-service
      description: Mastercard Bill Payment Validator Service Returns the Processing Status for a Potential Rpps Transaction
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bill-payment-validator-valid.post
      with:
        BillPayRequest: tools.BillPayRequest
      outputParameters:
      - type: object
        mapping: $.

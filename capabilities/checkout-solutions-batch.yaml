    port: 8080
    description: REST adapter for Mastercard Checkout Solutions — Batch. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/srci/{src-client-id}/dpas/batch
      name: srci-src-client-id-dpas-batch
      description: REST surface for srci-src-client-id-dpas-batch.
      operations:
      - method: POST
        name: bulkaddupdatedpa
        description: Mastercard Asynchronous - Dpa Bulk Add/update/delete
        call: checkout-solutions-batch.bulkaddupdatedpa
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/srci/{src-client-id}/dpas/batch/status/{batch-id}
      name: srci-src-client-id-dpas-batch-status-batch-id
      description: REST surface for srci-src-client-id-dpas-batch-status-batch-id.
      operations:
      - method: GET
        name: getdpabatchstatus
        description: Mastercard Get Status of the Dpa Add/update Async (batch) Job by Batch Id.
        call: checkout-solutions-batch.getdpabatchstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp

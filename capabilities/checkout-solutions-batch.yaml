  description: 'Mastercard Checkout Solutions — Batch. 2 operations. Lead operation: Mastercard Asynchronous - Dpa Bulk Add/update/delete.
    Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Batch
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:

    description: Mastercard Checkout Solutions — Batch business capability. Self-contained, no shared references.
    resources:
    - name: srci-src-client-id-dpas-batch
      path: /srci/{src-client-id}/dpas/batch
      operations:
      - name: bulkaddupdatedpa
        method: POST
        description: Mastercard Asynchronous - Dpa Bulk Add/update/delete
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: srci-src-client-id-dpas-batch-status-batch-id
      path: /srci/{src-client-id}/dpas/batch/status/{batch-id}
      operations:
      - name: getdpabatchstatus
        method: GET
        description: Mastercard Get Status of the Dpa Add/update Async (batch) Job by Batch Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.

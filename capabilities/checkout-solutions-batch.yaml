    port: 9090
    transport: http
    description: MCP adapter for Mastercard Checkout Solutions — Batch. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mastercard-asynchronous-dpa-bulk-add
      description: Mastercard Asynchronous - Dpa Bulk Add/update/delete
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkout-solutions-batch.bulkaddupdatedpa
      with:

      outputParameters:
      - type: object
        mapping: $.
    - name: mastercard-get-status-dpa-add
      description: Mastercard Get Status of the Dpa Add/update Async (batch) Job by Batch Id.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: checkout-solutions-batch.getdpabatchstatus
      outputParameters:
      - type: object
        mapping: $.

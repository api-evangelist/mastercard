naftiko: 1.0.0-alpha2
info:
  label: Mastercard Carbon Calculator Experience API — Carbon
  description: 'Mastercard Carbon Calculator Experience API — Carbon. 1 operations. Lead operation: Mastercard Fetches Monthly
    Aggregate Carbon Score for the Transactions Made for the Current Month.. Self-contained Naftiko capability covering one
    Mastercard business surface.'
  tags:
  - Mastercard
  - Carbon
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: carbon-calculator-experience-carbon
    baseUri: https://api.mastercard.com/cts
    description: Mastercard Carbon Calculator Experience API — Carbon business capability. Self-contained, no shared references.
    resources:
    - name: issuers-users-userid-aggregate-carbon-scores
      path: /issuers/users/{userid}/aggregate-carbon-scores
      operations:
      - name: getaggregatecarbonscore
        method: GET
        description: Mastercard Fetches Monthly Aggregate Carbon Score for the Transactions Made for the Current Month.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: carbon-calculator-experience-carbon-rest
    port: 8080
    description: REST adapter for Mastercard Carbon Calculator Experience API — Carbon. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/issuers/users/{userid}/aggregate-carbon-scores
      name: issuers-users-userid-aggregate-carbon-scores
      description: REST surface for issuers-users-userid-aggregate-carbon-scores.
      operations:
      - method: GET
        name: getaggregatecarbonscore
        description: Mastercard Fetches Monthly Aggregate Carbon Score for the Transactions Made for the Current Month.
        call: carbon-calculator-experience-carbon.getaggregatecarbonscore
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: carbon-calculator-experience-carbon-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Carbon Calculator Experience API — Carbon. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: mastercard-fetches-monthly-aggregate-carbon
      description: Mastercard Fetches Monthly Aggregate Carbon Score for the Transactions Made for the Current Month.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: carbon-calculator-experience-carbon.getaggregatecarbonscore
      outputParameters:
      - type: object
        mapping: $.

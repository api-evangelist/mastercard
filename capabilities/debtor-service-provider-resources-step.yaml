  description: 'Mastercard Debtor Service Provider Resources API — Step. 1 operations. Lead operation: Mastercard Step-up
    Advice. Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Step
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: debtor-service-provider-resources-step
    baseUri: https://mtf.services.mastercard.com/zapp/pbarfp/dsp
    description: Mastercard Debtor Service Provider Resources API — Step business capability. Self-contained, no shared references.
    resources:
    - name: payment-requests-payment_request_lifecycle_id-step-up-advices
      path: /payment-requests/{payment_request_lifecycle_id}/step-up-advices
      operations:
      - name: createstepupadvice
        method: POST
        description: Mastercard Step-up Advice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: debtor-service-provider-resources-step-rest
    port: 8080
    description: REST adapter for Mastercard Debtor Service Provider Resources API — Step. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/payment-requests/{payment-request-lifecycle-id}/step-up-advices
      name: payment-requests-payment-request-lifecycle-id-step-up-advices
      description: REST surface for payment-requests-payment_request_lifecycle_id-step-up-advices.
      operations:
      - method: POST
        name: createstepupadvice
        description: Mastercard Step-up Advice
        call: debtor-service-provider-resources-step.createstepupadvice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: debtor-service-provider-resources-step-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Debtor Service Provider Resources API — Step. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: mastercard-step-up-advice
      description: Mastercard Step-up Advice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: debtor-service-provider-resources-step.createstepupadvice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

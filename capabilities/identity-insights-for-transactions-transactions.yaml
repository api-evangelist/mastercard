naftiko: 1.0.0-alpha2
info:
  label: Mastercard Identity Insights for Transactions — Transactions
  description: 'Mastercard Identity Insights for Transactions — Transactions. 1 operations. Lead operation: Mastercard Response
    Will Be Individual and Device Insights for Mvp.. Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Transactions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: identity-insights-for-transactions-transactions
    baseUri: https://idv.mastercard.com/identity
    description: Mastercard Identity Insights for Transactions — Transactions business capability. Self-contained, no shared
      references.
    resources:
    - name: transactions
      path: /transactions
      operations:
      - name: retrievetransactioninsights
        method: POST
        description: Mastercard Response Will Be Individual and Device Insights for Mvp.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: identity-insights-for-transactions-transactions-rest
    port: 8080
    description: REST adapter for Mastercard Identity Insights for Transactions — Transactions. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/transactions
      name: transactions
      description: REST surface for transactions.
      operations:
      - method: POST
        name: retrievetransactioninsights
        description: Mastercard Response Will Be Individual and Device Insights for Mvp.
        call: identity-insights-for-transactions-transactions.retrievetransactioninsights
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: identity-insights-for-transactions-transactions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Identity Insights for Transactions — Transactions. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: mastercard-response-will-be-individual
      description: Mastercard Response Will Be Individual and Device Insights for Mvp.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: identity-insights-for-transactions-transactions.retrievetransactioninsights
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

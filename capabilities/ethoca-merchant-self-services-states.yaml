naftiko: 1.0.0-alpha2
info:
  label: Mastercard Ethoca Merchant Self Services — States
  description: 'Mastercard Ethoca Merchant Self Services — States. 1 operations. Lead operation: Mastercard Activate/deactivate
    a Sub-merchant.. Self-contained Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - States
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: ethoca-merchant-self-services-states
    baseUri: https://api.ethocaweb.com/ethoca/merchant-self-services
    description: Mastercard Ethoca Merchant Self Services — States business capability. Self-contained, no shared references.
    resources:
    - name: sub-merchants-guid-states
      path: /sub-merchants/{guid}/states
      operations:
      - name: changesubmerchantstate
        method: PUT
        description: Mastercard Activate/deactivate a Sub-merchant.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: ethoca-merchant-self-services-states-rest
    port: 8080
    description: REST adapter for Mastercard Ethoca Merchant Self Services — States. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/sub-merchants/{guid}/states
      name: sub-merchants-guid-states
      description: REST surface for sub-merchants-guid-states.
      operations:
      - method: PUT
        name: changesubmerchantstate
        description: Mastercard Activate/deactivate a Sub-merchant.
        call: ethoca-merchant-self-services-states.changesubmerchantstate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ethoca-merchant-self-services-states-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Ethoca Merchant Self Services — States. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: mastercard-activate-deactivate-sub-merchant
      description: Mastercard Activate/deactivate a Sub-merchant.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: ethoca-merchant-self-services-states.changesubmerchantstate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

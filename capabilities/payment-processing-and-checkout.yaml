naftiko: 1.0.0-alpha2
info:
  label: Mastercard Payment Processing and Checkout
  description: Unified workflow for merchants and payment processors to manage checkout experiences, process payments, and
    accept contactless transactions across Mastercard's payment gateway, checkout solutions, and commerce APIs.
  tags:
  - Mastercard
  - Payment Processing
  - Checkout
  - E-Commerce
  - Merchant
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
    MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY
capability:
  consumes:
  - type: http
    namespace: checkout-solutions
    baseUri: https://api.mastercard.com/checkout
    description: Mastercard Checkout Solutions API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: checkout
      path: /checkout
      description: Checkout operations
      operations:
      - name: initiate-checkout
        method: POST
        description: Initiate a checkout session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            checkout: '{{tools.checkout}}'
      - name: get-checkout-status
        method: GET
        description: Get checkout session status
        inputParameters:
        - name: session_id
          in: path
          type: string
          required: true
          description: Checkout session identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: unified-checkout
    baseUri: https://api.mastercard.com/unified-checkout
    description: Mastercard Unified Checkout Solutions API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: sessions
      path: /sessions
      description: Unified checkout session management
      operations:
      - name: create-session
        method: POST
        description: Create a unified checkout session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            session: '{{tools.session}}'
  - type: http
    namespace: cloud-commerce
    baseUri: https://api.mastercard.com/cloud-commerce
    description: Mastercard Cloud Commerce API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: transactions
      path: /transactions
      description: Cloud commerce transactions
      operations:
      - name: process-transaction
        method: POST
        description: Process a cloud commerce transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            transaction: '{{tools.transaction}}'
  - type: http
    namespace: contactless-reader
    baseUri: https://api.mastercard.com/contactless-reader
    description: Mastercard Contactless Reader SDK API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: readers
      path: /readers
      description: Contactless reader management
      operations:
      - name: register-reader
        method: POST
        description: Register a contactless reader device
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            reader: '{{tools.reader}}'
  - type: http
    namespace: gateway
    baseUri: https://api.mastercard.com/gateway
    description: Mastercard Gateway API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: payments
      path: /payments
      description: Payment processing
      operations:
      - name: process-payment
        method: POST
        description: Process a payment transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            payment: '{{tools.payment}}'
      - name: get-payment
        method: GET
        description: Retrieve payment transaction details
        inputParameters:
        - name: payment_id
          in: path
          type: string
          required: true
          description: Payment identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: merchant-qr
    baseUri: https://api.mastercard.com/merchant-qr
    description: Mastercard Merchant Presented QR API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: qr-codes
      path: /qr-codes
      description: QR code management
      operations:
      - name: generate-qr
        method: POST
        description: Generate a merchant QR code for payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            qr: '{{tools.qr}}'
  - type: http
    namespace: installments
    baseUri: https://api.mastercard.com/installments
    description: Mastercard Installments API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: plans
      path: /plans
      description: Installment plan management
      operations:
      - name: create-plan
        method: POST
        description: Create an installment plan
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            plan: '{{tools.plan}}'
      - name: get-plan
        method: GET
        description: Get installment plan details
        inputParameters:
        - name: plan_id
          in: path
          type: string
          required: true
          description: Plan identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: payment-checkout-api
    description: Unified REST API for Mastercard payment processing and checkout workflows.
    resources:
    - path: /v1/checkout-sessions
      name: checkout-sessions
      description: Checkout session management
      operations:
      - method: POST
        name: create-checkout-session
        description: Create a new checkout session
        call: checkout-solutions.initiate-checkout
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/unified-sessions
      name: unified-sessions
      description: Unified checkout sessions
      operations:
      - method: POST
        name: create-unified-session
        description: Create a unified checkout session
        call: unified-checkout.create-session
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments
      name: payments
      description: Payment processing
      operations:
      - method: POST
        name: process-payment
        description: Process a payment through the gateway
        call: gateway.process-payment
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: get-payment
        description: Get payment details
        call: gateway.get-payment
        with:
          payment_id: rest.payment_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/qr-payments
      name: qr-payments
      description: QR code payment acceptance
      operations:
      - method: POST
        name: generate-qr-code
        description: Generate a merchant QR code for payment
        call: merchant-qr.generate-qr
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/installment-plans
      name: installment-plans
      description: Buy-now-pay-later installment plans
      operations:
      - method: POST
        name: create-installment-plan
        description: Create an installment plan
        call: installments.create-plan
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: payment-checkout-mcp
    transport: http
    description: MCP server for AI-assisted payment processing and checkout management.
    tools:
    - name: create-checkout-session
      description: Create a new checkout session for a merchant
      hints:
        readOnly: false
        idempotent: false
      call: checkout-solutions.initiate-checkout
      outputParameters:
      - type: object
        mapping: $.
    - name: create-unified-session
      description: Create a unified checkout session supporting multiple payment methods
      hints:
        readOnly: false
        idempotent: false
      call: unified-checkout.create-session
      outputParameters:
      - type: object
        mapping: $.
    - name: process-payment
      description: Process a payment through the Mastercard gateway
      hints:
        readOnly: false
        idempotent: false
      call: gateway.process-payment
      outputParameters:
      - type: object
        mapping: $.
    - name: get-payment-details
      description: Retrieve payment transaction details
      hints:
        readOnly: true
        idempotent: true
      call: gateway.get-payment
      with:
        payment_id: tools.payment_id
      outputParameters:
      - type: object
        mapping: $.
    - name: generate-qr-code
      description: Generate a merchant-presented QR code for payment
      hints:
        readOnly: false
        idempotent: false
      call: merchant-qr.generate-qr
      outputParameters:
      - type: object
        mapping: $.
    - name: process-cloud-transaction
      description: Process a cloud commerce transaction
      hints:
        readOnly: false
        idempotent: false
      call: cloud-commerce.process-transaction
      outputParameters:
      - type: object
        mapping: $.
    - name: register-contactless-reader
      description: Register a contactless reader device
      hints:
        readOnly: false
        idempotent: false
      call: contactless-reader.register-reader
      outputParameters:
      - type: object
        mapping: $.
    - name: create-installment-plan
      description: Create a buy-now-pay-later installment plan
      hints:
        readOnly: false
        idempotent: false
      call: installments.create-plan
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Mastercard Sustainability
  description: Unified workflow for ESG and sustainability teams to calculate carbon footprints, measure environmental impact,
    and enable cardholders to support environmental causes through their spending data.
  tags:
  - Mastercard
  - Sustainability
  - Carbon Footprint
  - ESG
  - Environmental Impact
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
    MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY
capability:
  consumes:
  - type: http
    namespace: carbon-calculator
    baseUri: https://api.mastercard.com/carbon-calculator
    description: Mastercard Carbon Calculator API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: calculations
      path: /calculations
      description: Carbon footprint calculations
      operations:
      - name: calculate-footprint
        method: POST
        description: Calculate carbon footprint from transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            transactions: '{{tools.transactions}}'
  - type: http
    namespace: doconomy-aland
    baseUri: https://api.mastercard.com/doconomy/aland-index
    description: Mastercard Doconomy Aland Index API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: index
      path: /index
      description: Aland Index operations
      operations:
      - name: get-impact-score
        method: POST
        description: Get environmental impact score for a transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            transaction: '{{tools.transaction}}'
  - type: http
    namespace: donate
    baseUri: https://api.mastercard.com/donate
    description: Mastercard Donate API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: donations
      path: /donations
      description: Donation operations
      operations:
      - name: create-donation
        method: POST
        description: Create a donation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            donation: '{{tools.donation}}'
  exposes:
  - type: rest
    port: 8090
    namespace: sustainability-api
    description: Unified REST API for sustainability and environmental impact.
    resources:
    - path: /v1/carbon-footprint
      name: carbon-footprint
      description: Carbon footprint calculations
      operations:
      - method: POST
        name: calculate-carbon-footprint
        description: Calculate carbon footprint from transactions
        call: carbon-calculator.calculate-footprint
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/environmental-impact
      name: environmental-impact
      description: Environmental impact scoring
      operations:
      - method: POST
        name: get-impact-score
        description: Get environmental impact score
        call: doconomy-aland.get-impact-score
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/environmental-donations
      name: environmental-donations
      description: Environmental cause donations
      operations:
      - method: POST
        name: create-environmental-donation
        description: Create a donation to environmental causes
        call: donate.create-donation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9100
    namespace: sustainability-mcp
    transport: http
    description: MCP server for AI-assisted sustainability and environmental impact analysis.
    tools:
    - name: calculate-carbon-footprint
      description: Calculate the carbon footprint of payment transactions
      hints:
        readOnly: true
      call: carbon-calculator.calculate-footprint
      outputParameters:
      - type: object
        mapping: $.
    - name: get-environmental-impact-score
      description: Get the environmental impact score for a transaction using the Aland Index
      hints:
        readOnly: true
      call: doconomy-aland.get-impact-score
      outputParameters:
      - type: object
        mapping: $.
    - name: donate-to-environment
      description: Create a donation to support environmental causes
      hints:
        readOnly: false
      call: donate.create-donation
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Mastercard Fraud Prevention and Risk
  description: Unified workflow for fraud analysts and risk managers to detect, report, and manage fraud using Mastercard's
    fraud database, Ethoca alerts, merchant screening (MATCH), and onboarding risk checks.
  tags:
  - Mastercard
  - Fraud Prevention
  - Risk Management
  - Ethoca
  - MATCH
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
    MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY
capability:
  consumes:
  - type: http
    namespace: confirmed-fraud
    baseUri: https://api.mastercard.com/fld/confirmed-frauds
    description: Mastercard Confirmed Fraud API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: mastercard-frauds
      path: /mastercard-frauds
      description: Confirmed fraud submission for Mastercard transactions
      operations:
      - name: submit-mastercard-fraud
        method: POST
        description: Add a new fraud record for Mastercard built transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            fraud: '{{tools.fraud}}'
      - name: get-fraud-statuses
        method: GET
        description: Get available fraud record statuses
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: suspected-fraud
    baseUri: https://api.mastercard.com/fld/suspected-frauds
    description: Mastercard Suspected Fraud API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: suspected-frauds
      path: /suspected-frauds
      description: Suspected fraud management
      operations:
      - name: submit-suspected-fraud
        method: POST
        description: Submit a suspected fraud record
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            fraud: '{{tools.fraud}}'
  - type: http
    namespace: ethoca-alerts
    baseUri: https://api.mastercard.com/ethoca/alerts
    description: Mastercard Ethoca Alerts API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: alerts
      path: /alerts
      description: Fraud alert management
      operations:
      - name: get-alerts
        method: GET
        description: Retrieve fraud alerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-alert
        method: PUT
        description: Update a fraud alert status
        inputParameters:
        - name: alert_id
          in: path
          type: string
          required: true
          description: Alert identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: ethoca-consumer-clarity
    baseUri: https://api.mastercard.com/ethoca/consumer-clarity
    description: Mastercard Ethoca Consumer Clarity API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: transactions
      path: /transactions
      description: Transaction clarity lookups
      operations:
      - name: lookup-transaction
        method: POST
        description: Look up transaction details for dispute resolution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            transaction: '{{tools.transaction}}'
  - type: http
    namespace: ethoca-merchant-services
    baseUri: https://api.mastercard.com/ethoca/merchant-services
    description: Mastercard Ethoca Merchant Self Services API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: merchants
      path: /merchants
      description: Merchant management for Ethoca
      operations:
      - name: get-merchant-profile
        method: GET
        description: Retrieve merchant Ethoca profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-merchant-profile
        method: PUT
        description: Update merchant Ethoca preferences
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: onboard-risk-check
    baseUri: https://api.mastercard.com/onboard/risk-check
    description: Mastercard Onboard Risk Check API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: risk-checks
      path: /risk-checks
      description: Merchant risk assessment
      operations:
      - name: check-merchant-risk
        method: POST
        description: Perform risk assessment on a merchant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            merchant: '{{tools.merchant}}'
  - type: http
    namespace: match-pro
    baseUri: https://api.mastercard.com/fraud/merchant/v3
    description: Mastercard Match Pro API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: match
      path: /match
      description: Terminated merchant screening
      operations:
      - name: search-terminated-merchants
        method: POST
        description: Search the MATCH database for terminated merchants
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            merchant: '{{tools.merchant}}'
  exposes:
  - type: rest
    port: 8082
    namespace: fraud-risk-api
    description: Unified REST API for Mastercard fraud prevention and risk management.
    resources:
    - path: /v1/confirmed-frauds
      name: confirmed-frauds
      description: Confirmed fraud record management
      operations:
      - method: POST
        name: submit-confirmed-fraud
        description: Submit a confirmed fraud record
        call: confirmed-fraud.submit-mastercard-fraud
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/suspected-frauds
      name: suspected-frauds
      description: Suspected fraud record management
      operations:
      - method: POST
        name: submit-suspected-fraud
        description: Submit a suspected fraud record
        call: suspected-fraud.submit-suspected-fraud
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/alerts
      name: alerts
      description: Ethoca fraud alerts
      operations:
      - method: GET
        name: get-fraud-alerts
        description: Retrieve Ethoca fraud alerts
        call: ethoca-alerts.get-alerts
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/transaction-clarity
      name: transaction-clarity
      description: Transaction detail lookups for dispute prevention
      operations:
      - method: POST
        name: lookup-transaction
        description: Look up transaction details for clarity
        call: ethoca-consumer-clarity.lookup-transaction
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/merchant-risk-checks
      name: merchant-risk-checks
      description: Merchant onboarding risk assessment
      operations:
      - method: POST
        name: check-merchant-risk
        description: Perform risk check on a merchant
        call: onboard-risk-check.check-merchant-risk
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/terminated-merchants
      name: terminated-merchants
      description: MATCH terminated merchant screening
      operations:
      - method: POST
        name: search-terminated-merchants
        description: Search the MATCH database
        call: match-pro.search-terminated-merchants
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9092
    namespace: fraud-risk-mcp
    transport: http
    description: MCP server for AI-assisted fraud prevention and risk management.
    tools:
    - name: submit-confirmed-fraud
      description: Submit a confirmed fraud record to the Mastercard Fraud and Loss Database
      hints:
        readOnly: false
      call: confirmed-fraud.submit-mastercard-fraud
      outputParameters:
      - type: object
        mapping: $.
    - name: submit-suspected-fraud
      description: Submit a suspected fraud record
      hints:
        readOnly: false
      call: suspected-fraud.submit-suspected-fraud
      outputParameters:
      - type: object
        mapping: $.
    - name: get-fraud-alerts
      description: Retrieve Ethoca fraud alerts for chargeback prevention
      hints:
        readOnly: true
      call: ethoca-alerts.get-alerts
      outputParameters:
      - type: object
        mapping: $.
    - name: update-fraud-alert
      description: Update the status of an Ethoca fraud alert
      hints:
        readOnly: false
      call: ethoca-alerts.update-alert
      with:
        alert_id: tools.alert_id
      outputParameters:
      - type: object
        mapping: $.
    - name: lookup-transaction-clarity
      description: Look up transaction details to resolve disputes before chargebacks
      hints:
        readOnly: true
      call: ethoca-consumer-clarity.lookup-transaction
      outputParameters:
      - type: object
        mapping: $.
    - name: check-merchant-risk
      description: Assess merchant risk during onboarding
      hints:
        readOnly: true
      call: onboard-risk-check.check-merchant-risk
      outputParameters:
      - type: object
        mapping: $.
    - name: search-match-database
      description: Search the MATCH database for terminated merchants
      hints:
        readOnly: true
      call: match-pro.search-terminated-merchants
      outputParameters:
      - type: object
        mapping: $.
    - name: get-fraud-statuses
      description: Get available fraud record statuses
      hints:
        readOnly: true
        idempotent: true
      call: confirmed-fraud.get-fraud-statuses
      outputParameters:
      - type: object
        mapping: $.

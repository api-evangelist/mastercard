naftiko: 1.0.0-alpha2
info:
  label: Mastercard Digital Enablement and Tokenization
  description: Unified workflow for digital payment teams and issuer technology to manage card tokenization, MDES digital
    enablement, Click to Pay enrollment, and push provisioning to digital wallets.
  tags:
  - Mastercard
  - Tokenization
  - MDES
  - Digital Payments
  - Click to Pay
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
    MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY
capability:
  consumes:
  - type: http
    namespace: mdes-digital
    baseUri: https://api.mastercard.com/mdes
    description: Mastercard MDES Digital Enablement API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: tokens
      path: /tokens
      description: Token lifecycle management
      operations:
      - name: tokenize
        method: POST
        description: Tokenize a payment card
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            card: '{{tools.card}}'
      - name: get-token
        method: GET
        description: Get token details
        inputParameters:
        - name: token_id
          in: path
          type: string
          required: true
          description: Token identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: suspend-token
        method: POST
        description: Suspend a token
        inputParameters:
        - name: token_id
          in: path
          type: string
          required: true
          description: Token identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-token
        method: DELETE
        description: Delete a token
        inputParameters:
        - name: token_id
          in: path
          type: string
          required: true
          description: Token identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: mdes-token-connect
    baseUri: https://api.mastercard.com/mdes/token-connect
    description: Mastercard MDES Token Connect API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: provisioning
      path: /provisioning
      description: Token provisioning operations
      operations:
      - name: push-provision
        method: POST
        description: Push provision a token to a wallet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            provisioning: '{{tools.provisioning}}'
  - type: http
    namespace: mdes-pre-digitization
    baseUri: https://api.mastercard.com/mdes/pre-digitization
    description: Mastercard MDES Pre-Digitization API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: eligibility
      path: /eligibility
      description: Pre-digitization eligibility
      operations:
      - name: check-eligibility
        method: POST
        description: Check card eligibility for digitization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            card: '{{tools.card}}'
  - type: http
    namespace: mdes-bulk-tokenization
    baseUri: https://api.mastercard.com/mdes/bulk-tokenization
    description: Mastercard MDES Bulk Tokenization API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: bulk
      path: /bulk
      description: Bulk tokenization operations
      operations:
      - name: submit-bulk-tokenization
        method: POST
        description: Submit a bulk tokenization request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            batch: '{{tools.batch}}'
  - type: http
    namespace: token-requestor-id
    baseUri: https://api.mastercard.com/trid
    description: Mastercard Token Requestor Identifier API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: requestors
      path: /requestors
      description: Token requestor management
      operations:
      - name: register-requestor
        method: POST
        description: Register a token requestor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            requestor: '{{tools.requestor}}'
  - type: http
    namespace: issuer-click-to-pay
    baseUri: https://api.mastercard.com/click-to-pay/issuers
    description: Mastercard Issuer Enrollment Click to Pay API
    authentication:
      type: oauth1
      consumerKey: '{{MASTERCARD_CONSUMER_KEY}}'
      signingKey: '{{MASTERCARD_SIGNING_KEY}}'
    resources:
    - name: enrollments
      path: /enrollments
      description: Issuer enrollment operations
      operations:
      - name: enroll-issuer
        method: POST
        description: Enroll an issuer in Click to Pay
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            enrollment: '{{tools.enrollment}}'
  exposes:
  - type: rest
    port: 8088
    namespace: digital-token-api
    description: Unified REST API for digital enablement and tokenization.
    resources:
    - path: /v1/tokens
      name: tokens
      description: Token lifecycle management
      operations:
      - method: POST
        name: tokenize-card
        description: Tokenize a payment card
        call: mdes-digital.tokenize
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eligibility
      name: eligibility
      description: Pre-digitization eligibility
      operations:
      - method: POST
        name: check-digitization-eligibility
        description: Check card eligibility for digitization
        call: mdes-pre-digitization.check-eligibility
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/bulk-tokenization
      name: bulk-tokenization
      description: Bulk tokenization operations
      operations:
      - method: POST
        name: submit-bulk-tokenization
        description: Submit bulk tokenization request
        call: mdes-bulk-tokenization.submit-bulk-tokenization
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/provisioning
      name: provisioning
      description: Push provisioning to wallets
      operations:
      - method: POST
        name: push-provision
        description: Push provision a token to a wallet
        call: mdes-token-connect.push-provision
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9098
    namespace: digital-token-mcp
    transport: http
    description: MCP server for AI-assisted digital enablement and tokenization.
    tools:
    - name: tokenize-card
      description: Tokenize a payment card via MDES
      hints:
        readOnly: false
      call: mdes-digital.tokenize
      outputParameters:
      - type: object
        mapping: $.
    - name: get-token-details
      description: Get token details
      hints:
        readOnly: true
      call: mdes-digital.get-token
      with:
        token_id: tools.token_id
      outputParameters:
      - type: object
        mapping: $.
    - name: suspend-token
      description: Suspend an active token
      hints:
        readOnly: false
      call: mdes-digital.suspend-token
      with:
        token_id: tools.token_id
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-token
      description: Delete a token
      hints:
        readOnly: false
        destructive: true
      call: mdes-digital.delete-token
      with:
        token_id: tools.token_id
      outputParameters:
      - type: object
        mapping: $.
    - name: check-digitization-eligibility
      description: Check if a card is eligible for digitization
      hints:
        readOnly: true
      call: mdes-pre-digitization.check-eligibility
      outputParameters:
      - type: object
        mapping: $.
    - name: push-provision-to-wallet
      description: Push provision a token to a digital wallet
      hints:
        readOnly: false
      call: mdes-token-connect.push-provision
      outputParameters:
      - type: object
        mapping: $.
    - name: submit-bulk-tokenization
      description: Submit a bulk tokenization request for a card portfolio
      hints:
        readOnly: false
      call: mdes-bulk-tokenization.submit-bulk-tokenization
      outputParameters:
      - type: object
        mapping: $.
    - name: register-token-requestor
      description: Register a new token requestor
      hints:
        readOnly: false
      call: token-requestor-id.register-requestor
      outputParameters:
      - type: object
        mapping: $.
    - name: enroll-issuer-click-to-pay
      description: Enroll an issuer in Click to Pay
      hints:
        readOnly: false
      call: issuer-click-to-pay.enroll-issuer
      outputParameters:
      - type: object
        mapping: $.

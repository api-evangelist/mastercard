naftiko: "1.0.0-alpha1"

info:
  label: "Mastercard ID Verification"
  description: "Digital identity verification API for verifying consumer identity documents and biometric data."
  tags:
    - Identity
    - Verification
    - Mastercard
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
      MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY

capability:
  consumes:
    - type: http
      namespace: id-verification
      baseUri: https://api.mastercard.com/id/verification
      description: "Mastercard ID Verification API"
      authentication:
        type: oauth1
        consumerKey: "{{MASTERCARD_CONSUMER_KEY}}"
        signingKey: "{{MASTERCARD_SIGNING_KEY}}"
      resources:
        - name: verifications
          path: /verifications
          description: "Identity verification operations"
          operations:
            - name: verify-identity
              method: POST
              description: "Verify a consumer identity"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  identity: "{{tools.identity}}"

naftiko: "1.0.0-alpha1"

info:
  label: "Mastercard Account Catalog Services"
  description: "API for managing account catalog data and product configurations."
  tags:
    - Account Services
    - Catalog
    - Mastercard
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
      MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY

capability:
  consumes:
    - type: http
      namespace: account-catalog
      baseUri: https://api.mastercard.com/account-catalog
      description: "Mastercard Account Catalog Services API"
      authentication:
        type: oauth1
        consumerKey: "{{MASTERCARD_CONSUMER_KEY}}"
        signingKey: "{{MASTERCARD_SIGNING_KEY}}"
      resources:
        - name: catalog
          path: /catalog
          description: "Account catalog operations"
          operations:
            - name: get-catalog
              method: GET
              description: "Retrieve account catalog"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

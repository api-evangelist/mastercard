naftiko: "1.0.0-alpha1"

info:
  label: "Mastercard Traditional Fulfillment Service"
  description: "API for managing traditional card fulfillment including ordering and tracking physical cards."
  tags:
    - Card Fulfillment
    - Card Management
    - Mastercard
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
      MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY

capability:
  consumes:
    - type: http
      namespace: traditional-fulfillment
      baseUri: https://api.mastercard.com/fulfillment
      description: "Mastercard Traditional Fulfillment Service API"
      authentication:
        type: oauth1
        consumerKey: "{{MASTERCARD_CONSUMER_KEY}}"
        signingKey: "{{MASTERCARD_SIGNING_KEY}}"
      resources:
        - name: orders
          path: /orders
          description: "Card fulfillment orders"
          operations:
            - name: create-order
              method: POST
              description: "Create a card fulfillment order"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  order: "{{tools.order}}"

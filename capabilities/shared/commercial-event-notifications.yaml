naftiko: "1.0.0-alpha1"

info:
  label: "Mastercard Commercial Event Notifications"
  description: "API for receiving real-time notifications about commercial card transaction events."
  tags:
    - Commercial
    - Notifications
    - Events
    - Mastercard
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
      MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY

capability:
  consumes:
    - type: http
      namespace: commercial-notifications
      baseUri: https://api.mastercard.com/commercial/notifications
      description: "Mastercard Commercial Event Notifications API"
      authentication:
        type: oauth1
        consumerKey: "{{MASTERCARD_CONSUMER_KEY}}"
        signingKey: "{{MASTERCARD_SIGNING_KEY}}"
      resources:
        - name: notifications
          path: /notifications
          description: "Event notification management"
          operations:
            - name: get-notifications
              method: GET
              description: "Retrieve commercial event notifications"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

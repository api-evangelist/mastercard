naftiko: "1.0.0-alpha1"

info:
  label: "Mastercard Donate"
  description: "API enabling donation capabilities integrated with payment transactions."
  tags:
    - Donations
    - Social Impact
    - Mastercard
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
      MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY

capability:
  consumes:
    - type: http
      namespace: donate
      baseUri: https://api.mastercard.com/donate
      description: "Mastercard Donate API"
      authentication:
        type: oauth1
        consumerKey: "{{MASTERCARD_CONSUMER_KEY}}"
        signingKey: "{{MASTERCARD_SIGNING_KEY}}"
      resources:
        - name: donations
          path: /donations
          description: "Donation operations"
          operations:
            - name: create-donation
              method: POST
              description: "Create a donation"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  donation: "{{tools.donation}}"

naftiko: "1.0.0-alpha1"

info:
  label: "Mastercard Offers Merchant Content"
  description: "API for managing merchant offer content and promotional materials."
  tags:
    - Offers
    - Merchant Content
    - Mastercard
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
      MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY

capability:
  consumes:
    - type: http
      namespace: offers-merchant-content
      baseUri: https://api.mastercard.com/offers/merchant-content
      description: "Mastercard Offers Merchant Content API"
      authentication:
        type: oauth1
        consumerKey: "{{MASTERCARD_CONSUMER_KEY}}"
        signingKey: "{{MASTERCARD_SIGNING_KEY}}"
      resources:
        - name: content
          path: /content
          description: "Merchant offer content"
          operations:
            - name: get-merchant-content
              method: GET
              description: "Get merchant offer content"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

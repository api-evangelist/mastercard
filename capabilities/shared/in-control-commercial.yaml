naftiko: "1.0.0-alpha1"

info:
  label: "Mastercard In Control for Commercial Payments"
  description: "API for managing virtual card programs and commercial payment controls."
  tags:
    - Commercial Payments
    - Virtual Cards
    - Mastercard
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
      MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY

capability:
  consumes:
    - type: http
      namespace: in-control-commercial
      baseUri: https://api.mastercard.com/in-control/commercial
      description: "Mastercard In Control for Commercial Payments API"
      authentication:
        type: oauth1
        consumerKey: "{{MASTERCARD_CONSUMER_KEY}}"
        signingKey: "{{MASTERCARD_SIGNING_KEY}}"
      resources:
        - name: virtual-cards
          path: /virtual-cards
          description: "Virtual card management"
          operations:
            - name: create-virtual-card
              method: POST
              description: "Create a virtual card"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  card: "{{tools.card}}"

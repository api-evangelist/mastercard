naftiko: "1.0.0-alpha1"

info:
  label: "Mastercard Priceless Platform"
  description: "API for the Priceless experiences platform enabling loyalty and experiential rewards."
  tags:
    - Priceless
    - Loyalty
    - Experiences
    - Mastercard
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
      MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY

capability:
  consumes:
    - type: http
      namespace: priceless-platform
      baseUri: https://api.mastercard.com/priceless
      description: "Mastercard Priceless Platform API"
      authentication:
        type: oauth1
        consumerKey: "{{MASTERCARD_CONSUMER_KEY}}"
        signingKey: "{{MASTERCARD_SIGNING_KEY}}"
      resources:
        - name: experiences
          path: /experiences
          description: "Priceless experience management"
          operations:
            - name: list-experiences
              method: GET
              description: "List available Priceless experiences"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

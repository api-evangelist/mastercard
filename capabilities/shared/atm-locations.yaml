naftiko: "1.0.0-alpha1"

info:
  label: "Mastercard ATM Locations"
  description: "Provides access to Mastercard's ATM data for finding nearest ATMs, specific ATM locations, and radius searches with feature filtering."
  tags:
    - ATM
    - Locations
    - Mastercard
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
      MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY

capability:
  consumes:
    - type: http
      namespace: atm-locations
      baseUri: https://api.mastercard.com/locations/atms
      description: "Mastercard ATM Locations API"
      authentication:
        type: oauth1
        consumerKey: "{{MASTERCARD_CONSUMER_KEY}}"
        signingKey: "{{MASTERCARD_SIGNING_KEY}}"
      resources:
        - name: countries
          path: /countries
          description: "Country and subdivision data for ATM locations"
          operations:
            - name: get-countries
              method: GET
              description: "Returns a list of countries containing ATMs"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-country-subdivisions
              method: GET
              description: "Returns a list of country subdivisions for a given country"
              inputParameters:
                - name: country_code
                  in: query
                  type: string
                  required: true
                  description: "Country code"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: searches
          path: /searches
          description: "ATM search operations"
          operations:
            - name: search-atms
              method: POST
              description: "Search for ATMs by location and features"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  location: "{{tools.location}}"

  exposes:
    - type: rest
      port: 8100
      namespace: atm-locations-api
      resources:
        - path: /v1/countries
          name: countries
          description: "ATM countries"
          operations:
            - method: GET
              name: list-countries
              description: "List countries with ATMs"
              call: "atm-locations.get-countries"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: atm-locations-mcp
      transport: http
      tools:
        - name: list-countries
          description: "List countries containing Mastercard ATMs"
          hints:
            readOnly: true
            openWorld: true
          call: "atm-locations.get-countries"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-atms
          description: "Search for ATMs by location and features"
          hints:
            readOnly: true
            openWorld: true
          call: "atm-locations.search-atms"
          with:
            location: "tools.location"
          outputParameters:
            - type: object
              mapping: "$."

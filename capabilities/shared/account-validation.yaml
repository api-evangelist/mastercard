naftiko: "1.0.0-alpha1"

info:
  label: "Mastercard Account Validation"
  description: "API for validating account details before processing payments or transfers."
  tags:
    - Account Validation
    - Payments
    - Mastercard
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
      MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY

capability:
  consumes:
    - type: http
      namespace: account-validation
      baseUri: https://api.mastercard.com/account-validation
      description: "Mastercard Account Validation API"
      authentication:
        type: oauth1
        consumerKey: "{{MASTERCARD_CONSUMER_KEY}}"
        signingKey: "{{MASTERCARD_SIGNING_KEY}}"
      resources:
        - name: validations
          path: /validations
          description: "Account validation operations"
          operations:
            - name: validate-account
              method: POST
              description: "Validate an account"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  account: "{{tools.account}}"

naftiko: "1.0.0-alpha1"

info:
  label: "Mastercard Match Pro"
  description: "MATCH (Member Alert to Control High-risk) API for querying terminated merchant data to identify potential risks during onboarding."
  tags:
    - Risk
    - Merchant Screening
    - Compliance
    - Mastercard
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MASTERCARD_CONSUMER_KEY: MASTERCARD_CONSUMER_KEY
      MASTERCARD_SIGNING_KEY: MASTERCARD_SIGNING_KEY

capability:
  consumes:
    - type: http
      namespace: match-pro
      baseUri: https://api.mastercard.com/fraud/merchant/v3
      description: "Mastercard Match Pro API"
      authentication:
        type: oauth1
        consumerKey: "{{MASTERCARD_CONSUMER_KEY}}"
        signingKey: "{{MASTERCARD_SIGNING_KEY}}"
      resources:
        - name: match
          path: /match
          description: "Terminated merchant screening"
          operations:
            - name: search-terminated-merchants
              method: POST
              description: "Search the MATCH database for terminated merchants"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  merchant: "{{tools.merchant}}"

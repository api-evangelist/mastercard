naftiko: 1.0.0-alpha2
info:
  label: Mastercard Loyalty Insurance — Users
  description: 'Mastercard Loyalty Insurance — Users. 1 operations. Lead operation: Mastercard Create a User Data Token Which
    Is Used in the Redirection Url That Redirects the Cardholder to the Website for Submitting a New Claim.. Self-contained
    Naftiko capability covering one Mastercard business surface.'
  tags:
  - Mastercard
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: loyalty-insurance-users
    baseUri: https://api.mastercard.com/loyalty/insurance
    description: Mastercard Loyalty Insurance — Users business capability. Self-contained, no shared references.
    resources:
    - name: user-data-tokens
      path: /user-data-tokens
      operations:
      - name: createusertoken
        method: POST
        description: Mastercard Create a User Data Token Which Is Used in the Redirection Url That Redirects the Cardholder
          to the Website for Submitting a New Claim.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: loyalty-insurance-users-rest
    port: 8080
    description: REST adapter for Mastercard Loyalty Insurance — Users. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/user-data-tokens
      name: user-data-tokens
      description: REST surface for user-data-tokens.
      operations:
      - method: POST
        name: createusertoken
        description: Mastercard Create a User Data Token Which Is Used in the Redirection Url That Redirects the Cardholder
          to the Website for Submitting a New Claim.
        call: loyalty-insurance-users.createusertoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: loyalty-insurance-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Loyalty Insurance — Users. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mastercard-create-user-data-token
      description: Mastercard Create a User Data Token Which Is Used in the Redirection Url That Redirects the Cardholder
        to the Website for Submitting a New Claim.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: loyalty-insurance-users.createusertoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

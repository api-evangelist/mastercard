naftiko: 1.0.0-alpha2
info:
  label: Mastercard Confirmed Fraud — Issuer
  description: 'Mastercard Confirmed Fraud — Issuer. 2 operations. Lead operation: Add a New Fraud Record Using Complete Input
    Parameters for Both Mastercard and Issuer Built Transactions.. Self-contained Naftiko capability covering one Mastercard
    business surface.'
  tags:
  - Mastercard
  - Issuer
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MASTERCARD_API_KEY: MASTERCARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: confirmed-fraud-issuer
    baseUri: https://api.mastercard.com/fld/confirmed-frauds
    description: Mastercard Confirmed Fraud — Issuer business capability. Self-contained, no shared references.
    resources:
    - name: issuer-frauds
      path: /issuer-frauds
      operations:
      - name: submitissuerfraud
        method: POST
        description: Add a New Fraud Record Using Complete Input Parameters for Both Mastercard and Issuer Built Transactions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: updateissuerfraud
        method: PUT
        description: Change an Existing Fraud Record Using Complete Input Parameters for Both Mastercard and Issuer Built
          Transactions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: confirmed-fraud-issuer-rest
    port: 8080
    description: REST adapter for Mastercard Confirmed Fraud — Issuer. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/issuer-frauds
      name: issuer-frauds
      description: REST surface for issuer-frauds.
      operations:
      - method: POST
        name: submitissuerfraud
        description: Add a New Fraud Record Using Complete Input Parameters for Both Mastercard and Issuer Built Transactions.
        call: confirmed-fraud-issuer.submitissuerfraud
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateissuerfraud
        description: Change an Existing Fraud Record Using Complete Input Parameters for Both Mastercard and Issuer Built
          Transactions.
        call: confirmed-fraud-issuer.updateissuerfraud
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confirmed-fraud-issuer-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mastercard Confirmed Fraud — Issuer. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: add-new-fraud-record-using
      description: Add a New Fraud Record Using Complete Input Parameters for Both Mastercard and Issuer Built Transactions.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: confirmed-fraud-issuer.submitissuerfraud
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: change-existing-fraud-record-using
      description: Change an Existing Fraud Record Using Complete Input Parameters for Both Mastercard and Issuer Built Transactions.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: confirmed-fraud-issuer.updateissuerfraud
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

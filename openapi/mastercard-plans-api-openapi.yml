            ReasonCode: invalid.request.body.parameter
            Description: Value doesn't exist / doesn't meet specified range
            Recoverable: false
            Details: ''
    InvalidCountryCode:
      description: Provided Country Code in request is invalid
      value:
        Errors:
          Error:
          - Source: mci-installments-offers-eligibilities-api
            ReasonCode: invalid.request.parameter
            Description: Country Code Not Supported
            Recoverable: false
            Details: ''
    InvalidAmountType:
      description: Incorrect value for Amount Type field sent in the Plan API request for **Installments on Cards**.
      value:
        Errors:
          Error:
          - Source: mci-installment-bnpl-plans-api
            ReasonCode: invalid.request.parameter
            Description: Incorrect value for Amount Type.
            Recoverable: false
            Details: Amount type must be 'PURCHASE' OR 'FINAL'.
    InvalidPresentedOffersDSP:
      description: Presented offers is required, along with the offer ID, if the client is classified as a distribution partner.
      value:
        Errors:
          Error:
          - Source: mci-installment-bnpl-plans-api
            ReasonCode: invalid.request.parameter
            Description: Both OfferId and TransactionOffers must be present for this client - Value must not be null
            Recoverable: false
            Details: Invalid input request for cardedInstallments.
  schemas:
    PlanIdField:
      type: string
      format: uuid
      description: A unique identifier assigned to an installment plan.
      example: 3d56f5a7-db48-41f0-875e-30920e8465f3
      maxLength: 36
      minLength: 36
    SensitiveDataField:
      type: object
      description: "Mandatory for Carded Installments\n     - Plain payload which contains Consumer Primary Account Number in encrypted format, refer example 'Carded Installments Offers Request Plain' to see payload (sensitiveData object) in plain format.\n     - Represented as the concatenation of the Base64 encoded JWE Protected Header, JWE Encrypted Key, JWE Initialization Vector, JWE Ciphertext, and JWE Authentication Tag separated by '.'"
      properties:
        consumer:
          properties:
            primaryAccountNumber:
              type: number
              description: Consumer Credit or Debit card number (PAN) to offer Installments (ISO-DE2). This field can contain both funding and tokenized PAN. For 'Carded Installments', this will be mandatory parameter.
              maxLength: 19
              minLength: 11
              example: 5110921032063789
          required:
          - primaryAccountNumber
    ErrorList:
      type: array
      minItems: 1
      items:
        $ref: '#/components/schemas/Error'
    OfferIdField:
      type: string
      description: Unique identifier for installment offers. This is mandatory for 'Mastercard Installments Payment Services product.
      example: '24092019'
      maxLength: 64
      minLength: 8
    TransactionOffer:
      type: object
      properties:
        offerId:
          type: string
          description: unique identifier for installment offers.
          example: '24092019'
          maxLength: 64
          minLength: 8
      required:
      - offerId
    MerchantPlan:
      type: object
      properties:
        acceptor:
          type: string
          description: Merchant acceptor identifier.
          example: '100234'
          maxLength: 100
          minLength: 1
        country:
          type: string
          description: Country code in ISO 3166 alpha 3 format.
          example: USA
          maxLength: 3
          minLength: 3
        mcc:
          type: string
          description: Merchant Category Code.
          example: '1711'
          maxLength: 4
          minLength: 4
        name:
          type: string
          description: Merchant name for plan.
          example: Decor shop
          maxLength: 100
          minLength: 1
      required:
      - country
      - mcc
    CardedTransaction:
      allOf:
      - $ref: '#/components/schemas/Transaction'
      - type: object
        properties:
          amountType:
            type: string
            description: Transaction amount type. Possible values can be PURCHASE, FINAL.
            example: PURCHASE
          stan:
            description: The System Trace Audit Number (STAN) for this transaction. (ISO DE-11).
            type: string
            minLength: 1
            maxLength: 6
            example: 123456
          rrn:
            description: The Retrieval Reference Number (RRN) for this transaction. (ISO DE-37).
            type: string
            minLength: 0
            maxLength: 12
            example: 123456123456
          authorizationCode:
            description: Value generated by the issuing bank in response to a proposal to transfer funds (ISO DE-38).
            type: string
            minLength: 0
            maxLength: 6
            example: 123456
          localDateTime:
            description: Transaction local date. [Date and Time RFC](https://datatracker.ietf.org/doc/html/rfc3339). (ISO DE-12, ISO DE-13). If amount type is purchase then populate purchase date time else populate ISO transaction date time.
            type: string
            example: '2023-01-01T00:00:00Z'
          transmissionDateTime:
            description: Transaction transmission date. [Date and Time RFC](https://datatracker.ietf.org/doc/html/rfc3339). (ISO DE-7).
            type: string
            example: '2023-01-01T00:00:00Z'
          transactionLinkId:
            description: Unique Value generated by Mastercard to track the transaction (ISO DE-105).
            type: string
            minLength: 0
            maxLength: 22
            example: 123456dasda123456
        required:
        - amountType
    ScheduledRepayments:
      type: array
      description: This object will be populated only when consumer offer selection is enabled.
      items:
        $ref: '#/components/schemas/ScheduledRepayment'
      maxItems: 99
    CreatedInstallmentPlan:
      type: object
      properties:
        planId:
          $ref: '#/components/schemas/PlanIdField'
        status:
          $ref: '#/components/schemas/StatusField'
    Errors:
      title: Errors
      type: object
      description: Error object which returns the list of Error objects.
      required:
      - Error
      properties:
        Error:
          $ref: '#/components/schemas/ErrorList'
    StatusField:
      type: string
      description: 'Current status of a plan. One of: CREATED, APPROVED, DECLINED, TIMED_OUT.'
      example: CREATED
      maxLength: 12
      minLength: 7
    InstallmentPlan:
      type: object
      properties:
        consumer:
          $ref: '#/components/schemas/Consumer'
        merchant:
          $ref: '#/components/schemas/MerchantPlan'
        offerId:
          $ref: '#/components/schemas/OfferIdField'
        planId:
          $ref: '#/components/schemas/PlanIdField'
        planInstallmentInformation:
          $ref: '#/components/schemas/PlanInstallmentInformation'
        providerId:
          $ref: '#/components/schemas/ProviderIdField'
        rejectReasonCode:
          type: string
          description: Describes the reason for plan rejection. Mandatory for when status is DECLINED. Following are the reject reason codes:[ CONSUMER_AUTH_FAIL, CONSUMER_APPLICATION_FAIL, CONSUMER_CANCELLATION, LENDER_DRIVEN_REJECTION, LENDER_SYSTEM_ERROR, OTHER_REASON ]
          example: CONSUMER_CANCELLATION
          maxLength: 30
          minLength: 12
        rejectReasonDetail:
          type: string
          description: Indicates detailed information about reject reason.
          example: Credit score is too low
          maxLength: 5000
          minLength: 0
        scheduledRepayments:
          $ref: '#/components/schemas/ScheduledRepayments'
        status:
          $ref: '#/components/schemas/StatusField'
        transaction:
          $ref: '#/components/schemas/Transaction'
        transactionOffers:
          $ref: '#/components/schemas/TransactionOffers'
      required:
      - merchant
      - planId
      - providerId
      - status
      - transaction
    PlanSchedulePayments:
      type: array
      description: List of installments as per Schedule payments.
      items:
        $ref: '#/components/schemas/SchedulePayment'
      maxItems: 99
    CardedPlanInstallmentInformation:
      allOf:
      - $ref: '#/components/schemas/PlanInstallmentInformation'
      - type: object
        properties:
          firstInstallmentAmount:
            type: number
            format: double
            description: Amount to be paid for the first installment.
            example: 100
            exclusiveMaximum: false
            exclusiveMinimum: false
            maximum: 1000000000000000
            minimum: 0
          otherInstallmentAmount:
            type: number
            format: double
            description: Subsequent Installment amount with minor unit according to ISO 4217.
            example: 200
            maximum: 1000000000000000
            minimum: 0
          feeValue:
            type: number
            format: double
            description: Fees values based on type it can be either Fixed amount or Percentage to applied in transaction amount. This is mandatory for 'Mastercard Installments Payment Services product.
            example: 2.05
            exclusiveMaximum: false
            exclusiveMinimum: false
            maximum: 1000000000000000
            minimum: 0
    PlanMerchant:
      type: object
      properties:
        country:
          type: string
          description: Country code in ISO 3166 alpha 3 format.
          example: USA
          maxLength: 3
          minLength: 3
        mcc:
          type: string
          description: Merchant Category Code.
          example: '1711'
          maxLength: 4
          minLength: 4
        url:
          description: URL for the Merchant.
          type: string
          minLength: 1
          maxLength: 50
          example: www.globexdecor.com
        acquirerId:
          description: Acquiring Institution ID Code to identifies the acquiring institution. (ISO DE-32).
          type: string
          minLength: 1
          maxLength: 6
          example: '456789'
        merchantId:
          description: Merchant ID assigned by Acquirer. (ISO DE-42).
          type: string
          minLength: 1
          maxLength: 15
          example: '456789'
    Transaction:
      type: object
      properties:
        amount:
          $ref: '#/components/schemas/Amount'
        currency:
          type: string
          description: Currency code according to ISO 4217.
          example: USD
          maxLength: 3
          minLength: 3
      required:
      - amount
      - currency
    TransactionOffers:
      type: array
      description: A list of offers presented to the consumer. This is a mandatory field for During Purchase use case of Mastercard Installments Payment Services.
      items:
        $ref: '#/components/schemas/TransactionOffer'
      maxItems: 50
    OfferTransactionIdField:
      type: string
      description: Unique identifier for installment offers presentment transaction. It will be snowflake identifier format.
      example: '1763137029152964608'
      minLength: 8
      maxLength: 40
    CardedMerchant:
      allOf:
      - $ref: '#/components/schemas/PlanMerchant'
      - type: object
        properties:
          name:
            description: Merchant legal name or "doing business as" name. For 'Mastercard Installments Payment Services', this will be optional parameter.
            type: string
            minLength: 1
            maxLength: 100
            example: Globex Decor
          url:
            description: URL for the Merchant .
            type: string
            minLength: 1
            maxLength: 50
            example: www.globexdecor.com
          acquirerId:
            description: Acquiring Institution ID Code to identifies the acquiring institution. (ISO DE-32).
            type: string
            minLength: 1
            maxLength: 6
            example: '456789'
          merchantId:
            description: Merchant ID assigned by Acquirer. (ISO DE-42).
            type: string
            minLength: 1
            maxLength: 15
            example: '456789'
    PlanPost:
      type: object
      properties:
        offerTransactionId:
          $ref: '#/components/schemas/OfferTransactionIdField'
        merchant:
          $ref: '#/components/schemas/CardedMerchant'
        offerId:
          $ref: '#/components/schemas/OfferIdField'
        planInstallmentInformation:
          $ref: '#/components/schemas/CardedPlanInstallmentInformation'
        providerId:
          $ref: '#/components/schemas/ProviderIdField'
        schedulePayments:
          $ref: '#/components/schemas/PlanSchedulePayments'
        transaction:
          $ref: '#/components/schemas/CardedTransaction'
        sensitiveData:
          $ref: '#/components/schemas/SensitiveDataField'
        transactionOffers:
          $ref: '#/components/schemas/TransactionOffers'
      required:
      - providerId
      - transaction
      - offerTransactionId
    ErrorWrapper:
      title: ErrorWrapper
      type: object
      description: The error response object which gets returned in case of any error.
      required:
      - Errors
      properties:
        Errors:
          $ref: '#/components/schemas/Errors'
    PlanInstallmentInformation:
      type: object
      description: This object is mandatory for **Mastercard Installments Payment Services**.
      properties:
        apr:
          type: number
          format: double
          description: Annual Percentage Rate (APR).
          example: 25.03
          exclusiveMaximum: false
          exclusiveMinimum: false
          maximum: 200
          minimum: 0
        currency:
          type: string
          description: Currency code according to ISO 4217.
          example: USD
          maxLength: 3
          minLength: 3
        frequency:
          type: string
          description: Frequency of installment (single installment time duration).It will be one of the [WEEKLY, BIWEEKLY, MONTHLY]
          example: BIWEEKLY
          maxLength: 20
          minLength: 3
        firstInstallmentAmount:
          type: number
          format: double
          description: Amount to be paid for the first installment.
          example: 100
          exclusiveMaximum: false
          exclusiveMinimum: false
          maximum: 1000000000000000
          minimum: 0
        otherInstallmentAmount:
          type: number
          format: double
          description: Subsequent Installment amount with minor unit according to ISO 4217.
          example: 200
          maximum: 1000000000000000
          minimum: 0
        feeValue:
          type: number
          format: double
          description: Fees values based on type it can be either Fixed amount or Percentage to applied in transaction amount.
          example: 2.05
          exclusiveMaximum: false
          exclusiveMinimum: false
          maximum: 1000000000000000
          minimum: 0
        tenure:
          type: integer
          format: int32
          description: Total number of installments for an offer. Offer tenure.
          example: 2
          maximum: 99
          minimum: 2
        totalAmount:
          type: number
          format: double
          description: The total amount owed by the cardholder on an installment purchase inclusive of fees, tax and interest for the installment plan.
          example: 200
          exclusiveMaximum: false
          exclusiveMinimum: false
          maximum: 1000000000000000
          minimum: 0
      required:
      - frequency
      - tenure
    Amount:
      type: number
      format: double
      description: Amount to be paid in an installment.
      example: 100
      exclusiveMaximum: false
      exclusiveMinimum: false
      maximum: 9999999999999.99
      minimum: 0
    SchedulePayment:
      type: object
      description: Schedule Payments of the offer selected by cardholder. This object is mandatory for **Mastercard Installments Payment Services**.
      properties:
        installmentAmount:
          type: number
          format: double
          description: Amount to be paid in an installment. This is mandatory for 'Mastercard Installments Payment Services product.
          example: 100
          exclusiveMaximum: false
          exclusiveMinimum: false
          maximum: 1000000000000000
          minimum: 0
        dueDate:
          type: string
          description: Due date for an installment. This is mandatory for 'Mastercard Installments Payment Services product.
          example: 2023-5-21
          maxLength: 10
          minLength: 8
        installmentNumber:
          type: integer
          format: int32
          description: Number of an installment. This is mandatory for 'Mastercard Installments Payment Services product.
          example: 1
          maximum: 99
          minimum: 1
    ProviderIdField:
      type: string
      format: uuid
      description: Provider ID is internal ID generated by Configuration API.
      example: 3d56f5a7-db48-41f0-875e-30920e8465f3
      maxLength: 36
      minLength: 36
    ScheduledRepayment:
      type: object
      properties:
        amount:
          $ref: '#/components/schemas/Amount'
        dueDate:
          type: string
          description: Due date for an installment.
          example: 2022-5-21
          maxLength: 10
          minLength: 8
        installmentNumber:
          type: integer
          format: int32
          description: Number of an installment.
          example: 1
          maximum: 99
          minimum: 1
    Consumer:
      type: object
      properties:
        email:
          type: string
          description: Consumer's email address. Hashed for pre-approved consumer, raw for consumer without pre-approval.
          example: jane.doe@example.com
          maxLength: 254
          minLength: 5
        isdCode:
          type: string
          description: ISD code of the consumer's mobile number.
          example: '1'
          maxLength: 5
          minLength: 1
        mobile:
          type: string
          description: Consumer's mobile number. Hashed for pre-approved consumer, raw for consumer without pre-approval.
          example: '5550009999'
          maxLength: 64
          minLength: 4
        providerConsumerId:
          type: string
          format: uuid
          description: Unique user ID provided by the Installment Program Provider. This is specific to the provider. (External user/consumer id). Applicable only for pre-approved consumers.
          example: 3d56f5a7-db48-41f0-875e-30920e8465f3
          maxLength: 36
          minLength: 36
    Error:
      title: Error
      type: object
      description: Error object which contains details about the Error.
      required:
      - Source
      - ReasonCode
      - Description
      - Recoverable
      properties:
        Source:
          type: string
          description: The application name that generated this error.
          minLength: 1
          maxLength: 100
          example: Mastercard Installments APIs
        ReasonCode:
          type: string
          description: A unique constant identifying the error case encountered during request processing.
          minLength: 1
          maxLength: 100
          example: invalid.request.parameter
        Description:
          type: string
          description: Short description of the ReasonCode field.
          minLength: 10
          maxLength: 1000
          example: One of the request parameters is invalid, try again with the correct request.
        Recoverable:
          type: boolean
          description: Indicates whether this error will always be returned for this request, or retrying could change the outcome.
          example: false
        Details:
          type: string
          description: (Optional) Where appropriate, indicates detailed information about data received and calculated during request processing, to help the user with diagnosing errors.
          minLength: 0
          maxLength: 5000
          example: paymentCardId size must be between 36 and 36

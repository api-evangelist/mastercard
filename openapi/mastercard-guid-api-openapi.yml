    MerchantResource:
      description: Base merchant response schema
      required:
      - merchantType
      - locales
      - businessType
      allOf:
      - $ref: '#/components/schemas/BaseMerchant'
      - type: object
        properties:
          merchantType:
            title: Merchant Type
            type: string
            description: 'Type of a merchant. Allowed Values -

              + SUB_MERCHANT -

              + DIRECT -

              + GATEWAY - '
            example: SUB_MERCHANT
            minLength: 1
            maxLength: 50
          guid:
            $ref: '#/components/schemas/MerchantGuid'
          status:
            title: Status
            maxLength: 20
            minLength: 4
            type: string
            description: '* CONFIGURATION - This status indicates that this merchant record is being modified. Any changes applied to a record with this status are NOT visible in production. There is no guarantee that the data is either valid or consistent.

              * TESTING - This status indicates that the merchant is being tested. The data for a record with this status is NOT visible in production and data modifications are not permitted.

              * LIVE - This status indicates that the merchant record is visible in production. The data has been validated and is used for transaction lookups. Data modifications are not permitted.

              * INACTIVE - This status indicates that this merchant record is NOT visible in production. Data modifications are not permitted.

              * LOCKED_FOR_EDIT - This status indicates that this merchant record is locked for modification by the customer success team. Data modifications are not permitted.'
            example: LIVE
          locales:
            title: Merchant Locale Details
            minItems: 1
            maxItems: 10
            uniqueItems: true
            type: array
            description: Merchant Locale Details
            items:
              $ref: '#/components/schemas/LocaleResource'
          locations:
            title: Merchant Location Details
            minItems: 0
            maxItems: 50
            uniqueItems: true
            type: array
            description: Merchant Location details
            deprecated: true
            nullable: true
            items:
              $ref: '#/components/schemas/LocationResource'
          contentTypes:
            title: Content Types
            uniqueItems: true
            type: array
            description: An indicator as to the type of products and services you offer.
            example:
            - ADULT_LANGUAGE
            items:
              type: string
            nullable: true
          validationStatus:
            $ref: '#/components/schemas/ValidationStatus'
          crm:
            $ref: '#/components/schemas/CrmResource'
          businessType:
            title: Merchant Business Type
            type: string
            description: Business type describes the legal structure under which the business operates
            minLength: 1
            maxLength: 25
            example: BUSINESS_CORPORATION
          firstPartyTrustEnrollments:
            title: First Party Trust Enrollments
            description: A list of First Party Trust Enrollments
            type: array
            uniqueItems: true
            minLength: 0
            maxLength: 2
            nullable: true
            items:
              $ref: '#/components/schemas/FirstPartyTrustEnrollmentResource'
    CardAcceptorId:
      title: Card Acceptor's ID (CAID)
      description: Identifies the card acceptor ID assigned by the acquirer. This ID must represent a unique identifier for each merchant name/location within the acquirer BIN. This is represented by Mastercard DE 42 and Visa Field 42.
      type: string
      minLength: 1
      maxLength: 15

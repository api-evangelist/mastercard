        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/ResourceNotFoundError'
components:
  schemas:
    PercentOwnership:
      title: Percent Ownership
      minLength: 1
      maxLength: 5
      pattern: ^(100(\.00?)?|[1-9]\d?(\.\d{1,2})?|0\.\d{1,2})$
      type: string
      description: Percent Ownership.
      example: '25.50'
      nullable: true
    AcquirerMerchantIdsResource:
      title: Acquirer reference ID & card acceptor ID pairs resource
      description: Set of acquirer reference ID & card acceptor ID pairs resource
      properties:
        acceptedIds:
          $ref: '#/components/schemas/AcceptedAcquirerMerchantIdsResource'
        rejectedIds:
          description: Rejected acquirer reference ID & card acceptor ID pairs
          type: array
          items:
            $ref: '#/components/schemas/AcquirerMerchantId'
          example: []
    SanctionScreening:
      title: Sanction Screening
      type: object
      required:
      - taxId
      - publiclyTraded
      - doBusinessWithSanctionedGeographies
      properties:
        taxId:
          title: Tax Identification
          description: Known as VAT Number in the US and GST in Canada.
          example: 123456789AB1234
          type: string
          minLength: 1
          maxLength: 30
        formerLegalNames:
          title: List of Former Legal Names
          description: The merchant's former legal names
          uniqueItems: true
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/MerchantName'
          example: []
        doBusinessWithSanctionedGeographies:
          title: Business With Sanctioned Geographies Indicator
          description: 'Indicates whether the merchant does business with sanctioned geographies.

            If it is true, then sanctionedGeographies property can''t be empty.

            '
          type: boolean
          example: false
        sanctionedGeographies:
          title: List of Sanctioned Geographies
          description: 'List of sanctioned geographies that the merchant is doing business with. It

            can''t be empty if the doBusinessWithSanctionedGeographies property is true

            '
          uniqueItems: true
          type: array
          nullable: true
          items:
            title: Sanctioned Geography
            type: string
            minLength: 1
            maxLength: 60
            description: Sanctioned geography
            example: Iran
          example: []
        publiclyTraded:
          title: Merchant Publicly Traded Indicator
          description: Indicates whether a merchant is publicly traded.
          type: boolean
          example: false
        tickerSymbol:
          title: Merchant's Stock Symbol
          description: Publicly traded merchant's stock symbol. It's mandatory if the isPubliclyTraded attribute is true.
          type: string
          minLength: 1
          maxLength: 10
          example: NFLX
          nullable: true
        beneficialOwners:
          type: array
          title: List of Beneficial Owners
          description: Required only if publiclyTraded property is false and legalEntities property is empty.
          uniqueItems: true
          nullable: true
          items:
            $ref: '#/components/schemas/BeneficialOwner'
          example: []
        legalEntities:
          type: array
          title: List of Legal Entities
          description: Required only if publiclyTraded property is false and beneficialOwners property is empty.
          uniqueItems: true
          nullable: true
          items:
            $ref: '#/components/schemas/LegalEntity'
          example: []
    ShortEmail:
      title: Email Address
      maxLength: 100
      minLength: 1
      type: string
      description: Email address
      example: john.doe@example.com
      format: email
      nullable: true
    ImageBase64Encoded:
      title: Image Base 64 Encoded
      type: string
      description: Base 64 encoded image (JPG or PNG)
      minLength: 0
      maxLength: 999999999
      example: 
    AcquirerReferenceId:
      title: Acquirer Reference ID (ARID)
      description: The acquirer BINs that a partner currently services under their portfolio. This is represented by Mastercard DE 31 - Subfield 2 (Clearing), DE 32 (Authorization), or Visa Field 32.
      type: string
      minLength: 6
      maxLength: 6
      pattern: ^[\d]+$
      example: '123456'
    ResourceId:
      type: string
      minLength: 1
      maxLength: 40
      description: Unique identifier of resource
      nullable: true
      example: Mxyz123
    CardAcceptor:
      title: Merchant Card Acceptor
      maxLength: 50
      minLength: 1
      type: string
      description: Merchant Card Acceptor
      example: ETHOCA NINJA GAMES
    LocationWithoutCardAcceptorsResource:
      type: object
      allOf:
      - $ref: '#/components/schemas/LocationWithoutCardAcceptors'
      - properties:
          id:
            $ref: '#/components/schemas/ResourceId'
          cardAcceptorLocationType:
            title: Card Acceptor Location Type
            type: string
            description: Types of card acceptor location - ONLINE, PHONE, CARD_PRESENT
            example: ONLINE
            nullable: true
    CardAcceptorDataResource:
      title: Merchant Card Acceptor Names
      type: object
      required:
      - matchType
      - cardAcceptorName
      - id
      - status
      properties:
        matchType:
          title: Card Acceptor Match Type
          maxLength: 50
          minLength: 1
          type: string
          description: The card acceptor match type
          example: EXACT
        cardAcceptorName:
          $ref: '#/components/schemas/CardAcceptor'
        id:
          $ref: '#/components/schemas/ResourceId'
        status:
          title: Response Status
          type: string
          description: The status of Card Acceptor Name - PENDING, PASS, FAILED
          example: PENDING
    SearchFieldResource:
      type: object
      properties:
        searchParameter:
          title: Search Parameter
          type: string
          maxLength: 28
          minLength: 12
          description: Merchant api search parameter
          example: cardAcceptorName
          nullable: true
        required:
          title: Required
          type: boolean
          description: Set true if this search parameter is mandatory
          example: true
          nullable: true
        searchFieldCards:
          $ref: '#/components/schemas/CardTypesResource'
      description: Merchant Api Search Field
    AcquirerMerchantIdResource:
      type: object
      title: Acquirer reference ID & card acceptor ID resource
      description: Acquirer reference ID & card acceptor ID resource
      required:
      - id
      allOf:
      - $ref: '#/components/schemas/AcquirerMerchantId'
      - type: object
        properties:
          id:
            $ref: '#/components/schemas/ResourceId'
    CardAcceptorData:
      title: Merchant Card Acceptor Names
      type: object
      required:
      - matchType
      - cardAcceptorName
      properties:
        matchType:
          title: Card Acceptor Match Type
          type: string
          description: Types of card acceptor match type
          example: EXACT
          enum:
          - EXACT
          - STARTS_WITH
          - STRICT_CONTAINS
          - CONTAINS
        cardAcceptorName:
          $ref: '#/components/schemas/CardAcceptor'
    PageableCardAcceptorNamesResource:
      title: Pageable card acceptor names resource
      description: Pageable card acceptor names resource with pagination metadata
      properties:
        data:
          type: array
          description: List of card acceptor resources
          items:
            $ref: '#/components/schemas/CardAcceptorDataResource'
          example: []
        metadata:
          $ref: '#/components/schemas/ClarityResponseHeader'
    LocaleResource:
      allOf:
      - $ref: '#/components/schemas/Locale'
      - type: object
        properties:
          code:
            title: Code
            type: string
            description: The locale where the merchant anticipates their business to be located; often referred to as the Accept-Language in HTTP headers.
            example: EN_CA
    PageableLocationsResource:
      title: Pageable locations resource
      description: Pageable locations resource with pagination metadata
      properties:
        data:
          type: array
          description: List of Location resources
          items:
            $ref: '#/components/schemas/LocationWithoutCardAcceptorsResource'
          example: []
        metadata:
          $ref: '#/components/schemas/ClarityResponseHeader'
    AcquirerMerchantId:
      type: object
      title: Acquirer reference ID & card acceptor ID pair
      description: Acquirer reference ID & card acceptor ID pair
      required:
      - acquirerReferenceId
      - cardAcceptorId
      properties:
        acquirerReferenceId:
          $ref: '#/components/schemas/AcquirerReferenceId'
        cardAcceptorId:
          $ref: '#/components/schemas/CardAcceptorId'
        firstPartyTrustEnabled:
          type: boolean
          description: Marks the ARID/CAID pair as relevant for the FPT engine. When false, the FPT engine won't use the ARID/CAID pair for identifying transactions.
          example: true
          default: false
    CardAcceptors:
      title: Merchant Card Acceptors
      maxItems: 1500
      type: array
      uniqueItems: true
      description: List of merchant card acceptors
      nullable: true
      items:
        $ref: '#/components/schemas/CardAcceptor'
    LocationsBulkResource:
      title: Locations resource
      description: List of locations resource
      type: object
      properties:
        locations:
          type: array
          items:
            $ref: '#/components/schemas/BulkOperationResource'
          example: []
    LastName:
      title: Last Name
      maxLength: 30
      minLength: 1
      type: string
      description: The individual's last name
      example: Fox
      nullable: true
    SubMerchantState:
      required:
      - state
      properties:
        state:
          type: string
          description: State of the Sub-Merchant
          example: ACTIVE
          enum:
          - ACTIVE
          - INACTIVE
        inactivationReason:
          title: Reason for Inactivation
          type: string
          description: Reason for Inactivation. Required when state is INACTIVE.
          example: My business is closing
          minLength: 1
          maxLength: 250
    LogoImageResource:
      allOf:
      - $ref: '#/components/schemas/LogoResource'
      - type: object
        properties:
          imageBase64Encoded:
            $ref: '#/components/schemas/ImageBase64Encoded'
      description: Schema for a sub-merchant logo including image binary
    SearchFieldsResource:
      title: Search Fields Response
      type: array
      description: Search Field
      nullable: true
      items:
        $ref: '#/components/schemas/SearchFieldResource'
    SecondName:
      title: Second Name
      maxLength: 30
      minLength: 1
      type: string
      description: The individual's second name
      example: Andrew
      nullable: true
    PrimaryContact:
      title: Primary Contact
      description: Primary contact details of the merchant
      required:
      - jobTitle
      - firstName
      - lastName
      - email
      properties:
        jobTitle:
          title: Job Title
          type: string
          minLength: 1
          maxLength: 100
          description: Job title of the primary contact
          example: Manager
        firstName:
          title: First Name
          type: string
          minLength: 1
          maxLength: 50
          description: First name of the primary contact
          example: John
        lastName:
          title: Last Name
          type: string
          minLength: 1
          maxLength: 50
          description: Last name of the primary contact
          example: Doe
        email:
          $ref: '#/components/schemas/ShortEmail'
        phone:
          title: Phone
          maxLength: 30
          minLength: 3
          type: string
          description: Phone number for primary contact
          example: 1-234-567-8901
          nullable: true
    LocationResource:
      deprecated: true
      allOf:
      - $ref: '#/components/schemas/Location'
      - type: object
        properties:
          id:
            $ref: '#/components/schemas/ResourceId'
          rejectedCardAcceptorNames:
            $ref: '#/components/schemas/CardAcceptors'
          cardAcceptorLocationType:
            title: Card Acceptor Location Type
            type: string
            description: Types of card acceptor location - ONLINE, PHONE, CARD_PRESENT
            example: ONLINE
            nullable: true
    ResponseTime:
      type: string
      description: Total response time in ms
      minLength: 0
      maxLength: 10
      example: 300 ms
    AcquirerMerchantIds:
      title: Acquirer reference ID & card acceptor ID pairs
      maxItems: 100
      minItems: 1
      type: array
      uniqueItems: true
      description: Set of acquirer reference ID & card acceptor ID pairs
      items:
        $ref: '#/components/schemas/AcquirerMerchantId'
    LocationWithoutCardAcceptors:
      type: object
      required:
      - countryCode
      allOf:
      - $ref: '#/components/schemas/Address'
      - properties:
          website:
            title: Website
            maxLength: 100
            minLength: 1
            type: string
            description: URL for merchant's customer service focused information.
            example: https://merchantwebsite.example.com/customerservice.html
            nullable: true
          email:
            $ref: '#/components/schemas/ShortEmail'
          contactWebsite:
            title: Contact Website
            maxLength: 100
            minLength: 1
            type: string
            description: Merchant's contact website.
            example: https://merchantwebsite.example.com/contactus.html
            nullable: true
          displayAddressToCardHolder:
            title: Display Address To Card Holder
            type: boolean
            description: Set true to display this location's address to card holder
            example: true
            nullable: true
          displayPhoneToCardHolder:
            title: Display Phone To Card Holder
            type: boolean
            description: Set true to display this location's phone number to card holder
            example: true
            nullable: true
          refundPolicy:
            title: Refund Policy
            maxLength: 1500
            minLength: 1
            type: string
            description: Entire merchant refund policy, formatted for text display
            example: Complete merchant refund policy
            nullable: true
          terms:
            title: Terms and Conditions
            maxLength: 2000
            minLength: 1
            type: string
            description: Entire merchant Terms & Conditions, formatted for text display
            example: Entire merchant Terms & Conditions
            nullable: true
          customerServiceInstructions:
            title: Customer Service Information
            maxLength: 500
            minLength: 1
            type: string
            description: Free form text displayed to issuer that can be sent to the cardholder. Can be specific to transaction.
            example: Include Transaction ID in all communications.
            nullable: true
          additionalInfo:
            title: Additional Info
            maxLength: 1500
            minLength: 1
            type: string
            description: Additional information that a merchant would want a customer or Issuer to know in regards to a transaction.
            example: Customers can contact merchants for a refund 24 hours a day.
            nullable: true
          termsWebsite:
            title: Merchant Terms Website
            maxLength: 255
            minLength: 1
            type: string
            description: Merchant terms website URL
            example: https://merchantwebsite.example.com/terms.html
            nullable: true
          refundPolicyWebsite:
            title: Merchant Refund Policy Website
            maxLength: 255
            minLength: 1
            type: string
            description: Merchant refund policy website URL
            example: https://merchantwebsite.example.com/refunds.html
            nullable: true
          defaultLocation:
            title: Default Location
            type: boolean
            description: true if this is a default location of a merchant
            example: true
          cardAcceptorLocation:
            title: Card Acceptor Location
            maxLength: 150
            minLength: 1
            type: string
            description: Card Acceptor Location
            example: Pan American Airlines Canada
            nullable: true
          cardAcceptorLocationType:
            title: Card Acceptor Location Type
            type: string
            description: Types of card acceptor location - ONLINE, PHONE, CARD_PRESENT
            example: CARD_PRESENT
            nullable: true
            enum:
            - ONLINE
            - PHONE
            - CARD_PRESENT
        description: Merchant location details
    AcquirerMerchant:
      description: Acquirer & Merchant IDs information
      title: AcquirerMerchant
      required:
      - acquirerMerchantIds
      properties:
        acquirerMerchantIds:
          $ref: '#/components/schemas/AcquirerMerchantIds'
    SubMerchant:
      description: Schema for a sub-merchant
      allOf:
      - $ref: '#/components/schemas/Merchant'
      - type: object
        required:
        - subMerchantIdentifier
        properties:
          subMerchantIdentifier:
            $ref: '#/components/schemas/SubMerchantIdentifier'
          searchFields:
            $ref: '#/components/schemas/SearchFields'
    BaseMerchant:
      type: object
      description: Base merchant model schema
      required:
      - name
      - industryCode
      - primaryContact
      - legalAddress
      properties:
        name:
          title: Name
          maxLength: 60
          minLength: 1
          type: string
          description: Name of the merchant that the item was purchased from.
          example: Pan American Airlines
        categoryCode:
          title: Merchant Category Code
          maxLength: 4
          minLength: 4
          pattern: ^[0-9]*$
          type: string
          description: A four-digit number listed in ISO 18245 for retail financial services. MCC is used to classify the business by the type of goods or services it provides.
          example: '3002'
          nullable: true
        orderAvailabilityDateTime:
          title: Order Availability Date
          type: string
          description: The earliest date an Issuer can search for orders (i.e. the date an Issuer cannot search before). Date-Time must be in [ISO 8601 format](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6)
          example: '2021-10-18T13:56:47.123+00:00'
          format: date-time
          nullable: true
        orderHistoryMonths:
          title: Order History in Months
          maximum: 12
          minimum: 1
          type: integer
          description: The number of months worth of data you have made available to search on.
          format: int32
          example: 5
          nullable: true
        orderLatencyDays:
          title: Order Latency in Days
          maximum: 365
          minimum: 0
          type: integer
          description: 'The numbers of days that need to elapse between an authorization for a purchase and when the purchase can be searched on. '
          format: int32
          example: 5
          nullable: true
        industryCode:
          title: Industry Code
          maxLength: 3
          minLength: 3
          type: string
          description: Industry Code is used to classify the business by the type of industry.
          example: ACC
        primaryContact:
          $ref: '#/components/schemas/PrimaryContact'
        legalAddress:
          $ref: '#/components/schemas/LegalAddress'
    FirstPartyTrustEnrollmentType:
      title: First Party Trust Enrollment Types
      type: string
      description: Type of First Party Trust Enrollment
      example: CLARITY
      enum:
      - CLARITY
      - ISSM
    AcceptedAcquirerMerchantIdsResource:
      description: Accepted acquirer reference ID & card acceptor ID pairs
      type: array
      items:
        $ref: '#/components/schemas/AcquirerMerchantIdResource'
    Crm:
      title: Customer Relationship Management
      type: object
      description: Customer Relationship Management
      nullable: true
      properties:
        termsConditionsConsent:
          $ref: '#/components/schemas/TermsConditionsConsent'
        sanctionScreening:
          $ref: '#/components/schemas/SanctionScreening'
        paymentConfirmation:
          title: Payment Confirmation
          type: boolean
          description: Confirmation of payment account setup
          example: true
          default: false
    EntityName:
      title: Entity Legal/Business Name
      maxLength: 100
      minLength: 1
      type: string
      description: The entity's legal or business name.
      example: Walmart
      nullable: true
    ErrorResponse:
      required:
      - Errors
      type: object
      properties:
        Errors:
          $ref: '#/components/schemas/Errors'
      description: Error Response object
    Etag:
      title: Entity Tag
      maxLength: 100
      minLength: 1
      type: string
      description: Etag is a response header which is an identifier for a specific version of a resource.
      example: '"842DFBC17F921E7716642B9164F3B22B"'
    MerchantGuid:
      title: Merchant GUID
      maxLength: 16
      minLength: 11
      type: string
      description: Consumer Clarity internal merchant's GUID
      example: jK2dA5aybhQQBq6C
    LogoResource:
      type: object
      required:
      - status
      properties:
        status:
          title: Status
          maxLength: 100
          minLength: 1
          type: string
          description: Status of the logo
          example: ACTIVE
        messages:
          title: Messages
          type: array
          description: List of validation messages for a logo.
          nullable: true
          items:
            maxLength: 200
            minLength: 1
            type: string
            example: Logo under review
          example: []
      description: Schema for a sub-merchant logo status
    BulkOperationResource:
      title: Bulk post resource
      description: Resource with responseCode and details
      type: object
      required:
      - status
      properties:
        id:
          $ref: '#/components/schemas/ResourceId'
        errors:
          type: array
          description: List of error objects
          nullable: true
          items:
            $ref: '#/components/schemas/Error'
          example: []
        status:
          title: Response Status
          type: string
          description: The status of resource - PENDING, PASS, FAILED
          example: PENDING
    Merchant:
      description: Base merchant request schema
      required:
      - merchantType
      - locales
      - businessType
      allOf:
      - $ref: '#/components/schemas/BaseMerchant'
      - type: object
        properties:
          merchantType:
            title: Merchant Type
            type: string
            description: 'Type of a merchant. Allowed Values -

              + SUB_MERCHANT -

              + DIRECT -

              + GATEWAY - '
            example: SUB_MERCHANT
            enum:
            - SUB_MERCHANT
            - DIRECT
            - GATEWAY
          locales:
            title: Merchant Locales
            minItems: 1
            maxItems: 10
            uniqueItems: true
            type: array
            description: Merchant Locales
            items:
              $ref: '#/components/schemas/Locale'
          locations:
            title: Merchant Locations
            minItems: 0
            maxItems: 50
            uniqueItems: true
            type: array
            description: Merchant Locations
            deprecated: true
            nullable: true
            items:
              $ref: '#/components/schemas/Location'
          contentTypes:
            title: Content Types
            uniqueItems: true
            type: array
            description: An indicator as to the type of products and services you offer.
            nullable: true
            example:
            - ADULT_LANGUAGE
            items:
              type: string
              enum:
              - ADULT_LANGUAGE
              - ADULT_PRODUCTS
              - ADULT_SERVICES
              - GAMBLING
              - ONLINE_DATING
              - OTHER
          crm:
            $ref: '#/components/schemas/Crm'
          businessType:
            title: Merchant Business Type
            type: string
            description: Business type describes the legal structure under which the business operates
            example: BUSINESS_CORPORATION
            enum:
            - SOLE_PROPRIETORSHIP
            - BUSINESS_CORPORATION
            - OTHER
          firstPartyTrustEnrollments:
            title: First Party Trust Enrollments
            description: A list of First Party Trust Enrollments
            type: array
            minLength: 0
            maxLength: 2
            uniqueItems: true
            nullable: true
            items:
              $ref: '#/components/schemas/FirstPartyTrustEnrollment'
    Errors:
      required:
      - Error
      type: object
      properties:
        Error:
          type: array
          description: List of error objects
          items:
            $ref: '#/components/schemas/Error'
          example: []
      description: Errors object
    BeneficialOwner:
      title: Beneficial Owner
      description: Individual owning the merchant.
      type: object
      properties:
        firstName:
          $ref: '#/components/schemas/FirstName'
        secondName:
          $ref: '#/components/schemas/SecondName'
        lastName:
          $ref: '#/components/schemas/LastName'
        address:
          $ref: '#/components/schemas/ShortAddress'
        birthCountry:
          $ref: '#/components/schemas/CountryCode'
        birthDate:
          title: Beneficial Owner Birth Date
          description: Beneficial owner birth date. Date must be in a [ISO 8601 format](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6)
          type: string
          format: date
          example: '1977-05-23T00:00:00.000Z'
          nullable: true
        percentOwnership:
          $ref: '#/components/schemas/PercentOwnership'
    Address:
      title: Address
      description: Address entity associated to merchant's location and legal address.
      required:
      - countryCode
      allOf:

  parameters:
    ClientId:
      name: x-openapi-clientid
      in: header
      description: ClientId is a unique and a mandatory ID shared while creating a project on Mastercard Developers Portal.
      required: true
      schema:
        type: string
        example: 0a7e433a-63fc-4557-8cf4
    Limit:
      name: limit
      in: query
      description: limit
      required: false
      schema:
        type: integer
        format: int32
        example: 25
    ProgramId:
      name: ProgramId
      in: header
      description: ProgramId is an optional field, but if a client has more than one program associated to it, then this field becomes mandatory.
      required: false
      schema:
        type: string
        example: 80380ef2-5037-4e57-86bf-1bdd1efb0ae2
    Offset:
      name: offset
      in: query
      description: offset
      required: false
      schema:
        type: integer
        format: int32
        example: 10
    Donor:
      name: donor_id
      in: path
      description: donor_id
      required: true
      schema:
        type: string
        example: 652ce9ff-fa5f-4e9f-8151-c73fa20088f7
    donorId:
      name: donor_id
      in: query
      description: Donor
      required: false
      schema:
        type: integer
        example: 652ce9ff-fa5f-4e9f-8151-c73fa20088f7
    Programid:
      name: ProgramId
      in: header
      description: ProgramId is an required field.
      required: true
      schema:
        type: string
        example: 80380ef2-5037-4e57-86bf-1bdd1efb0ae2
    CorrelationId:
      name: x-correlation-id
      in: header
      description: CorrelationId is a unique donation request ID. It is recommended to pass the x-correlation-id by the customer and to use the format "bankname_UUID" (bank name can be indicated using the first 4 digits). Maximum length of this field should be 100 alphanumeric characters. If not passed, Mastercard will generate it.
      required: false
      schema:
        type: string
        example: 03f8c4e8-8bdc-4a30-a2b4-b6f989e96ca3
    authorization:
      name: Authorization
      in: header
      description: Every request sent to the Merchant API must be authorized. To facilitate authorization, every request must contain a time stamped, symmetric-key based HMAC signature header. The HMAC signature ensures that the API secret key and key ID are exchanged securely between Ethoca and the merchant out-of-band. The entropy of the issued API key must be no less than 128 bits. ETHOCA-SHA1 KeyRef=<API Key_ID>,Signature=<base64UrlSafe_hmac_signature>
      required: true
      example: 1c723b9ddda75f6348cd939c5a3140f58e58c70d
      schema:
        type: string
    eth_date:
      name: X-Eth-Date
      in: header
      description: Date time in UTC format when request was sent to the Merchant API
      required: false
      example: '2017-06-19T13:18:16Z'
      schema:
        type: string
        minLength: 10
        maxLength: 25

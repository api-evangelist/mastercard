    Payment:
      type: object
      properties:
        id:
          minLength: 1
          maxLength: 100
          type: string
          description: Payment object unique identifier (merchant generated sequence-based ID for each payment, for example 1, 2, 3, 4...)
          example: '3'
        matchedPayment:
          type: boolean
          description: Indicates whether a payment record matches the transaction search attributes
          example: true
        paymentType:
          $ref: '#/components/schemas/PaymentType'
        cardFirstSix:
          minLength: 6
          maxLength: 6

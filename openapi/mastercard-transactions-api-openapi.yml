        uDeviceId:
          type: string
          description: The generated unique device identifier.
          example: UDID-9284e12b85b0d2763c13d734c70b1d62
        lastSeen:
          description: The ISO UTC timestamp when the device was last seen.
          type: string
          example: '2022-06-03T18:00:50Z'
        firstSeen:
          description: The ISO UTC timestamp when the device was first seen.
          type: string
          example: '2022-03-01T13:00:50Z'
        lastSeenDays:
          description: Number of of days since the device was last seen. If the device has not been observed before, lastSeenDays will be 0.
          type: integer
          format: int64
          example: 10
          minimum: 0
          maximum: 999999999
        firstSeenDays:
          description: Number of days since the device was first seen. If the device has not been observed before, firstSeenDays will be 0.
          type: integer
          format: int64
          example: 10
          minimum: 0
          maximum: 999999999
        accountDeviceId:
          description: This field contains the account device identification hash. If hashedAccountId (optional field) is not present in the request or the device resolved to a default UDID, the accountDeviceId field will be omitted from the response
          type: string
          example: b01e4f5e5e984a79ad5ff38e65ddf198
        deviceInfo:
          $ref: '#/components/schemas/DeviceInfo'
        insightFactor:
          $ref: '#/components/schemas/InsightFactor'
        riskFactor:
          $ref: '#/components/schemas/RiskFactor'
        trustFactor:
          $ref: '#/components/schemas/TrustFactor'
        alerts:
          type: array
          example:
          - Unable to generate Insights
          items:
            type: string
            description: Returns alert message when unable to generate insights.
    RiskFactor:
      description: 'The risk factor is represented numerically using a range from 0 (no risk data) to 5 (high risk). Each numerical value and its associated risk representation is shown below.

        * `0` - Represents an unknown risk because no data on this device is available.

        * `1` - Represents a no or low risk request.

        * `2` - Represents a low risk request.

        * `3` - Represents a medium risk request.

        * `4` - Represents a high risk request.

        * `5` - Represents a very high risk request.


        The risk factor is typically used to identify scenarios where a service provider may want to introduce consumer friction on the authorization process to validate the identity of the consumer. Example usage by a service provider may be to implement controls such as multifactor authentication for calculated risk factors of `3` or `4` and request blocking for risk factors of `5`.'
      maximum: 5
      type: integer
      minimum: 0
      example: 2
    TransactionInsightsData:
      required:
      - purchaseDate
      - purchaseAmount
      - purchaseCurrencyExponent
      - purchaseCurrency
      - merchantName
      - merchantCountryCode
      - mcc
      type: object
      properties:
        purchaseDate:
          description: The purchase date in format YYYYMMDDHHMMSS
          example: '20220721173228'
          type: string
          minLength: 14
          maxLength: 14
        purchaseAmount:
          description: The amount of the transaction in the currency's basic unit. If the purchase amount is USD 123.45, element will contain the value 12345. Max value is MAX_LONG (9223372036854775807)
          example: '12345'
          type: string
          minLength: 1
          maxLength: 19
          pattern: ^\d{1,19}$
        purchaseCurrencyExponent:
          description: The Purchase currency Exponent. If the purchase amount is USD 123.45, then the exponent will contain 2.
          example: '2'
          type: string
          minimum: 0
          maximum: 9
        purchaseCurrency:
          description: 'The currency of the transaction amount, as an ISO-4217 currency code. See: [ISO-4217](https://www.nationsonline.org/oneworld/currencies.htm)'
          type: string
          format: ISO-4217-3,
          minLength: 3
          maxLength: 3
          example: '840'
        merchantName:
          description: The name of the business.
          example: Acme Inc
          type: string
          minLength: 1
          maxLength: 40
        merchantCountryCode:
          example: '840'
          type: string
          format: ISO-3166
          description: 'The ISO-3166 numeric country code of the merchant associated with the transaction. See: [ISO-3166](https://www.nationsonline.org/oneworld/country_code_list.htm).'
          minLength: 3
          maxLength: 3
        mcc:
          description: The Merchant Category Code associated with the transaction.
          example: '0742'
          type: string
          minLength: 4
          maxLength: 4
        ipAddress:
          description: 'IPv4 address is represented in the dotted decimal format of 4 sets

            of decimal numbers separated by dots. The decimal number in each and

            every set is in the range 0 to 255. IPv6 address is represented as

            eight groups of four hexadecimal digits, each group representing 16

            bits (two octets. The groups are separated by colons (:).

            - Optional to generate individual insights

            - Required to generate device insights'
          example: 198.51.100.42
          type: string
          minLength: 7
          maxLength: 45
        userAgent:
          pattern: ^(?!\s*$).+
          description: 'The user-agent string of the consumer device attempting to authorize

            with your product or service. The user-agent must represent the HTTP

            client of the service consumer with details on the software

            originating the request.

            - Optional to generate individual insights

            - Required to generate device insights'
          type: string
          example: Mozilla/5.0 (compatible; MSIE 10.0; Windows NT 7.0; InfoPath.3; .NET CLR 3.1.40767; Trident/6.0; en-IN)
        canvas:
          description: The canvas signature of the browser installed on the consumer device.
          type: string
          example: e1af96a2e8af1115
          minLength: 0
          maxLength: 999
        webGl:
          description: The webGL signature of the browser installed on the consumer device.
          type: string
          example: wg1-ce04533340ea94cf
          minLength: 0
          maxLength: 999
        timeZone:
          description: Time-zone of the consumer device. The timezone must be a number of the time-zone offset, in minutes, from the date based on current host system settings to UTC.
          type: string
          example: '600'
          pattern: ^-?\d+$
        screenResolution:
          description: The screen resolution of the consumer device attempting to authorize with your product or service.
          type: string
          example: 1024x820
          pattern: ^\s*\d+\s*x\s*\d+\s*\d*\s*$
        localStorage:
          description: Flag to local storage is enabled on the consumer device.
          type: boolean
          example: true
        language:
          description: The language of the consumer device. The language must be a string representing the language version as defined in BCP-47.
          type: string
          example: zh-TW
          pattern: ^[a-zA-Z]{1,3}(-{1}[a-zA-Z0-9]{1,10})*?
        colorDepth:
          description: The device screen color depth value.
          type: integer
          example: 24
          minimum: 0
          maximum: 99999
        buildManufacturer:
          description: Manufacturer of the product/hardware.
          type: string
          example: Apple
        placement:
          description: This optional field contains the placement identifier within the application.
          type: string
          example: Registration
        androidBuildVersion:
          description: Build is used to determine information about the current build, extracted from system properties.
          type: string
          example: '12'
        androidSdkInt:
          description: The user-visible SDK version of the framework; its possible values are defined in Build.VERSION_CODES.
          type: string
          example: '31'
        buildFingerprint:
          description: String that uniquely identifies this build.
          type: string
          example: samsung/a32xsq/a32x:12/SP1A.210812.016/A326USQS7BVF2:user/release-keys
        buildBrand:
          description: Consumer-visible brand with which the product/hardware will be associated, if any.
          type: string
          example: Apple
        supportedFeatures:
          description: List of the supported features on the consumer device.
          type: array
          items:
            type: string
          example: '["mhac","mhtse","mhcdma","mhgy"]'
        model:
          description: 'Mobile device manufacturer and modelAndroid: Build.MANUFACTURER + " " + Build.MODEL returns the mobile device manufacturer and model, For example,"samsung SM-G960U1",


            iOS: utsname.machine returns the device model, For example, "iPhone10.4". Note: Apple as a manufacturer is not included because it is the same for all iOS devices.'
          type: string
          example: iPhone
        sdkUserAgent:
          description: 'The unique package name/bundle identifier of the client''s application.


            Android: obtained from the applicationContext.getPackageName() method.


            iOS: obtained from the [NSBundle mainBundle] bundleIdentifier property.'
          type: string
          example: 14.3.1.7
        majorOsVersion:
          description: Major operating system version.
          type: integer
          example: 12
        minorOsVersion:
          description: Minor operating system version.
          type: integer
          example: 0
        simCountryIso:
          description: ISO country code equivalent for the SIM provider's country code.
          type: string
          example: us
        simOperator:
          description: MCC+MNC (mobile country code + mobile network code) of the SIM provider.
          type: string
          example: T-Mobile
        primaryStorage:
          format: int64
          description: Device primary storage size.
          type: integer
          example: 117027876864
        systemMemory:
          format: int64
          description: Device System memory size.
          type: integer
          example: 5847543808
        buildProduct:
          description: Name of the overall product.
          type: string
          example: beyond0qltesq
        vendorAppId:
          description: Alphanumeric string that uniquely identifies a device to the app vendor.
          type: string
          example: 64BAA4F0-9EBC-713E-5B5B-2AF40AB4123A
        storedDeviceId:
          description: Optional unique device identifier that merchant can store on consumer device. E.g with cookie in web flow.
          type: string
          example: wyett276tuygey6r
        androidId:
          description: Google's unique device identifier. A 64-bit number (as a hex string) that is randomly generated when the end user first sets up the device.
          type: string
          example: 38400000-8cf0-11bd-b23e-10b96e40000d
        hashedAccountId:
          description: The hashed account identifier used during the authorization attempt.
          type: string
          example: d1e8a70b5ccab1dc2f56bbf7e99f064a660c08e361a3
          minLength: 0
          maxLength: 999
        endCustomerRefId:
          description: The End Customer Reference identifier is used during the reseller transaction request.
          type: string
          example: '45342'
          minLength: 1
          maxLength: 40
        cookiesEnabled:
          description: Flag to indicate cookies are enabled on the consumer device.
          type: boolean
          example: true
        plugins:
          description: A list of browser plugins.
          type: array
          items:
            type: string
          example:
          - Adobe Acrobat
          - QuickTime
        acquirerMerchantId:
          description: The merchant ID that the transaction was processed under, as assigned by the acquirer.
          type: string
          example: ACME
          minLength: 1
          maxLength: 40
        acquirerBin:
          description: The BIN (Bank Identification Number) of the acquirer.
          example: '444444'
          type: string
          minLength: 1
          maxLength: 11
        cardHolderName:
          description: The full name of the person.
          example: Waidong L Syrws
          type: string
          minLength: 1
          maxLength: 45
        secondaryName:
          description: The full name of the person.
          example: Waidong L Syrws
          type: string
          minLength: 1
          maxLength: 45
        primaryEmail:
          description: The primary contact detail - Email id
          example: john@mastercard.com
          type: string
          format: email
          minLength: 3
          maxLength: 254
        secondaryEmail:
          description: Secondary email to contact if primary details are not reachable
          example: ted@mastercard.com
          type: string
          minLength: 3
          maxLength: 254
          format: email
        mobilePhone:
          $ref: '#/components/schemas/PhoneDetails'
        billingAddress:
          $ref: '#/components/schemas/Address'
        shippingAddress:
          $ref: '#/components/schemas/Address'
        homePhone:
          $ref: '#/components/schemas/PhoneDetails'
        workPhone:
          $ref: '#/components/schemas/PhoneDetails'
        accountDetails:
          $ref: '#/components/schemas/AccountDetails'
    Error_3:
      type: object
      properties:
        Source:
          type: string
          description: The source of the problem. i.e where the error occurred
          example: IIT
          minLength: 1
          maxLength: 15
        ReasonCode:
          type: string
          description: A code defining the error, as defined in documentation
          example: VALIDATION_ERROR
          minLength: 1
        Description:
          type: string
          description: A description for this specific occurrence of the above ReasonCode
          example: Invalid Format
          minLength: 1
        Recoverable:
          type: boolean
          description: Whether or not retrying this request could result in a successful response.
          example: false
        Details:
          type: string
          description: More details of this specific error. This is an optional field and is sometimes used to give a more comprehensive description of the error that has occurred, when required.
          example: purchaseDate, billingAddress.city
          minLength: 1

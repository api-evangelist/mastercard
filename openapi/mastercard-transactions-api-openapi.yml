        trialIntervalUnit:
          type: string
          minLength: 3
          maxLength: 5
          description: "The trial renewal interval\n\nAllowed values:\n  - Day\n  - Week\n  - Month\n  - Year\n"
          example: Month
        trialActivationDateTime:
          type: string
          minLength: 20
          maxLength: 20
          description: Date the trial was activated for the customer (String based date/time representation in International Date Time Format (ISO 8601) in UTC - yyyy-mm-ddThh:mm:ssZ)
          format: date-time
          example: '2017-06-19T13:18:18Z'
        trialStartDateTime:
          type: string
          minLength: 20
          maxLength: 20
          description: Date the trial began with the customer (String based date/time representation in International Date Time Format (ISO 8601) in UTC - yyyy-mm-ddThh:mm:ssZ)
          format: date-time
          example: '2017-06-19T13:18:18Z'
        trialEndDateTime:
          type: string
          minLength: 20
          maxLength: 20
          description: Date the trial expires (String based date/time representation in International Date Time Format (ISO 8601) in UTC - yyyy-mm-ddThh:mm:ssZ)
          format: date-time
          example: '2017-06-19T13:18:18Z'
        trialPrice:
          type: string
          minLength: 1
          maxLength: 12
          description: Cost of the trial, pre-tax (maximum number of fractional digits supported is 2)

          $ref: '#/components/schemas/CardLastFour'
        cardCvv2ValidationOutcomeAtPurchase:
          type: string
          minLength: 1
          maxLength: 1
          pattern: ^[A-Za-z0-9]{1,1}$
          description: "Card CVV2 verification code received at the purchase\n\nAllowed values:\n  - X\n  - U\n  - P\n  - Y\n  - D\n  - N\n\nDefinition of allowed values:\n  - X: No information available\n  - U: The issuer has not certified or has not provided the encryption keys\n  - P: Card verification not performed\n  - Y: Valid\n  - D: Invalid\n  - N: Not attempted\n"
          example: X
        addressValidationServiceMatch:
          type: string
          minLength: 1
          maxLength: 1
          description: "Indicates whether the billing address was validated with an AVS service\n\nAllowed values:\n  - Y\n  - N\n  - U\n\nDefinition of allowed values:\n  - Y: Yes\n  - N: No\n  - U: Unavailable\n"
          example: Y
        totalBeforeTax:
          description: Subtotal (before tax). Maximum number of fractional digits supported is 2.
          type: string
          minLength: 1
          maxLength: 12
          example: '898.96'
        paymentAmount:
          type: string
          minLength: 1
          maxLength: 12
          description: Total amount of this payment. Maximum number of fractional digits supported is 2.
          example: '250.35'
        transactionIdentifierValue:
          minLength: 1
          maxLength: 30
          type: string
          description: The TransactionId for this order; for Mastercard purchases, this is field DE63, and for Visa this is Tran ID or Tran ID1.
          example: 90989JJJNM7767
        acquirerReferenceNumber:
          minLength: 23
          maxLength: 23
          type: string
          description: Display of the Acquirer Reference Number for this order
          example: '12345678901234567890123'
        issuerAuthorizationCode:
          minLength: 6
          maxLength: 6
          type: string
          description: Pre-authorization code returned by the processor
          example: 89ii88
        authorizationDateTime:
          type: string
          minLength: 20
          maxLength: 20
          description: Display of the Authorization date (String based date/time representation in International Date Time Format (ISO 8601) in UTC - yyyy-mm-ddThh:mm:ssZ)
          format: date-time
          example: '2017-06-19T13:18:18Z'
        transactionType:
          type: string
          minLength: 4
          maxLength: 10
          description: "Type of payment transaction\n\nAllowed values:\n  - Adjustment\n  - Credit\n  - Reversal\n  - Sale\n"
          example: Credit
        merchantIdentificationNumber:
          minLength: 1
          maxLength: 50
          type: string
          description: Merchant Identification Number (MID). Assigned by acquirer.
          example: GOOG9898K87
        paymentGatewayId:
          minLength: 1
          maxLength: 10
          type: string
          description: This is passed as part of the transaction. Key for merchants with more than one gateway.
          example: CH8989V01
        paymentGatewayDescriptor:
          minLength: 1
          maxLength: 50
          type: string
          description: The descriptor for the payment gateway
          example: Channel 89 version 1 gateway.
        merchantBillingDescriptor:
          minLength: 1
          maxLength: 24
          type: string
          description: The settled descriptor that shows on the credit card holder's statement at settlement
          example: Google Storage.
        authorizedMerchantBillingDescriptor:
          minLength: 1
          maxLength: 24
          type: string
          description: The pre-settlement authorized descriptor that shows on the website or app being used by the credit card holder
          example: Subscription renewal
        billingName:
          $ref: '#/components/schemas/NameType'
        billingAddress:

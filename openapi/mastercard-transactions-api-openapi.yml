        subscriptionActivationDateTime:
          type: string
          minLength: 20
          maxLength: 20
          description: Date the subscription was activated for the customer  (String based date/time representation in International Date Time Format (ISO 8601) in UTC - yyyy-mm-ddThh:mm:ssZ)
          format: date-time
          example: '2017-06-19T13:18:18Z'
        subscriptionStartDateTime:
          type: string
          minLength: 20
          maxLength: 20
          description: Date the subscription/contract began with the customer (String based date/time representation in International Date Time Format (ISO 8601) in UTC - yyyy-mm-ddThh:mm:ssZ)
          format: date-time
          example: '2017-06-19T13:18:18Z'
        subscriptionExpirationDateTime:
          type: string
          minLength: 20
          maxLength: 20
          description: Date the subscription expires (String based date/time representation in International Date Time Format (ISO 8601) in UTC - yyyy-mm-ddThh:mm:ssZ)
          format: date-time
          example: '2017-06-19T13:18:18Z'
        subscriptionCancellationDateTime:
          type: string
          minLength: 20
          maxLength: 20
          description: Date the subscription was cancelled (String based date/time representation in International Date Time Format (ISO 8601) in UTC - yyyy-mm-ddThh:mm:ssZ)
          format: date-time
          example: '2017-06-19T13:18:18Z'
        subscriptionPrice:
          type: string
          minLength: 1
          maxLength: 12
          description: Cost of the subscription, pre-tax (maximum number of fractional digits supported is 2)
          example: '16'
        subscriptionInterval:
          type: integer
          minimum: 0
          maximum: 99999
          format: int32
          description: The multiplier for the subscription renewal period, combines with subscriptionIntervalUnit (for example, a 1 in this field + Month in subscriptionIntervalUnit means subscription renews once per month
          example: 1
        subscriptionIntervalUnit:
          type: string
          minLength: 3
          maxLength: 5
          description: "The subscription renewal interval\n\nAllowed values:\n  - Day\n  - Week\n  - Month\n  - Year\n"
          example: Year
        subscriptionStatus:
          type: string
          minLength: 6
          maxLength: 11
          description: "Current status of the subscription\n\nAllowed values:\n  - Active\n  - Cancelled\n  - Expired\n  - Not_Started\n"
          example: Active
        subscriptionCurrentPeriodStarted:
          type: string
          minLength: 20
          maxLength: 20
          description: Date the subscription period/billing cycle started. (String based date/time representation in International Date Time Format (ISO 8601) in UTC - yyyy-mm-ddThh:mm:ssZ)
          format: date-time
          example: '2017-06-19T13:18:18Z'
        subscriptionCurrentPeriodEnds:
          type: string
          minLength: 20
          maxLength: 20
          description: Date the subscription period/billing cycle ends (String based date/time representation in International Date Time Format (ISO 8601) in UTC - yyyy-mm-ddThh:mm:ssZ)
          format: date-time
          example: '2017-06-19T13:18:18Z'
        subscriptionFirstPaymentDateTime:
          type: string
          minLength: 20
          maxLength: 20
          description: Date of the first subscription payment, not the trial payment (String based date/time representation in International Date Time Format (ISO 8601) in UTC - yyyy-mm-ddThh:mm:ssZ)
          format: date-time
          example: '2017-06-19T13:18:18Z'
        subscriptionFirstPayment:
          description: Amount of the first subscription payment, not the trial payment (maximum number of fractional digits supported is 2)
          type: string
          minLength: 1
          maxLength: 12
          example: '909.96'
        subscriptionNextBillingDateTime:
          type: string
          minLength: 20
          maxLength: 20
          description: Next subscription billing date in the cycle (String based date/time representation in International Date Time Format (ISO 8601) in UTC - yyyy-mm-ddThh:mm:ssZ)
          format: date-time
          example: '2017-06-19T13:18:18Z'
        subscriptionDuration:
          type: integer
          minimum: 0
          maximum: 99999
          format: int32
          description: Number of remaining billing cycles
          example: 3
        numberOfHistoricSuccessfulPayments:
          type: integer
          minimum: 0
          maximum: 99999
          format: int32
          description: Number of historical successful payments
          example: 6
        balanceOnSubscription:
          description: Balance on the subscription contract (maximum number of fractional digits supported is 2)
          type: string
          minLength: 1
          maxLength: 12
          example: '120'
        cancellationPenalty:
          type: boolean
          description: Indicates whether there is a cancellation penalty
          example: true
        cancellationPenaltyDescription:
          minLength: 1
          maxLength: 500
          type: string
          description: A short written description of the penalty/policy
          example: Users have to pay penalty fee for cancellation
        subscriptionCancellationPolicy:
          minLength: 1
          maxLength: 200000
          type: string
          description: The full subscription cancellation policy
          example: Some description explaining all cancellation policies and conditions.
        subscriptionCancellationPolicyLink:
          minLength: 1
          maxLength: 500
          type: string
          description: The link to the full subscription cancellation policy
          example: http://somesite.com/cancellationpolicy.html
        subscriptionContract:
          minLength: 1
          maxLength: 200000
          type: string
          description: The full subscription contract
          example: Contract description for the subscription with all details.
        subscriptionContractLink:
          minLength: 1
          maxLength: 500
          type: string
          description: Link to the full subscription contract
          example: http://somelink.com/contract.html
        subscriptionDisputed:
          type: boolean
          description: Indicates whether this recurring item was disputed previously
          example: true
        subscriptionFirstPaymentDisputed:
          type: boolean
          description: Indicates whether the dispute was for the first subscription payment or trial payment
          example: true
        subscriptionDisputeDateTime:
          type: string
          minLength: 20
          maxLength: 20
          description: Date the Subscription was disputed (String based date/time representation in International Date Time Format (ISO 8601) in UTC - yyyy-mm-ddThh:mm:ssZ)
          format: date-time
          example: '2017-06-19T13:18:18Z'
    CurrencyCode:
      minLength: 3
      maxLength: 3
      type: string
      description: Currency code applied to order. This currency will apply to all amount/price fields throughout entire payload. Must be three character ISO currency code (https://en.wikipedia.org/wiki/ISO_4217#Active_codes)
      example: USD
    Error_2:
      type: object
      required:
      - ReasonCode
      properties:
        Source:
          maxLength: 100
          minLength: 0
          type: string
          description: Source of the error
          example: Service
        ReasonCode:
          maxLength: 100
          minLength: 0
          type: string
          description: Unique code identifying the error case
          example: REQUEST_BODY_MALFORMED
        Description:
          maxLength: 1000
          minLength: 0
          type: string
          description: Short description of the error
          example: MerchantCriteria must not be null.
        Recoverable:
          type: boolean
          description: Indicates whether this error will always be returned for this request, or if retrying could change the outcome
          example: false
          default: false
        Details:
          maxLength: 1000
          minLength: 0
          type: string
          description: Optional detailed description of the issue
          example: MerchantCriteria object is a mandatory field and must not be null.
      description: Error object
    BillingInsights:
      type: object
      properties:
        validityLevel:
          description: 'The most granular level to which the address could be validated. Ex. If the address was only valid to the city level (but not to the house level), it would return valid_to_city.Possible Values are: * valid_to_house_number * missing_address * invalid * valid * valid_to_street * valid_to_country * valid_to_city * valid_to_house_number_missing_apt'
          example: valid_to_street
          type: string
          minLength: 1
          maxLength: 100
        firstSeenDays:
          description: Number of days that have passed since the address was first seen.
          example: 234
          type: integer
          format: int64
          minimum: 0
          maximum: 999999999
        lastSeenDays:
          description: Number of days that have passed since the address was last seen.
          example: 234
          type: integer
          format: int64
          minimum: 0
          maximum: 999999999
        matchToName:
          description: 'The match status between either of the input names (person or business) and the queried entity. Possible values are: * not-found * match * no-match'
          example: no-match
          type: string
          minLength: 1
          maxLength: 100
        shippingAddressRelationship:
          description: 'The relationship between billing and shipping address. Possible values are: * `match` * `city_match` * `seen_together` * `seen_with_others` * `no_relationship` * `null`'
          example: no_relationship
          type: string
          minLength: 1
          maxLength: 100
    Scores:
      type: object
      properties:
        ipRisk:
          $ref: '#/components/schemas/IpRisk'
        identityRisk:
          $ref: '#/components/schemas/IdentityRisk'
    IdentityRisk:
      type: object
      properties:
        score:
          description: A comprehensive 0-500 score associated with the individual's identity.
          minimum: 0
          maximum: 500
          example: 375
          type: integer
          format: int64
        reasonCode:
          description: 'Reason code explanation value for the identity risk score based on data provided. Possible values are: * High Severity : AA-AP * Medium Severity : JA-JF * Low Severity : RA-RP'
          example: RA
          type: string
          minLength: 2
          maxLength: 2
    ShippingInsights:
      type: object
      properties:
        validityLevel:
          description: 'The most granular level to which the address could be validated. Ex. If the address was only valid to the city level (but not to the house level), it would return valid_to_city. Possible Values are: * valid_to_house_number * missing_address * invalid * valid * valid_to_street * valid_to_country * valid_to_city * valid_to_house_number_missing_apt'
          example: valid_to_street
          type: string
          minLength: 1
          maxLength: 100
        firstSeenDays:
          description: Number of days that have passed since the address was first seen.
          example: 234
          type: integer
          format: int64
          minimum: 0
          maximum: 999999999
        lastSeenDays:
          description: Number of days that have passed since the address was last seen.
          example: 234
          type: integer
          format: int64
          minimum: 0
          maximum: 999999999
        matchToName:
          description: 'The match status between either of the input names (person or business) and the queried entity. Possible values are: * not-found * match * no-match'
          example: no-match
          type: string
          minLength: 1
          maxLength: 100
    PrimaryEmail:
      type: object
      properties:
        firstSeenDays:
          description: Count of days since the email was first observed in Ekata's Identity Network. If the email has not been observed before, first_seen_days will be 0.
          example: 234
          type: integer
          format: int64
          minimum: 0
          maximum: 999999999
        lastSeenDays:
          description: Number of days that have passed since the email address was last seen.
          example: 234
          type: integer
          format: int64
          minimum: 0
          maximum: 999999999
        valid:
          description: True if the email address is valid
          type: boolean
          example: true
        domainCreationDate:
          description: The date when the email domain was created. Format is YYYY-MM-DD.
          example: '2000-11-29'
          pattern: ^\d{4}-\d{2}-\d{2}
          type: string
        matchToName:
          description: The match status between the input name and the queried entity.
          example: no-match
          type: string
          minLength: 1
          maxLength: 100
        mailboxVelocity:
          description: Number of times email has been seen in last 180 days.
          example: 3
          type: integer
          format: int64
          minimum: 0
          maximum: 1000
        isDisposable:
          description: True if the email domain is disposable. Disposable emails are generally associated with fraudulent activities. If true, this is one of the strongest risk indicators and the transaction should be flagged for further review.
          example: false
          type: boolean
        emailRisk:
          $ref: '#/components/schemas/EmailRiskScore'
    PhoneDetails:
      type: object
      properties:
        cc:
          description: Country code
          example: '1'
          type: string
          minLength: 1
          maxLength: 3
          pattern: ^\d{1,3}$
        subscriber:
          description: Subscriber section of the number
          example: '3143978691'
          type: string
          minLength: 1
          maxLength: 15
          pattern: ^\d{1,15}$
      example:
        cc: '1'
        subscriber: '3143978691'
    Ip:
      type: object
      properties:
        billingAddressDistance:
          description: The distance (in miles) between the IP address and the physical address.
          example: 240
          type: integer
          format: int64
        lastSeenDays:
          description: Number of days that have passed since the IP address was last seen.
          example: 234
          type: integer
          format: int64
          minimum: 0
          maximum: 999999999
        connectionType:
          description: 'Ip Connection type description. Possible values are: * cable-dsl * corporate * cellular * dialup'
          example: cable-dsl
          type: string
        shippingAddressDistance:
          description: The distance (in miles) between the IP address and the physical address.
          example: 240
          type: integer
          format: int64
    PaymentCard:
      type: object
      properties:
        cardHolderNamefirstSeenDays:
          description: Count of days since the payment card and name was first observed in the network. If they have not been observed together before, first seen days will be 0.
          format: int64
          type: integer
          example: 55
        cardHolderNameVelocity:
          description: Count of times the payment card and name have been observed in the network over the past 90 days. If they have not been observed together in the past 90 days, velocity will be 0.
          format: int64
          type: integer
          example: 24
    Phone:
      type: object
      properties:
        matchToName:
          description: 'The match status between either of the input names (person or business) and the queried entity. Possible values are: * not-found * match * no-match'
          example: no-match
          type: string
          minLength: 1
          maxLength: 100
        lineType:
          description: The line type of the phone number. * landline - Traditional wired phone line. * fixed-voip - VOIP-based fixed line phones. * mobile - Wireless phone line. * voicemail - Voicemail-only service. * toll-free - Callee pays for call. * premium - Caller pays a premium for the call-e.g. 976 area code. * non-fixed-voip - Skype, for example. * other - Anything that does not match the previous categories.
          example: other
          type: string
        valid:
          description: True if the phone number is valid.
          type: boolean
          example: true
        phoneNumberCarrier:
          description: The company that provides voice and/or data services for the phone number. Carriers are returned at the MVNO level.
          example: Ekata Telco
          type: string
          minLength: 1
          maxLength: 50
    EmailRiskScore:
      type: object
      properties:
        score:
          description: Comprehensive risk score associated with an email address, with a higher score indicating a riskier individual.  A number between 0 and 1 rounded to three decimal places.
          format: double
          maximum: 1
          type: number
          minimum: 0
          example: 0.445
    TransactionInsights:
      type: object
      required:
      - id
      properties:
        id:
          type: string
          description: The generated unique transaction identifier.
          example: be3ad617-04ad-43e1-a438-79425b6511b6
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
          minLength: 36
          maxLength: 36
        deviceInsights:
          $ref: '#/components/schemas/DeviceInsights'
        individualInsights:
          $ref: '#/components/schemas/IndividualInsights'
    IndividualInsights:
      type: object
      description: The details associated with the individual insights.
      properties:
        primaryEmail:
          $ref: '#/components/schemas/PrimaryEmail'
        ip:
          $ref: '#/components/schemas/Ip'
        homePhone:
          $ref: '#/components/schemas/Phone'
        mobilePhone:
          $ref: '#/components/schemas/Phone'
        billingAddress:
          $ref: '#/components/schemas/BillingInsights'
        shippingAddress:
          $ref: '#/components/schemas/ShippingInsights'
        scores:
          $ref: '#/components/schemas/Scores'
        workPhone:
          $ref: '#/components/schemas/Phone'
        paymentCard:
          $ref: '#/components/schemas/PaymentCard'
        paymentAmount:
          $ref: '#/components/schemas/PaymentAmount'
        alerts:
          example:
          - firstSeenDays
          - valid
          type: array
          items:
            type: string
            description: Returns a list of fields affected in the rare case of a partial data outage; otherwise it will be empty. In the case of a partial data outage, it is recommended to use the partial response in the real-time transaction model and use the alerts field data for diagnostics in post transaction.
        warnings:
          description: An array containing warning messages.
          example:
          - 'Primary Email: Invalid username syntax'
          - 'Shipping Address: Missing country_code'
          type: array
          items:
            type: string
      additionalProperties: false
    InsightFactor:
      description: 'The insight factor is represented numerically using a range from 0 (no risk data) to 5 (high risk). Each numerical value and its associated risk representation is shown below.

        * `0` - Represents an unknown risk because no data on this device is available.

        * `1` - Represents a no or low risk request.

        * `2` - Represents a low risk request.

        * `3` - Represents a medium risk request.

        * `4` - Represents a high risk request.

        * `5` - Represents a very high risk request.


        The insight factor is typically used to identify scenarios where a service provider may want to introduce consumer friction on the authorization process to validate the identity of the consumer. Example usage by a service provider may be to implement controls such as multifactor authentication for calculated risk factors of `3` or `4` and request blocking for risk factors of `5`.'
      maximum: 5
      type: integer
      minimum: 0
      example: 2
    ErrorResponse_2:
      required:
      - Errors
      type: object
      description: The error response model used by all of our API endpoints
      properties:
        Errors:
          $ref: '#/components/schemas/Errors_2'
    AccountDetails:
      type: object
      properties:
        accountNumber:
          description: Unique identifier for the Primary Account Number of the card.
          example: '2303770003400262'
          type: string
          minLength: 13
          maxLength: 19
        cardLast4:
          description: The last four digits of the card number.
          example: '4242'
          type: string
          minLength: 4
          maxLength: 4
          pattern: ^\d{4}$
        cardExpiryDate:
          description: The expiry year and month of the card in YYMM format.
          example: '2311'
          type: string
          minLength: 4
          maxLength: 4
          pattern: ^\d{4}$
        cardBin:
          description: The first digits of the card number.
          example: '12345'
          type: string
          minLength: 4
          maxLength: 8
    PaymentAmount:
      type: object
      properties:
        merchantCategoryRatio:
          description: A ratio of the purchase amount compared to the median purchase amount seen for other similar merchants in the same category. The higher the ratio means that the purchase amount is further from the median purchase amount observed.
          format: double
          type: number
          example: 1.5
    DeviceInfo:
      description: This field contains information related to the consumer device used to authorize with your product or service.
      type: object
      properties:
        deviceType:
          description: The device type used to authorize your product or service.
          type: string
          example: iPhone
        country:
          description: The country where the consumer device is located when attempting to authorize with your product or service.
          type: string
          example: USA
        ipCarrier:
          description: The service provider used by the consumer device when attempting to authorize with your product or service.
          type: string
          example: AT&T
        city:
          description: The city where the consumer device is located when attempting to authorize with your product or service.
          type: string
          example: Los Angeles
        browser:
          description: The name of the browser used to authorize your product or service.
          type: string
          example: Safari
        state:
          description: The state where the consumer device is located when attempting to authorize with your product or service.
          type: string
          example: CA
        platform:
          description: The device platform used to authorize your product or service.
          type: string
          example: iOS
      required:
      - browser
      - platform
      - deviceType
    Errors_2:
      required:
      - Error
      type: object
      description: The error response model used by all of our API endpoints
      properties:
        Error:
          description: a list of Error objects
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/Error_3'
          example: []
    TrustFactor:
      description: The trust factor value associated with the device.
      type: integer
      example: 5
      minimum: 1
      maximum: 5
    Address:
      type: object
      properties:
        addressLine1:
          description: The first line of the street part in the structured address.
          example: 912 Uclan Dr
          type: string
          minLength: 1
          maxLength: 50
        addressLine2:
          description: The second line of the street part in the structured address.
          example: Apt 34
          type: string
          minLength: 1
          maxLength: 50
        addressCity:
          description: The name of the city in the structured address.
          example: Houston
          type: string
          minLength: 1
          maxLength: 50
        addressState:
          description: The state/province/parent subdivision code of the structured address.
          example: TX
          type: string
          minLength: 1
          maxLength: 3
        addressPostCode:
          description: The postal code of the structured address.
          example: '63124'
          type: string
          minLength: 1
          maxLength: 16
        addressCountry:
          example: '840'
          type: string
          format: ISO-3166-1
          description: 'The ISO-3166-1 numeric country code of the billing or shipping address requested by the cardholder. See: [ISO-3166](https://www.nationsonline.org/oneworld/country_code_list.htm).'
          minLength: 3
          maxLength: 3
    IpRisk:
      type: object
      properties:
        score:
          description: A 0-1 score (rounded to three decimal places) associated with an IP address.
          format: double
          type: number
          example: 0.562
    DeviceInsights:

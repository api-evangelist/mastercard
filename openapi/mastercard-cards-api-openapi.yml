  parameters:
    CorrelationID:
      name: X-MC-Correlation-ID
      in: header
      description: '''Correlation ID'', also known as ''Transit ID'' or ''Request ID'', is unique identifier value attached to a particular transaction or event chain. The ''Correlation ID'' also helps in auditing, debugging, and tracing the request execution flow. <BR/> It is recommended to generate universally unique identifier (UUID) in compliance with ''RFC 4122''.<BR/> If the ''Correlation ID'' is not received in the incoming request, the ''Mastercard Processing'' platform generates a universally unique identifier (UUID) dynamically and assigns it to the request. The Correlation ID is always added to the response header to provide end to end traceability.

        * minLength: 6

        * maxLength: 36

        * pattern: [a-zA-Z0-9_-]+'
      schema:
        type: string
        minLength: 6
        maxLength: 36
        pattern: '[a-zA-Z0-9_-]+'
      example: ac97d177-9345-4934-8343-0f91a7a02836
    Source:
      name: X-MC-Source
      in: header
      description: 'Value identifying the origin or source of a transaction. The list of possible sample values are available in the database and shared in the ''API_SOURCE_VALUES'' list under ''Card Management > Institution Parameter Setup > System Codes [ISSS15]''. This field is used only for logging purpose.<br/>

        * minLength: 3

        * maxLength: 3

        * pattern: [A-Z0-9]+ <br/> <br/> **Few sample values: ** <br/>

        * `IVR` - Interactive Voice Response

        * `MAP` - Mobile Application

        * `ATM` - Automated Teller Machine

        * `NBN` - Net Banking Application

        * `POS` - Point of Sale

        * `SCH` - Scheme

        * `CBS` - Core Banking System

        * `SMS` - Short Message Service

        * `ACS` - Access Control Server

        * `ONS` - On-Us Transaction

        * `OTH` - Other'
      schema:
        type: string
        minLength: 3
        maxLength: 3
        pattern: '[A-Z0-9]+'
      example: MAP
    EndUserID:
      name: X-MC-Client-Application-User-ID
      in: header
      description: 'A unique identifier to track an end user who is performing action at the consumer''s end. <BR/>This field is used only for logging purpose.

        * minLength: 3

        * maxLength: 50

        * pattern: [a-zA-Z0-9_-]+'
      schema:
        type: string
        minLength: 3
        maxLength: 50
        pattern: '[a-zA-Z0-9_-]+'
      example: S0648-IN
    BankCode:
      name: X-MC-Bank-Code
      in: header
      description: 'It is a 6-digit bank/institution identifier code. <br/> **Conditional Mandatory**<font color=''red''>* </font> field - Required to be passed by third party vendors or service providers (like 3-D Secure authenticator) who have access to the data of multiple banks, supported by legal agreement and access grants.

        * minLength: 6

        * maxLength: 6

        * pattern: [0-9]+'
      schema:
        type: string
        minLength: 6
        maxLength: 6
        pattern: '[0-9]+'
      example: '112233'
    IdempotencyKey:
      name: X-MC-Idempotency-Key
      in: header
      required: true
      description: An idempotency key is a unique value that is generated by a client and sent to an API along with a request. If a request should fail partway through, the client retries with the same idempotency key value, and the server uses it to look up the state of request and continue from where it left off. Recommended to generate universally unique identifier (UUID) compliant with 'RFC 4122'.
      schema:
        type: string
        pattern: ^[a-zA-Z0-9_-]{6,36}$
      example: bc57d177-4593-3449-8343-0d81a7a02947
    ClientId:
      name: x-openapi-clientid
      in: header
      description: ClientId is a unique and a mandatory ID shared while creating a project on Mastercard Developers Portal.
      required: true
      schema:
        type: string
        example: 0a7e433a-63fc-4557-8cf4
    ProgramId:
      name: ProgramId
      in: header
      description: ProgramId is an optional field, but if a client has more than one program associated to it, then this field becomes mandatory.
      required: false
      schema:
        type: string
        example: 80380ef2-5037-4e57-86bf-1bdd1efb0ae2
    Donor:
      name: donor_id
      in: path
      description: donor_id
      required: true
      schema:
        type: string
        example: 652ce9ff-fa5f-4e9f-8151-c73fa20088f7
    CorrelationId:
      name: x-correlation-id
      in: header
      description: CorrelationId is a unique donation request ID. It is recommended to pass the x-correlation-id by the customer and to use the format "bankname_UUID" (bank name can be indicated using the first 4 digits). Maximum length of this field should be 100 alphanumeric characters. If not passed, Mastercard will generate it.
      required: false
      schema:
        type: string
        example: 03f8c4e8-8bdc-4a30-a2b4-b6f989e96ca3
    Card:
      name: card_id
      in: path
      description: card_id
      required: true
      schema:
        type: string
        example: ebee3d81-18d4-409a-8330-73db083f2cfc
    IssuingCountryParameter:
      name: issuing_country
      in: path
      description: Country of issue for the document in the ISO 3166-1 alpha-3 format, only AUS is an acceptable value for this parameter.
      example: AUS
      required: true
      schema:
        type: string
        pattern: ^[A-Z]{3}
    EncryptedPayloadParameter:
      name: X-Encrypted-Payload
      in: header
      description: Whether the request payload is encrypted with the Encyption Key generated from the Developer Zone Portal.
      example: true
      required: false
      schema:
        type: boolean

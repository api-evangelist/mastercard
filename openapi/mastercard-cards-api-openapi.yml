  headers:
    Response-Original-Correlation-ID:
      description: If the duplicate request is received with same idempotency key then original request Correlation-ID is returned in the header along with original response in body.
      schema:
        type: string
        minLength: 6
        maxLength: 36
      example: ec57d177-4593-3449-8343-0d81a7a02978
    Response-Correlation-ID:
      description: Returns the request identifier (like UUID) received in client request header or generated by the server.
      schema:
        type: string
        minLength: 6
        maxLength: 36
      example: ac97d177-9345-4934-8343-0f91a7a02836
    Response-Idempotency-Key:
      description: Echo back the idempotency key received in the client request header, only if the duplicate request is received with same idempotency key within predefined time.
      schema:
        type: string
        minLength: 6
        maxLength: 36
      example: bc57d177-4593-3449-8343-0d81a7a02947
    X-Transaction-ID:
      schema:
        type: string
        example: 2d077b9c-3c06-44ac-b00e-d78fe8cce606
        description: A random 128-bit UUID representing the transaction.

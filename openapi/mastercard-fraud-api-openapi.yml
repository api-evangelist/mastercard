            - ReasonCode: '21006'
              Description: Invalid Fraud Posted Date, format should be YYYYMMDD. Record is rejected.
            - ReasonCode: '41200'
              Description: Unable to match transaction in data warehouse. Record is rejected.
    FraudStatusSuspended:
      value:
        refId: ecb2d942-eabd-42b6-87fd-69c19692bdc6
        timestamp: '2021-03-16T20:34:40-06:00'
        icaNumber: '1076'
        responseCode: '000'

          minLength: 0
          type: string
          description: The unique identifier for a given account. This is typically referred to as the Bank Account Number (BAN). When enrolling a card account, the physical card number should be followed by 3 trailing zeros.
          example: '5330333671236516000'
        accountIdType:
          type: string
          description: Identifier type for the given account. Supported identifier is BAN.
          example: BAN
        status:
          type: string
          description: "Status of the user's account. Valid values are GOOD_STANDING and NEW.\n - NEW  Used for auto and self-enrollment.  Can earn, but not redeem.\n - GOOD_STANDING  Can earn and redeem. This is the typical good status for an account."
          example: NEW
          enum:
          - NEW
          - GOOD_STANDING
        productCode:
          maxLength: 20
          minLength: 0
          type: string
          description: The account's associated reward product identifier as defined by the client and configured during the implementation of the program.
          example: FIDOCASHBACK
        programIdentifier:
          maxLength: 40
          minLength: 0
          type: string
          description: Program identifier for the program in which the account is enrolled. Program identifier is assigned during the implementation of the program.
          example: PGM42051
        openDate:
          maxLength: 10
          minLength: 0
          pattern: ^\d{4}\-(0[1-9]|1[012])\-(0[1-9]|[12][0-9]|3[01])$

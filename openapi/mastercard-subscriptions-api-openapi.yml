              properties:
                accountHolderName:
                  description: Conatins the name of the account holder in the format LASTNAME/FIRSTNAME or FIRSTNAME LASTNAME.
                  type: string
                  minLength: 1
                  maxLength: 27
                  example: John Doe
                accountHolderAddress:
                  description: Contains the address for the account holder. Verified as part of reaching the digitization decision.
                  type: object
                  properties:
                    city:
                      description: Refers to the city of the billing address.
                      type: string
                      minLength: 1
                      maxLength: 32
                      example: St. Louis
                    country:
                      description: Refers to the country of the billing address. Expressed as a 3-letter (alpha-3) country code as defined in ISO 3166-1.
                      type: string
                      minLength: 3
                      maxLength: 3
                      example: USA
                    countrySubdivision:
                      description: Refers to the country subdivision (for example, the state in the U.S.) of the billing address.
                      type: string
                      minLength: 1
                      maxLength: 12
                      example: MO
                    line1:
                      description: First line of the billing address.
                      type: string
                      minLength: 1
                      maxLength: 64
                      example: zSqLUXpVDvIlGHqBgwWwaqjefUprTD
                    line2:
                      description: Second line of the billing address.
                      type: string
                      minLength: 1
                      maxLength: 64
                      example: PzWcIVnnUAcwIhClfoRFCpXVBKXKTz
                    postalCode:
                      description: Refers to the postal code (for example, zipcode in the U.S.) of the billing address.
                      type: string
                      minLength: 1
                      maxLength: 16
                      example: '61000'
                accountHolderMobilePhoneNumber:
                  description: accountHolderMobilePhoneNumber conatins the contact details/mobile number details of the account holder.
                  type: object
                  properties:
                    countryDialInCode:
                      description: Conatins the country code for the phone number. E.g. 1 for US or 44 for UK.
                      type: string
                      minLength: 1
                      maxLength: 4
                      example: '1'
                    phoneNumber:
                      description: Contains the phone number, may contain country code along with phone number when countryDialInCode is not present.
                      type: string
                      minLength: 1
                      maxLength: 20
                      example: '4692392391'
                consumerIdentifier:
                  description: Consumer Identifier provided by the token requestor. It's not a mandatory field and is optionally present in AuthorizeService when provided by the wallet provider.
                  type: string
                  minLength: 1
                  maxLength: 88
                  example: 1b24f24a24ba98e27d43e345b532a245e4723d7a9c4f624e93452c1b24f24a24b
                accountHolderEmailAddress:
                  description: The email address of the account holder. Not required - Optionally present in pushAccount request. Not present otherwise.
                  type: string
                  minLength: 6
                  maxLength: 320
                  example: abc@email.com
                deviceLocation:
                  description: Latitude and longitude where the device the consumer is attempting to authorize is located. In the format "(sign) latitude/(sign) longitude" with a precision of 2 decimal places. Ex:"38.63/-90.2". Latitude is between -90 and 90 and longitude is between -180 and 180.
                  type: string
                  minLength: 1
                  maxLength: 64
                  example: 38.63/-90.2
                sourceIp:
                  description: Contains the IP of the device initiating the request.
                  type: string
                  minLength: 7
                  maxLength: 64
                  example: 127.0.0.1
            paymentAccountReference:
              description: The unique account reference assigned to the PAN.
              type: string
              minLength: 29
              maxLength: 29
              example: 50017G8EU2RXB4YI1QIOT9R829RC4
            deviceInfo:
              description: Contains information about the target device to be provisioned.
              type: object
              properties:
                cardCaptureTechnology:
                  description: 'The technology used to capture the card details. New values can be added at any time and must not result in an error. Must be one of: - CAMERA = The card details were captured using the device camera,  - MANUAL = The card details were manually entered,  - UNKNOWN = It is not known how the card details were entered, READER_MODE = The card details were captured using reader mode.'
                  type: string
                  minLength: 1
                  maxLength: 32
                  example: CAMERA
                deviceName:
                  description: Contains the name that the Account holder has associated to the device with the Payment App Provider.
                  type: string
                  minLength: 1
                  maxLength: 64
                  example: Emerson Phone
                formFactor:
                  description: 'The form factor of the device to be provisioned. New values can be added without notice and should be accpeted. Must be one of: - PHONE = Mobile phone, - TABLET = Tablet computer, - TABLET_OR_EREADER = Tablet computer or e-reader, - WATCH = Watch, - WATCH_OR_WRISTBAND = Watch or wristband, including a fitness band, smart strap, disposable band, watch add-on, security/ID Band, - CARD = Card, STICKER = Sticker, - PC = PC or Laptop, - DEVICE_PERIPHERAL = Device peripherals, such as a mobile phone case or sleeve, - TAG = Tag, such as a key fob or mobile tag, - JEWELRY = Jewelry, such as a ring, bracelet, necklace and cuff links, - FASHION_ACCESSORY = Fashion accessory, such as a handbag, bag charm, glasses, - GARMENT = Garment, such as a dress, - DOMESTIC_APPLIANCE = Domestic appliance, such as a refrigerator, washing machine, - VEHICLE = Vehicle, including vehicle attached devices, - MEDIA_OR_GAMING_DEVICE = Media or gaming device, including a set top box, media player, television, - UNDEFINED = Device type that is not yet defined. Used for wallets introducing a new device type that is not yet public knowledge.'
                  type: string
                  minLength: 1
                  maxLength: 64
                  example: PHONE
                imei:
                  description: The IMEI number of the device being provisioned.
                  type: string
                  minLength: 15
                  maxLength: 15
                  example: '352099001761481'
                isoDeviceType:
                  description: Contains the 2 digit device type provided on the iso messages that the token is being provisioned to. Only present when provided by a Wallet Provider.
                  type: string
                  minLength: 1
                  maxLength: 2
                  example: 09
                msisdn:
                  description: The MSISDN of the device being provisioned.
                  type: string
                  minLength: 1
                  maxLength: 15
                  example: '7307406945'
                osName:
                  description: 'The name of the device operating system. Must be one of: - ANDROID = Google Android operating system, - WINDOWS = Microsoft Windows operating system, - TIZEN = Tizen operating system, - IOS = Apple iOS operating system, - PAGARE_EMBEDDED_OS = FitPay embedded operating system, - ANDROID_WEAR = Android wear operating system, - EMBEDDED_OS = All Embedded operating system and Real time Operating systems.'
                  type: string
                  minLength: 1
                  maxLength: 32
                  example: ANDROID
                osVersion:
                  description: The version of the device operating system.
                  type: string
                  minLength: 1
                  maxLength: 32
                  example: 4.4.4
                paymentTypes:
                  description: 'Different types of Payments supported for the token. Must be one of below and Array [String] type: - NFC = The token is NFC capable, - DSRP = The token is DSRP capable, - ECOMMERCE = The token can be used for e-commerce transactions.'
                  type: array
                  items:
                    type: string
                    example: NFC
                serialNumber:
                  description: Contains the serial number of the device. May be masked.
                  type: string
                  minLength: 1
                  maxLength: 64
                  example: 2F6D63
                storageTechnology:
                  description: 'The architecture or technology used for token storage. Must be one of: - DEVICE_MEMORY = Device memory, - DEVICE_MEMORY_PROTECTED_TPM = Device memory using a protected trust platform module, - TEE = Trusted execution environment, - SE = Secure element, - SERVER = Server host, - VEE - Virtual Execution Environment.'
                  type: string
                  minLength: 1
                  maxLength: 32
                  example: SERVER
            accountIdHash:
              description: SHA-256 hash of the Account holder's account ID with the Payment App Provider. Typically expected to be an email address. Type - string (Alpha Numeric) Hex-encoded data (case-insensitive).
              type: string
              minLength: 1
              maxLength: 64
              example: 8F7A8970515A65202E24F7A7240557F467B5218433CD38BCA94778FB445A6952
            activeTokenCount:
              description: The number of active tokens that already exist for the Funding Account based on the token type. Secure Element and Cloud tokens are counted together. Valid values are 0 to 99. A value of 99 means there are 99 or more active tokens. Tokens that have been deleted from the wallet are excluded from the count.
              type: string
              minLength: 1
              maxLength: 2
              example: '44'
            consumerFacingEntityName:
              description: Entity name that account holder recognizes as being where they store their PAN (wallets, merchants, commerce platforms&).
              type: string
              minLength: 1
              maxLength: 100
              example: MasterCard
        walletInfo:
          description: Contains information about the wallet.
          type: object
          properties:
            walletId:
              description: The identifier of the Wallet Provider who requested the digitization. Only present when the token is provided to a Wallet Provider.
              type: string
              minLength: 1
              maxLength: 3
              example: '103'
            paymentAppInstanceId:
              description: The identifier of the Payment App instance within a device that will be provisioned with a token. Only present when supplied by a Wallet Provider.
              type: string
              minLength: 1
              maxLength: 48
              example: 047C4395D11690022347075090475326A02CB5118F774F2F
            secureElementId:
              description: The identifier of the Secure Element to be provisioned with the token. Present only when the token is provisioned to a Secure Element and when provided by the Wallet Provider.
              type: string
              minLength: 1
              maxLength: 128
              example: 1b24f24a24ba98e27d43e345b532a245e4723d7a9c4f624e93452c
        walletProviderDecisioningInfo:
          description: Contains information about the decision recommended by the Wallet Provider.
          type: object
          properties:
            accountLifeTime:
              description: The lifetime of the account with the Token Requestor.
              type: string
              minLength: 1
              maxLength: 2
              example: '4'
            accountScore:
              description: Score given to the account by the Wallet Provider. Value must be between 1 and 5.
              type: string
              minLength: 1
              maxLength: 64
              example: '4'
            deviceScore:
              description: Score given to the device by the Wallet Provider. Value must be between 1 and 5.
              type: string
              minLength: 1
              maxLength: 64
              example: '3'
            phoneNumberScore:
              description: Score given to the phone number by the Wallet Provider. Value must be between 1 and 5.
              type: string
              minLength: 1
              maxLength: 64
              example: '3'
            recommendationReasons:
              description: Reasons provided to the Wallet Provider on how the recommended decision was reached. Please refer to the Reason Codes section in [Mastercard Developers](https://developer.mastercard.com/mdes-pre-digitization/documentation/code-formats/#reason-codes) for all eligible values. Type - Array [String].
              type: array
              items:
                type: string
                example: ACCOUNT_TOO_NEW
            recommendationStandardVersion:
              description: The standards version used by the Wallet Provider to determine the recommended decision.
              type: string
              minLength: 1
              maxLength: 64
              example: 1.0.0
            recommendedDecision:
              description: 'The decision recommended by the Wallet Provider. Must be one of: - APPROVED = Services request was approved, - DECLINED = Services request was declined, - REQUIRE_ADDITIONAL_AUTHENTICATION = Services request requires additional authentication to be approved.'
              type: string
              minLength: 1
              maxLength: 64
              example: APPROVED
        vcnInfo:
          description: Contains information about the virtual card account.
          type: object
          properties:
            accountGuid:
              description: The globally unique identifier of the virtual card account.
              type: string
              example: 4fd7fe39-48de-464e-bed2-c148250d7047
            ownerInfo:
              description: Contains information about the Issuer and Corporate.
              type: object
              properties:
                issuerGuid:
                  description: The globally unique identifier of the Issuer.
                  type: string
                  example: SENTTY83BAA6404E87C4D18F67669A687E8D8E86C9E74740FFE8EE403956EBEFF373661648820215
                corpGuid:
                  description: The globally unique identifier of the Corporate.
                  type: string
                  example: SENTTYA9C1DB157A85313B10E11ACA0B508844145FB98B7A8529E3DA099F1E5D744ADD1692330249
            createdDate:
              description: Date when the account was created, in ISO 8601 extended format. It can be either in UTC "YYYY-MM-DDThh:mm:ss[.sss]Z" or with an offset "YYYY-MM-DDThh:mm:ss[.sss]�hh:mm", where [.sss] is optional and can be 1 to 3 digits.
              type: string
              example: '2024-02-01T00:00:00Z'
            lastUpdatedDate:
              description: Date when the account was last updated, in ISO 8601 extended format. It can be either in UTC "YYYY-MM-DDThh:mm:ss[.sss]Z" or with an offset "YYYY-MM-DDThh:mm:ss[.sss]�hh:mm", where [.sss] is optional and can be 1 to 3 digits.
              type: string
              example: '2024-02-12T15:19:36.633965Z'
            accountNumber:
              description: Contains the Card Account Number.
              type: string
              minLength: 12
              maxLength: 19
              example: XXXXXXXXXXX4547
            expiry:
              description: Card expiry date in YYYY-MM format.
              type: string
              minLength: 7
              maxLength: 7
              example: 2026-12
        rcnInfo:
          description: Contains information about the real card account.
          type: object
          properties:
            accountGuid:
              description: The globally unique identifier of the real card account.
              type: string
              example: 8f89407e-1c7f-4b4b-bfc7-a7ef47207022
            accountNumber:
              description: Contains the Card Account Number.
              type: string
              minLength: 12
              maxLength: 19
              example: XXXXXXXXXXX1234
            expiry:
              description: Card expiry date in YYYY-MM format.
              type: string
              minLength: 7
              maxLength: 7
              example: 2026-12
        purchaseRequest:
          description: Purchase Request Details.
          type: object
          properties:
            purchaseRequestId:
              description: ICCP Purchase Request ID - uniquely identifies the purchase request and VCN
              type: integer
              example: 5213
            rcnAlias:
              description: Real card number alias.
              type: string
              example: Travel Expense RCN
            companyId:
              description: ICCP Company ID - uniquely identifies the company that created the VCN.
              type: integer
              example: 233191
    BPCAuthorizationNotificationContent:
      description: Payment authorization details for a virtual card generated by Business Payment Controls.
      type: object
      properties:
        messageTypeIndicator:
          description: DE 90, subfield 1 specifies the message type indicator (MTI) present in the authorization message.
          type: string
          minLength: 4
          maxLength: 4
          example: '0100'
        traceId:
          description: Contains data from DE 63 (Network Data), subfield 1 (Financial Network Code) and subfield 2 (Banknet Reference Number) and DE 15 (Date, Settlement) that is in the original Authorization Request Response/0110 message.
          type: string
          example: 'null'
        issuerGuid:
          description: The globally unique identifier of the issuer.
          type: string
          example: SENTTY5E4C4B4E0D1BF5991E64A1E0745F40A85B2510CE48EB537011DCED3C483669D61494938440
        corpGuid:
          description: Alternative ID used to uniquely identify the company that created the VCN.
          type: string
          example: SENTTY9951972A6FC0206CB494B560E5E6DC5D02A2BD21D89612EF4A18358ECC777DCF1494921797
        processor:
          description: ''
          type: object
          properties:
            issuerId:
              description: Unique identifier of the issuer
              type: integer
              example: 523456789
            responseCode:
              description: Two-character alphanumeric reason code received from the processor for the Advice/Reversal. For all possible values refer to Customer Interface Specification field name DE-39.
              type: string
              example: '00'
            financialNetworkCode:
              description: DE 63, subfield 1 identifies the specific program or service (for example, the financial network, financial program, or card program) with which the transaction is associated.
              type: string
              example: MCC
            banknetReferenceNumber:
              description: Banknet Reference Number is generated by the Authorization Platform for each originating message it routes. The reference number is guaranteed to be a unique value for any transaction within the specified financial network on any processing day. This value is derived from DE63, subfield 2.
              type: string
              example: Q4A91A
            onBehalfResult:
              description: Letter representing the decision that has been made. This value is derived from DE-48 SF71 subfield-1. For all possible values refer to Customer Interface Specification field name DE-48 SF71.
              type: string
              example: V
            onBehalfService:
              description: This field notifies the issuer of the On-behalf Service performed on the transaction and the results. This value is derived from DE-48 SF71 subfield-2. For all possible values refer to Customer Interface Specification field name DE-48 SF71.
              type: string
              example: '17'
        realPaymentCard:
          description: ''
          type: object
          properties:
            number:
              description: DE 2 (Primary Account Number [PAN]) is a series of digits used to identify a customer account or relationship.
              type: string
              example: '5540590000100111'
            expiry:
              description: DE 14 (Date, Expiration) specifies the year and month after which an issuer designates a cardholders card as expired.
              type: string
              example: '2404'
            accountGuid:
              description: Business Payment Controls real card Guid.
              type: string
              example: 0ENT7d2bb852a22f822d441f61605054dab329ab2024a6c37cac5151e845cbb15d291698658882
        virtualPaymentCard:
          description: ''
          type: object
          properties:
            number:
              description: DE 48, subelement 33, subfield 2 (Account Number) indicates the Primary Account Number (PAN) mapping account number.
              type: string
              example: '5522446433180570'
            expiry:
              description: DE 48, subelement 33, subfield 3 (Expiration Date) indicates the expiration date of the PAN mapping account.
              type: string
              example: '2402'
            accountGuid:
              description: Business Payment Controls virtual card Guid.
              type: string
              example: SENTTY13379505AC33CDA796BCBE850EADAF625FAD6B071E8D100CB1ECBEA
        acceptor:
          description: A collection of field definitions that provide acceptor (merchant) details
          type: object
          properties:
            name:
              description: DE 43 (Acceptor Name and Location), subfield 1 (Acceptor Name) contains the name of the acceptor that should be recognizable by the cardholder and may include other descriptors, such as a store number.
              type: string
              example: acceptor.name
            cityName:
              description: DE 43 (Acceptor Name and Location), subfield 3 (Acceptor City) indicates the city of the merchant.
              type: string
              example: cityName
            subDivisionCode:
              description: DE 43, subfield 5 contains the ISO 3166-1 state or country code of the acceptor.
              type: string
              example: TN
            terminalId:
              description: DE 41 contains the identifier assigned by the acceptor or the acquirer to the terminal, payment gateway, or other acceptance device used to capture account data to affect a transaction at the acceptor location.
              type: string
              example: '0001'
            id:
              description: DE 42 contains Identifies the acceptor ID assigned by the acquirer to the acceptor and its location, or to the payment facilitator.
              type: string
              example: '497520000000000'
            merchantCategoryCode:
              description: DE 18 (Merchant Type) is the classification (acceptor business code/merchant category code [MCC]) of the merchants type of business or service.
              type: string
              example: '0041'
            merchantCategoryCodeDescription:
              description: Description of the merchant category code defined under DE 18 (Merchant Type).
              type: string
              example: GAMBLING TRANSACTIONS
            environment:
              description: DE 22, subfield 1 (POS Terminal PAN Entry Mode) indicates the method (transaction environment) used for PAN entry to initiate a transaction.
              type: string
              example: 'null'
            localDate:
              description: DE 13 (Date, Local Transaction) is the local month and day on which the transaction takes place at the point of acceptor location. Date format in MMDD.
              type: string
              example: '0410'
            localTime:
              description: DE 12 (Time, Local Transaction) is the local time at which the transaction takes place at the point of acceptor location. Time format in hhmmss.
              type: string
              example: 092900
            retrievalReferenceNumber:
              description: DE 37 (Retrieval Reference Number) is a document reference number supplied by the system retaining the original source document of the transaction and assists in locating that source document or a copy thereof.
              type: string
              example: 074975208903
            posCountryCode:
              description: DE 61, subfield 13 (POS Country Code) indicates the country of the POS location (not the acquirer location) using ISO-specified codes.
              type: string
              example: '840'
            posCountryCodeDescription:
              description: Specifies the name of the country in which the merchant operates.
              type: string
              example: 'null'
            posTransactionStatus:
              description: Specifies the indicates the purpose or status of the request. For all possible values refer to Customer Interface Specification field name DE 61 S7.
              type: string
              example: '0'
            amount:
              description: ''
              type: object
              properties:
                amount:
                  description: DE 4 (Amount, Transaction) specifies the amount requested by the cardholder, denominated in the local currency of the acquirer or the source location of the transaction. This value is represented in minor units, which are the smallest units of a currency and are determined by the number of decimal places.
                  type: number
                  example: 9110
                currencyCode:
                  description: DE 49 (Currency Code, Transaction) specifies the currency code of the funds the cardholder requested in the local currency of the acquirer or source location of the transaction.
                  type: string
                  example: 840
                currencyCodeAlphabetic:
                  description: Specifies the currency name of the funds the cardholder requested in the local currency of the acquirer or source location of the transaction.
                  type: string
                  example: USD
        cardHolderAmount:
          description: ''
          type: object
          properties:
            amount:
              description: DE 6 (Amount, Cardholder Billing) represents the transaction amount in the issuers currency. This is the amount billed to the cardholder in the cardholder's account currency, excluding any cardholder billing fees. The value is expressed in minor units, which are the smallest units of a currency and depend on the number of decimal places for that currency.
              type: number
              example: 16100
            currencyCode:
              description: DE 51 (Currency Code, Cardholder Billing) defines the currency of DE 6 (Amount, Cardholder Billing). It indicates the currency code of the transaction amount in the issuers currency.
              type: string
              example: 840
            currencyCodeAlphabetic:
              description: Indicates the currency name of the transaction amount in the issuers currency.
              type: string
              example: USD
        transactionInformation:
          description: ''
          type: object
          properties:
            acquirerInstitutionIdCode:
              description: DE 32 (Acquiring Institution ID Code) identifies the acquiring institution (for example, merchant bank) or its agent by Interbank Card Association ID.
              type: integer
              example: 5173
            forwardingInstitutionIdCode:
              description: Specifies the Interbank Card Association ID of the processor. This data element contains the identifier assigned by the acquirer to the acceptor and its location, or to the payment facilitator.
              type: integer
              example: 497520000000000
            conversionRateCardholderBilling:
              description: DE 10 (Conversion Rate, Cardholder Billing) is the factor used in the conversion (currency exchange rate) from transaction to cardholder billing amount.
              type: number
              example: 1234
            processingCode:
              description: DE 3 (Processing Code) describes the effect of a transaction on the customer account and the type of accounts affected.
              type: string
              example: '00'
            authCode:
              description: DE 38 (Authorization ID Response) is a transaction response ID code that the authorizing institution assigns. DE 38 is used to transmit a card issuers authorization code for Authorization transactions.
              type: string
              example: '04'
            dateTime:
              description: DE 7 (Transmission Date and Time) is the date and time that a message is entered into the Mastercard Network. Date and time must be expressed in Coordinated Universal Time (UTC). Date and time format is MM-DD'T'HH:MM:SS.SSSXXX".
              type: string
              example: 'null'
            environment:
              description: DE 22, subfield 1 (POS Terminal PAN Entry Mode) indicates the method used for PAN entry to initiate a transaction. Possible values are UNKNOWN, POS, MOTO, ECOM, ATM, PAYPASS, PWCB.
              type: string
              example: 'null'
            issuerResponse:
              description: Two-character alphanumeric reason code received from the processor for the Advice/Reversal. For all possible values refer to Customer Interface Specification field name DE-39.
              type: string
              example: 'null'
            systemTraceAuditNumber:
              description: Unique six-digit identifier generated by the Acquirer, must be the same in the Advice, will be different for the reversal.
              type: string
              example: '011174'
            reversal:
              description: ''
              type: object
              properties:
                replacementTransactionAmount:
                  description: DE 95, subfield 1 (Actual Amount, Transaction) indicates the amount for a reversal transaction in the case of a partial reversal. This amount is represented in the smallest unit of the currency, also known as minor units, and varies depending on the number of decimal places the currency uses.
                  type: number
                  example: 100000
                replacementSettlementAmount:
                  description: DE 95, subfield 2 (Actual Amount, Settlement) indicates the actual settlement amount in the settlement currency in the case of a partial reversal. This amount is represented in the smallest unit of the currency, also known as minor units, and varies depending on the number of decimal places the currency uses.
                  type: number
                  example: '000000200000'
                replacementCardholderAmount:
                  description: DE 95, subfield 3 (Actual Amount, Cardholder Billing) the actual amount in the issuer currencyin the case of a partial reversal. This amount is represented in minor units, which are the smallest units of a currency, and is dependent on the number of decimal places in the currency.
                  type: number
                  example: 300000
            posEntryMode:
              description: Indicates the method used for PAN entry to initiate a transaction and the PIN entry capabilities.
              type: string
              example: '801'
        originalMessage:
          description: ''
          type: object
          properties:
            messageTypeIndicator:
              description: Indicates the Message Type Identifier (MTI) of the original message.
              type: string
              minLength: 4
              maxLength: 4
              example: '0110'
            systemTraceAuditNumber:
              description: Unique six-digit identifier generated by the Acquirer, must be the same in the Advice, will be different for the reversal.
              type: string
              example: '011174'
            transmissionRawDateTime:
              description: Indicates the Transmission Date and Time that was in the original message when it entered into the Mastercard Network. Date and time must be expressed in Coordinated Universal Time (UTC).
              type: string
              example: 0412112800
        advice:
          description: ''
          type: object
          properties:
            reasonCode:
              description: DE 60, subfield 1 (Advice Reason Code) indicates to the receiver of an Advice message the specific reason for the transmission of the Advice message.
              type: string
              example: '650'
        fundingSource:
          description: ''
          type: object
          properties:
            fundingSourceAlias:
              description: BPC Funding Source Alias
              type: string
              example: testFSAlias
            fundingSourceGuid:
              description: BPC Funding Source Guid. The globally unique identifier for the funding source.
              type: string
              example: 0ENTde1a52b828ca014dff5de6038bbfab426f8f05ac5a2fc143783aeb01d161d6b11698658887
    Specification:
      description: Specifies criteria to determine whether an event should cause a notification to be generated.
      type: object
      properties:
        id:
          description: Specification id, auto-generated by the system and read-only for the client
          type: string
          minLength: 1
          maxLength: 255
          readOnly: true
          example: CNSa91bf379b48a593fd17f07f431bad8fb296796498f4e9982ea134394c1fa4f071556724072
        type:
          description: The type of item to which the criteria refers. Currently the type 'FIELD' is allowed, which refers to matching a field in the notification itself
          type: string
          minLength: 1
          maxLength: 255
          default: FIELD
          example: FIELD
        operator:
          description: The operator that defines how this specification (criteria) logically relates to other specifications in the list. The first specification in the list will have an operator of 'WHERE' and subsequent specifications will have an 'AND' or 'OR' relationship with their preceding specification
          type: string
          minLength: 1
          maxLength: 255
          default: WHERE
          example: WHERE
        fieldMappingName:
          description: The name of the field that is to be checked
          type: string
          minLength: 1
          maxLength: 255
          example: purchaseRequest.rcnAlias
        fieldOperator:
          description: The check operation that is to be performed. Currently one of allowed values are 'EQUALS', 'GREATER_THAN', 'LESS_THAN', 'BETWEEN'
          type: string
          minLength: 1
          maxLength: 255
          default: EQUALS
          example: EQUALS
        expectedContent:
          $ref: '#/components/schemas/FieldContent'
        children:
          description: A list of nested child specifications, used where needed to implement complex matching logic
          type: array
          items:
            $ref: '#/components/schemas/Specification'
      required:
      - type
      - operator
      - fieldMappingName
      - fieldOperator
      - expectedContent
    Error-404:
      type: object
      required:
      - Errors
      properties:
        Errors:
          type: object
          required:
          - Error
          properties:
            Error:
              type: array
              description: An array of error objects giving information about relevant errors.
              items:
                type: object
                properties:
                  Source:
                    type: string
                    description: The origin of the error
                    example: Commercial Event Notifications
                  ReasonCode:
                    type: string
                    description: A unique error code representing the error that occurred
                    example: resource.not.found
                  Description:
                    type: string
                    description: A developer-friendly description of the error that occurred
                    example: The resource provided is not found
                  Recoverable:
                    type: boolean
                    description: Can the error be recovered by retrying the same request later?
                    example: false
                  Details:
                    type: string
                    description: Additional details regarding the error that occurred
                    example: The specified resource was not found
    Subscription:
      properties:
        id:
          description: Subscription id, auto-generated by the system and read-only for the client
          type: string
          minLength: 1
          maxLength: 255
          readOnly: true
          example: CNSa91bf379b48a593fd17f07f431bad8fb296796498f4e9982ea134394c1fa4f071556724070
        name:
          description: Subscription name - must be unique for the client and must comprise letters, numbers, dashes and underscores only. To check for uniqueness, you can retrieve the existing collection of subscriptions by performing a GET on the /subscriptions resource
          type: string
          minLength: 1
          maxLength: 50
          example: TEST_SUBSCRIPTION
        subjectType:
          description: The type of event to which this subscription refers. Currently allowed values are 'PAYMENT_AUTHORIZATION', 'PAYMENT_UPDATE', 'CLEARING', 'BPC_PAYMENT_AUTHORIZATION', 'TOKEN_PROVISIONING_EVENT' and 'TOKEN_LIFECYCLE_EVENT'.
          type: string
          minLength: 1
          maxLength: 50
          enum:
          - PAYMENT_AUTHORIZATION
          - PAYMENT_UPDATE
          - CLEARING
          - BPC_PAYMENT_AUTHORIZATION
          - TOKEN_PROVISIONING_EVENT
          - TOKEN_LIFECYCLE_EVENT
          example: PAYMENT_AUTHORIZATION
        subscriberId:
          description: The id of the subscriber (client) to which the subscription belongs
          type: string
          minLength: 1
          maxLength: 255
          readOnly: true
          example: CNSa91bf379b48a593fd17f07f431bad8fb296796498f4e9982ea134394c1fa4f071556724071
        active:
          description: Denotes whether the subscription is active (in which case notifications will be generated for matching events) or not (in which case no notifications will be generated for this subscription)
          type: boolean
          example: true
        specifications:
          description: A list of criteria specifications that define what events will cause notifications to be generated. If the list of specifications is empty, then notifications will be generated for all events for the specified subject type that the client is entitled to receive.
          type: array
          items:
            $ref: '#/components/schemas/Specification'
      required:
      - name
      - active
      - subjectType
    FieldMapping:
      description: A collection of field definitions any of which can be used to specify matching criteria when creating a subscription.
      type: object
      properties:
        id:
          description: Field mapping id
          type: string
          minLength: 1
          maxLength: 255
          readOnly: true
          example: CNSa91bf379b48a593fd17f07f431bad8fb296796498f4e9982ea134394c1fa4f071556724073
        name:
          description: The name used to refer to the field in the specification criteria.
          type: string
          minLength: 1
          maxLength: 255
          example: purchaseRequest.rcnAlias
        displayName:
          description: Descriptive name of the field
          type: string
          minLength: 1
          maxLength: 255
          example: Purchase request RCN alias
        subjectType:
          description: The type of subject to which the field refers. Currently allowed values are 'PAYMENT_AUTHORIZATION', 'PAYMENT_UPDATE', 'CLEARING', 'BPC_PAYMENT_AUTHORIZATION', 'TOKEN_PROVISIONING_EVENT' and 'TOKEN_LIFECYCLE_EVENT'.
          type: string
          minLength: 1
          maxLength: 50
          example: PAYMENT_AUTHORIZATION
        contentType:
          description: What type of information the field (and therefore the matching criteria for that field) will contain. Currently one of allowed values are 'INTEGER', 'number', 'TEXT', 'DATE', 'CURRENCY'.
          type: string
          default: TEXT
          example: TEXT
    BPSPaymentUpdateNotificationContent:
      description: The content of the notification, the structure of which depends on the subject.
      type: object
      properties:
        source:
          description: Originating system of the notification, which is Business Payment Service (BPS).
          type: string
          example: BPS
        purchaseRequestId:
          description: ICCP Purchase Request ID - uniquely identifies the purchase request and VCN
          type: string
          example: '360147'
        bpsTransactionId:
          description: BPS Payment Instruction ID.
          type: string
          example: 65098ff7-54f9-42fe-b89c-3fff8470658c
        status:
          description: "Purchase request status in Business Payment Service (BPS).\n  SUBMITTED: Payment instruction is submitted to Supplier Payment Agent.\n  PENDING: Payment instruction is pending payment.\n  RECEIVED: Payment instruction is received by Track BPS.\n  ACCEPTED: Payment instruction is accepted by BPS based on the Suppliers Payment preferences.\n  APPROVED: Payment instruction is approved by Supplier Payment Agent.\n  DECLINED: Payment instruction is declined by Supplier Payment Agent."
          type: string
          example: APPROVED
        updatedDate:
          description: Last updated date (UTC) on which the purchase request is updated in BPS.
          type: string
          example: '2021-09-08T16:06:11.598505Z'
        transactionIdentification:
          description: Identification of the authorization transaction.
          type: object
          properties:
            approvalCode:
              description: Value assigned by the approval entity indicating approval.
              type: string
              example: SUBMITTED
            retrievalReferenceNumber:
              description: Reference supplied by the system retaining the original source information and used to assist in locating that information or a copy of the information.
              type: string
              example: testRetrievalReferenceNumber
            transactionReference:
              description: Identification of the transaction by the card acceptor. It may appear on the receipt of the cardholder. It remains unchanged throughout the lifetime of the transaction.
              type: string
              example: testTransactionReference
            transactionDateTime:
              description: Local date and time of the transaction assigned by the Point Of Interaction (POI).
              type: string
              example: '2021-08-17T17:37:23.230Z'
        statusReasonInformation:
          description: Identification of the authorization transaction.
          type: object
          properties:
            reasonCode:
              description: Specifies the reason for the status.
              type: string
              example: ALT_MOP_NOT_BPS
            description:
              description: Specifies the description for the status.
              type: string
              example: Does not accepts BPS payment
        errors:
          description: Error Codes
          type: object
          properties:
            reasonCode:
              description: Specifies the reason for the error.
              type: string
              example: parameter.limit.invalid
            description:
              description: Specifies the description for the error.
              type: string
              example: The start parameter is required but was not provided.
    Ica:
      type: string
      minLength: 4
      maxLength: 15
      example: '1111'
      description: A number assigned by Mastercard to a licensed customer to identify the member in transactions. This is used as an identifier for data submitted to ABU.
    SubscriptionInquiry:
      allOf:
      - $ref: '#/components/schemas/CustomerAccount'
      - type: object
    MerchantId:
      type: string
      maxLength: 15
      minLength: 15
      example: '000000000002535'
      description: A merchant ID or payment facilitator ID, previously registered with Mastercard.
    CustomerAccount:
      type: object
      required:
      - requestId
      - customer
      - account
      properties:
        requestId:
          type: string
          maxLength: 64
          minLength: 1
          example: 323e304f-1cfc-4f0d-ac07-e6037ce09925
          description: An identifier established by the customer.
        customer:
          $ref: '#/components/schemas/Customer'
        account:
          $ref: '#/components/schemas/Account'
    OutSubscription:
      allOf:
      - $ref: '#/components/schemas/AccountUpdate'
      - type: object
    Error:
      type: object
      properties:
        Source:
          type: string
          example: Validation
          description: The application name that generated this error. Every error message that is generated and returned by the gateway will have this field equal to Gateway.
          maxLength: 100
          minLength: 1
        ReasonCode:
          type: string
          example: ICA_VALUE_REQUIRED
          description: A unique constant identifying the error case encountered during request processing.
          maxLength: 100
          minLength: 1
        Description:
          type: string
          example: ICA required for ABU client eligibility validation
          description: Short description of the ReasonCode field.
          maxLength: 1000
          minLength: 10
        Recoverable:
          type: boolean
          example: false
          description: Indicates whether this error will always be returned for this request, or retrying could change the outcome.
        Details:
          type: string
          description: (Optional) Where appropriate, indicates detailed information about data received and calculated during request processing, to help the customer with diagnosing errors.
          example: ICA is Mandatory
          maxLength: 5000
          minLength: 0
    Customer:
      description: Representation of a customer
      type: object
      allOf:
      - $ref: '#/components/schemas/BaseCustomer'
      - type: object
        properties:
          subMerchantId:
            $ref: '#/components/schemas/SubMerchantId'
    Account:
      description: Representation of an account
      type: object
      allOf:
      - $ref: '#/components/schemas/BaseAccount'
      - type: object
    Expiry:
      type: string
      maxLength: 4
      minLength: 4
      example: '1228'
      description: The expiration date associated to the account number being inquired upon. Must be in MMYY format.
    AccountUpdate:
      type: object
      properties:
        account:
          $ref: '#/components/schemas/Account'
        responseIndicator:
          $ref: '#/components/schemas/ResponseIndicator'
    SubscriptionDeletion:
      allOf:
      - $ref: '#/components/schemas/CustomerAccount'
      - type: object
    ResponseIndicator:
      type: string
      pattern: ^(VALID|UNKNOWN|NON_PARTICIPATING|CONTACT|EXPIRY|ACCOUNT_UPDATE)
      example: VALID
      description: 'An indicator to help explain the status of the account being inquired on. Possible values are:

        * `VALID` = Matches the account as reported by the issuer.

        * `UNKNOWN` = Account number is not known to ABU or part of a participating BIN (Bank Identification Number) and/or issuer.

        * `NON_PARTICIPATING` = Account number is not known to ABU or part of a non-participating BIN (Bank Identification Number) and/or issuer.

        * `CONTACT` (C) = Contact the issuer.

        * `EXPIRY` (E) = The card inquired on is expired, updated expiry date returned.

        * `ACCOUNT_UPDATE` (A) = The card inquired on is updated, updated card number and expiry date returned.'
    ErrorWrapper:
      type: object
      required:
      - Errors
      properties:
        Errors:
          $ref: '#/components/schemas/Errors'
    OutSubscriptionInquiry:
      type: object
      properties:
        subscribed:
          type: boolean
          example: true
          description: 'Indicate to the ABU Integrator if they are subscribed to the inquired account. account number for a given merchant. *`subscribed: true`: Customer is subscribed. *`subscribed: false`: Customer is not subscribed.'
    SubMerchantId:
      type: string
      maxLength: 15
      minLength: 15
      example: '000000000000001'
      description: An optional identifier for a sub-merchant of a payment facilitators under a registered merchant ID.
    AccountNumber:
      type: string
      maxLength: 19
      minLength: 13
      example: '5573491171027315'
      description: The account number being inquired upon.
    BaseCustomer:
      description: Properties common to all customer
      type: object
      required:
      - ica
      - merchantId
      properties:
        ica:
          $ref: '#/components/schemas/Ica'
        merchantId:
          $ref: '#/components/schemas/MerchantId'
    Errors:
      type: object
      required:
      - Error
      properties:
        Error:
          $ref: '#/components/schemas/ErrorList'
    BaseAccount:
      description: Properties common to all accounts
      type: object
      required:
      - accountNumber
      - expiryDate
      properties:
        accountNumber:
          $ref: '#/components/schemas/AccountNumber'
        expiryDate:
          $ref: '#/components/schemas/Expiry'
    Subscription_2:
      allOf:
      - $ref: '#/components/schemas/CustomerAccount'
      - type: object
    ErrorList:
      type: array
      minItems: 1
      items:
        $ref: '#/components/schemas/Error'
  requestBodies:
    UpdateSubscription:
      description: Subscription
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Subscription'
          examples:
            BPC PAYMENT AUTHORIZATION:
              $ref: '#/components/examples/UpdateBPCAuthorizationSubscription'
            ICCP CLEARING:
              $ref: '#/components/examples/UpdateICCPClearingSubscription'
            ICCP PAYMENT AUTHORIZATION:
              $ref: '#/components/examples/UpdateICCPAuthorizationSubscription'
            BPS PAYMENT UPDATE:
              $ref: '#/components/examples/UpdateBPSPaymentUpdateSubscription'
            ICMP TOKEN LIFECYCLE:
              $ref: '#/components/examples/UpdateICMPLifecycleSubscription'
            ICMP TOKEN PROVISIONING:
              $ref: '#/components/examples/UpdateICMPProvisioningSubscription'
    CreateSubscription:
      description: Subscription
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Subscription'
          examples:
            BPC PAYMENT AUTHORIZATION:
              $ref: '#/components/examples/CreateBPCAuthorizationSubscription'
            ICCP CLEARING:
              $ref: '#/components/examples/CreateICCPClearingSubscription'
            ICCP PAYMENT AUTHORIZATION:
              $ref: '#/components/examples/CreateICCPAuthorizationSubscription'
            BPS PAYMENT UPDATE:
              $ref: '#/components/examples/CreateBPSPaymentUpdateSubscription'
            ICMP TOKEN LIFECYCLE:
              $ref: '#/components/examples/CreateICMPLifecycleSubscription'
            ICMP TOKEN PROVISIONING:
              $ref: '#/components/examples/CreateICMPProvisioningSubscription'
    SubscriptionDeletionRequest:
      description: ABU Integrator sends subscriptionDeletion request to unsubscribe from an account.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SubscriptionDeletion'
    SubscriptionRequest:
      description: ABU Integrator sends subscription request to subscribe to an account.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Subscription_2'
    SubscriptionInquiryRequest:
      description: ABU Integrator subscription request to inquire on a subscription for an account number.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SubscriptionInquiry'
  parameters:
    subscriptionIdParam:
      in: path
      name: id
      description: Subscription ID - Find a Subscription ID by running POST /subscriptions or GET /subscriptions
      schema:
        type: string
      required: true
      example: 0CNSa91bf379b48a593fd17f07f431bad8fb296796498f4e9982ea134394c1fa4f071556724070
    subscriptionsLimitParam:
      in: query
      name: limit
      description: Number of Subscriptions to be returned per page. By Default 25 Subscriptions are returned per page
      schema:
        type: integer
      required: false
      example: 10
    subscriptionsOffsetParam:
      in: query
      name: offset
      description: For pagination of responses - the offset from which to calculate the list of returned subscriptions. Defaults to 0
      schema:
        type: integer
      required: false
      example: 0
    sortParam:
      in: query
      name: sort
      description: Sort the returned subscriptions using the indicated fields and direction. For example, 'name' sorts by name ascending, '-id' sorts by subscription id descending. Defaults to sort by subscription name in ascending order
      schema:
        type: string
      required: false
      example: name

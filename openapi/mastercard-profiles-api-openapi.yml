              $ref: '#/components/examples/ProfileRequest'
      required: true
    UserProfilesRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserProfile'
      required: true
    IdentitySearchRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/IdentitySearch'
      required: true
    IdentityAttributeDeletionsRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/IdentityAttributeDeletions'
      required: true
  parameters:
    UserProfileIdParameter:
      name: user_profile_id
      in: query
      description: UUID identifying the user, which the TP App generates using the MIDS Core SDK.
      example: ee13a7ec-5a5a-4618-a55d-5e1ed016ccd5
      required: true
      schema:
        type: string
        pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$

          description: Error object
          example:
            $ref: '#/components/examples/BadRequestExample'
    Notification:
      type: object
      properties:
        appId:
          type: string
          description: Application identifier for client.
          enum:
          - MFN
          - KUPAA
          example: MFN
          minLength: 3
          maxLength: 15
        partnerId:
          type: string
          minLength: 0
          maxLength: 50
          description: 'Code to identify partner. Eg: school on Kupaa'
          example: '1234'
        providerReference:
          type: string
          description: Unique transaction ID from Payment Provider
          example: ABC123
          minLength: 5
          maxLength: 50
        srcAccount:
          type: string
          description: Payer mobile bank account number
          example: '25471234567'
          minLength: 5
          maxLength: 30
        paymentChannel:
          type: string
          minLength: 1
          maxLength: 30
          description: Depicts mode of payment as mentioned in enum.
          enum:
          - MOBILE
          - BANK
          example: MOBILE
        transactionAmount:
          type: number
          format: double
          description: Transaction amount
          example: 12567.89
        accountId:
          type: string
          minLength: 1
          maxLength: 30
          example: '1234'
          description: Payer's account id
        transactionDate:
          type: string
          minLength: 0
          maxLength: 30
          example: '2020-07-15'
          description: Transaction date in the format 'YYYY-MM-DD'
        narration:
          type: string
          minLength: 0
          maxLength: 500
          description: Description of payment
          example: Payment for XYZ
        accountName:
          type: string
          minLength: 0
          maxLength: 100
          example: Payer Name
          description: Payer Name
        accountNumber:
          type: string
          minLength: 1
          maxLength: 30
          example: '25471234589'
          description: Destination account number
        currency:
          type: string
          example: UGX
          minLength: 3
          maxLength: 3
          description: Alphabetic code of currency as per ISO4217 standard.
        countryCode:
          type: string
          minLength: 3
          maxLength: 3
          example: USA
          description: ISO 3-alpha country code format.
        signature:
          type: string
          minLength: 0
          maxLength: 500
          description: Signature for request
          example: Signature for request
        correlationId:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          description: CorrelationId for request
      title: Notification
      description: notification request
    Error:
      type: object
      properties:
        Source:
          type: string
          minLength: 1
          maxLength: 50
          description: An element used to indicate the source of the issue causing this error.
          example: PAYMENT_SERVICE
        ReasonCode:
          type: string
          minLength: 1
          maxLength: 50
          description: A reason code for the error that has occurred.
          example: BAD_REQUEST
        Description:
          type: string
          minLength: 1
          maxLength: 500
          description: Description of the reason the operation failed.
          example: We couldn't handle your request
        Recoverable:
          type: boolean
          description: Generated by the gateway to indicate if the request could presented again for processing. Either "true" or "false".
          example: true
        Details:
          type: string
          minLength: 1
          maxLength: 500
          description: Identifies the description of the error.
          example: appId should be either MFN or Kupaa
      description: Error Object

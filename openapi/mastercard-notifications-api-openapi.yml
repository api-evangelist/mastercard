  parameters:
    endDateParam:
      name: end
      description: End date and time in UTC of the notifications to retrieve, EXCLUDING the end date-time specified. This field is specified on an 'excluding' basis to allow the same value to be used as a start date-time in a later request without the risk of having overlapping data or gaps in the data
      schema:
        type: string
        format: date-time
      in: query
      required: true
      example: '2019-01-30T10:00:00.000Z'
    pushStatusParam:
      name: push_status
      description: 'Push notification delivery status (Example: FAILED, PENDING, DELIVERED, NOT_APPLICABLE). Allows the client to request a subset of notifications based on their push delivery status, e.g. to request all except those already delivered by the push mechanism'
      schema:
        type: array
        items:
          type: string
      in: query
      required: false
      example:
      - PENDING
      - DELIVERED
    subscriptionNameParam:
      name: subscription_name
      description: Specify a subscription name to return notifications only for that subscription. Provide multiple values separated by commas. Skip this value to return notifications for all subscriptions defined for the subscriber.
      schema:
        type: array
        items:
          type: string
      in: query
      required: false
      example:
      - Unique subscription name
      - Another unique subscription name
    notificationsLimitParam:
      in: query
      name: limit
      description: For pagination - the number of notifications to return in a single response. The default value for limit is 200.
      schema:
        type: integer
      required: false
      example: 200
    notificationsOffsetParam:
      in: query
      name: offset
      description: For pagination - the offset within the current response stream of the notifications to read from
      schema:
        type: integer
      required: false
      example: 0
    subjectNameParam:
      name: subject
      description: 'Subject name for which to return notifications (Example: PAYMENT_AUTHORIZATION, PAYMENT_UPDATE, CLEARING, BPC_PAYMENT_AUTHORIZATION, TOKEN_PROVISIONING_EVENT, TOKEN_LIFECYCLE_EVENT). Specify the subject to return notifications only for a particular event type.'
      schema:
        type: string
      in: query
      required: false
      example: BPC_PAYMENT_AUTHORIZATION
    startDateParam:
      name: start
      description: Start date and time in UTC of the notifications to retrieve, including the start date-time specified
      schema:
        type: string
        format: date-time
      in: query
      required: true
      example: '2019-01-30T09:00:00.000Z'
    PlanNotifCorrelationIdHeaderParameter:
      description: Client correlation id for request tracing.
      in: header
      name: Correlation-Id
      required: true
      schema:
        type: string
        format: uuid
        example: 3d56f5a7-db48-41f0-875e-30920e8465f3
        maxLength: 36
        minLength: 36

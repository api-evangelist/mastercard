          $ref: '#/components/schemas/issuerCid'
        issuerIca:
          $ref: '#/components/schemas/issuerIca'
        merchant:
          $ref: '#/components/schemas/PlanNotifMerchant'
        offerId:
          $ref: '#/components/schemas/PlanNotifOfferIdField'
        planInstallmentInformation:
          $ref: '#/components/schemas/PlanNotifPlanInstallmentInformation'
        schedulePayments:
          $ref: '#/components/schemas/PlanNotifSchedulePayments'
        transaction:
          $ref: '#/components/schemas/PlanNotifTransaction'
        sensitiveData:
          $ref: '#/components/schemas/PlanNotifSensitiveDataField'
        transactionOffers:
          $ref: '#/components/schemas/TransactionOffers'
      required:
      - consumer
      - planId
      - issuerCid
      - issuerIca
      - offerId
      - schedulePayments
      - planInstallmentInformation
      - transaction
    PlanProcessorNotify:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          description: Plan Notification status. Possible values - [ SUCCESS, FAILURE ]
          example: SUCCESS
          maxLength: 12
          minLength: 7
        message:
          type: string
          description: Human readable short description for the notification processing.
          example: Notification Received Successfully
          maxLength: 256
          minLength: 0
    PlanNotifSensitiveDataField:
      title: sensitiveData
      type: object
      description: This object explains the definition of the Highly Sensitive and Special handling data fields, which will be obtained when customers decrypts the 'encryptedValue' field using JWE decryption using Mastercard provided client decryption libraries.
      properties:
        consumer:
          properties:
            primaryAccountNumber:
              type: number
              description: Consumer Credit or Debit card number (PAN) to offer Installments (ISO-DE2). This field will always contain a funding PAN, even if the transaction has been performed using a tokenized PAN.
              maxLength: 19
              minLength: 11
              example: 5110921032063789
      required:
      - consumer
    issuerCid:
      type: string
      description: Customer ID of the Issuer
      maxLength: 10
      example: '202020'
    PlanNotifSchedulePayment:
      type: object
      required:
      - installmentAmount
      - dueDate
      - installmentNumber
      properties:
        installmentAmount:
          type: number
          format: double
          description: Amount to be paid in an installment.
          example: 100
        dueDate:
          type: string
          description: Due date for an installment.
          example: 2024-3-21
          maxLength: 10
          minLength: 8
        installmentNumber:
          type: integer
          format: int32
          description: Number of an installment.
          example: 1
          maximum: 99
          minimum: 1
    PlanNotifErrors:
      type: object
      description: A single error
      properties:
        Description:
          type: string
          description: A description for this specific occurrence corresponding to the ReasonCode
          example: Invalid Format
          maxLength: 500
          minLength: 1
        Details:
          type: string
          description: More details of this specific error. This is an optional field and is sometimes used to give a more comprehensive description of the error that has occurred, when required.
          example: purchaseDate, billingAddress.city
          maxLength: 1000
          minLength: 1
        ReasonCode:
          type: string
          description: A code defining the error, as defined in documentation
          example: VALIDATION_ERROR
          maxLength: 36
          minLength: 1
        Recoverable:
          type: boolean
          description: Whether or not retrying this request could result in a successful response
          example: false
        Source:
          type: string
          description: The source of the problem. i.e where the error occurred
          example: TRA
          maxLength: 15
          minLength: 1
    PlanNotifErrorWrapper:
      type: object
      properties:
        Error:
          type: array
          description: Object that contains the list of errors
          items:
            $ref: '#/components/schemas/PlanNotifErrors'
      required:
      - Error
    PlanNotifPlanIdField:
      type: string
      format: uuid
      description: A unique number assigned to an installment plan
      example: 3d56f5a7-db48-41f0-875e-30920e8465f3
      maxLength: 36
      minLength: 36
    PlanNotifOfferIdField:
      type: string
      description: Unique identifier for installment offers.
      example: '24092019'
      maxLength: 64
      minLength: 8
    issuerIca:
      type: string
      description: ICA of the Issuer
      maxLength: 11
      example: '7432'
    TransactionOffer:
      type: object
      properties:
        offerId:
          type: string
          description: unique identifier for installment offers.
          example: '24092019'
          maxLength: 64
          minLength: 8
      required:
      - offerId
    Errors:
      type: array
      minItems: 1
      items:
        $ref: '#/components/schemas/Error'
      description: Errors list
      example:
        $ref: '#/components/examples/BadRequestExample'
    ErrorWrapper:
      type: object
      required:
      - Errors
      properties:
        Errors:

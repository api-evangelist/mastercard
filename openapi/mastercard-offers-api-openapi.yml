          feeDistribution: FRST_INSTL
          offerBeginDatetime: '2023-01-01T00:00:00-05:00'
          offerEndDatetime: '2025-12-31T23:59:59-05:00'
          provider:
            providerId: 29694e7a-b4a8-11ec-b909-0242ac120002
            cid: 244425
            providerName: Mastercard - Operations & Technology - BizOps
            providerLogoUrl: https://mtf.installments.mastercard.com/mtf/Mast_2d5f306e-78d3-483a-a5c9-8343171e75de.png
            disclosure: Offer only qualify for a payment as low as $50.00 up to $600.00.
          schedulePayments:
          - installmentNumber: 1
            installmentAmount: 110.42
            dueDate: '2023-10-26'
          - installmentNumber: 2
            installmentAmount: 100.32
            dueDate: '2023-11-02'
          - installmentNumber: 3
            installmentAmount: 100.32
            dueDate: '2023-11-09'
          - installmentNumber: 4
            installmentAmount: 100.32
            dueDate: '2023-11-16'
    Forbidden:
      description: Forbidden to access the resource.
      value:
        Errors:
          Error:
          - Source: mci-installments-offers-eligibilities-api
            ReasonCode: forbidden
            Description: Forbidden to access the resource.
            Recoverable: false
            Details: ''
    CardedInstallmentsOffersRequestPlain:
      description: Typical Offer request for 'Mastercard Installments Payment Services with plain payload. Please note that the client needs to encrypt sensitiveData field using Mastercard provided JWE encryption libraries before calling the API. Refer to the example, Carded Installments Offers Request Encrypted (only for Reference), to understand how the resulting payload should look like after performing encryption.
      value:
        transaction:
          amount: 400
          currency: USD
          localDateTime: '2023-10-26T00:00:00Z'
        merchant:
          name: Globex Decor
          country: USA
          mcc: '1711'
          url: www.globexdecor.com
          acquirerId: '234353'
          merchantId: '121234'
        sensitiveData:
          consumer:
            primaryAccountNumber: '5110921032063789'
    InvalidMerchantId:
      description: Merchant Id in request is invalid.
      value:
        Errors:
          Error:
          - Source: mci-installments-offers-eligibilities-api
            ReasonCode: merchant.merchantId
            Description: size must be between 1 and 15
            Recoverable: false
            Details: ''
    InvalidMerchantURL:
      description: Merchant URL in request is invalid.
      value:
        Errors:
          Error:
          - Source: mci-installments-offers-eligibilities-api
            ReasonCode: merchant.url
            Description: size must be between 1 and 50
            Recoverable: false
            Details: ''
    InvalidContentType:
      description: Content-Type header is null or invalid.
      value:
        Errors:

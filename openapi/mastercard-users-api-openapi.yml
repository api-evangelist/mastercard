          description: User's first name.
          example: John
        lastName:
          maxLength: 25
          minLength: 0
          type: string
          description: User's last name.
          example: Smith
        motherMaidenName:
          maxLength: 30
          minLength: 0
          type: string
          description: User's mother's maiden name. This field should be provided if Mother's Maiden  Name will be used as a security data point.
          example: Jennifer
        birthDate:
          maxLength: 10
          minLength: 0
          pattern: ^\d{4}\-(0[1-9]|1[012])\-(0[1-9]|[12][0-9]|3[01])$
          type: string
          description: User's date of birth. This field should be provided if Date of Birth will be  used as a security data point.
          example: '1975-03-10'
          format: date
        nationalIdentifier:
          maxLength: 11
          minLength: 0
          type: string
          description: User's unique identifier assigned by the national or government system. For example, passport number or tax identification number.
          example: 324-56-7574
        businessPhoneNumber:
          maxLength: 25
          minLength: 0
          type: string
          description: User's unformatted business phone number. Provide an unformatted  phone number, except for a leading "+" if including a country code.
          example: '+11234567890'
        mobilePhoneNumber:
          maxLength: 25
          minLength: 0
          type: string
          description: User's unformatted mobile phone number. Provide an  unformatted phone number, except for a leading "+" if including a country code.
          example: '+11234567890'
        homePhoneNumber:
          type: string
          description: User's unformatted home phone number. Provide an unformatted phone number,  except for a leading "+" if including a country code.
          example: '+11234567890'
        faxPhoneNumber:
          type: string
          description: Valid fax phone number used by the user.
          example: +1(0)1234567891
        emailAddress:
          maxLength: 120
          minLength: 0
          type: string
          description: User's email address.
          example: john.smith@mastercard.com
        vip:
          type: boolean
          description: Used to assign VIP status to a user. The default value is false.
          example: true
        employee:
          type: boolean
          description: Used to assign Employee status to a user. The default value is false.
          example: false
        acceptEmails:
          type: boolean
          description: Specifies if the user allows contact via email for promotional purposes.  The default value is false.
          example: false
        acceptSms:
          type: boolean
          description: Specifies if the user allows contact to their mobile phone for promotional  purposes. The default value is false.
          example: false
        acceptPromotionalInfo:
          type: boolean
          description: Specifies if the user is interested in receiving promotional information.  The default value is false.
          example: false
        genericIdentification:
          maxLength: 15

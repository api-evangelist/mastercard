      required: true
      schema:
        type: string
      example: '268810378058708149455458707247'
    VerifyUsersIdType:
      name: user_id_type
      in: query
      description: Determines the type of user or account identification. Supported identifiers are RANAC or RANCU.
      required: true
      schema:
        type: string

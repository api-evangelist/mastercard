          description: The Merchant Id
          example: '123456789012345'
        acquirerId:
          minLength: 1
          maxLength: 10
          pattern: .*\S.*
          type: string
          description: The Acquiring Institution ID Code which identifies the acquiring institution (for example, merchant bank) or its agent
          example: '123456'
        negate:
          type: boolean
          description: Defines if the rules should be negated
          example: false
      description: The Merchant ID control provides the ability to limit authorizations to particular merchants
    ResourceIdentifier:
      description: A UUID which uniquely identifies a resource
      type: string
      format: uuid
      example: c63de020-a446-11eb-bcbc-0242ac130002
    ValidityPeriodControl:
      required:
      - from
      - negate
      - to
      type: object
      properties:
        from:
          type: string
          format: date-time
          description: The start date from which the control is valid, in ISO 8601 extended format "YYYY-MM-DDThh:mm:ss[.sss]Z", where [.sss] is optional and can be 1 to 3 digits
          example: '2020-10-26T00:00:00Z'
        to:
          type: string
          format: date-time
          description: The end date till which the control is valid, in ISO 8601 extended format "YYYY-MM-DDThh:mm:ss[.sss]Z", where [.sss] is optional and can be 1 to 3 digits
          example: '2020-11-06T23:59:59Z'
        strictPreAuthCheck:
          type: boolean
          description: Defines if strict pre-auth check needs to be applied
          default: false
          example: true
        negate:
          type: boolean
          description: Defines if the rules should be negated
          example: false
      description: The ValidityPeriod control provides the ability to limit authorization activity to a defined time period
    MccControl:
      required:
      - mccs
      - negate
      type: object
      properties:
        negate:
          type: boolean
          description: Defines if the rules should be negated
          example: false
        mccs:
          minItems: 1
          type: array
          description: List of merchant category codes
          example:
          - '1234'
          - '5678'
          items:
            type: string
            example: '1234'
          uniqueItems: true
      description: The Card Acceptor Business Codes (MCC) control can control the type of purchases for which a card is used
    Controls:
      type: array
      description: In Control Card Controls
      items:
        $ref: '#/components/schemas/Control'
    UserDetail:
      type: object
      required:
      - firstName
      - lastName
      - phone
      - email
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          pattern: .*\S.*
          description: First Name of User
          example: Emerson
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          pattern: .*\S.*
          description: Last Name of User
          example: Bloggs
        phone:
          type: string
          minLength: 4
          maxLength: 16
          description: Phone number of User
          example: '+12345678910111'
        email:
          type: string
          minLength: 1
          maxLength: 300
          description: Email address of User
          example: emersonbloggs@gmail.com
    Card:
      type: object
      required:
      - accountNumber
      - expiry
      properties:
        accountNumber:
          type: string
          minLength: 12
          maxLength: 19
          pattern: ^[0-9]+
          example: '1234567891234567'
          description: Card Account Number
        expiry:
          minLength: 7
          maxLength: 7
          type: string
          pattern: ^20[2-9][0-9]-(0[1-9]|1[012])$
          description: Card expiry date in yyyy-MM format
          example: 2021-11
    ErrorWrapper:
      type: object
      required:
      - Errors
      properties:
        Errors:
          $ref: '#/components/schemas/Errors'
    AgeingVelocityControl:
      required:
      - authorizationHoldDays
      - cumulativeLimit
      - timeZone
      - negate
      type: object
      properties:
        authorizationHoldDays:
          type: integer
          minimum: 0
          maximum: 9999
          description: Number of days an authorization holds before ageing off
          format: int32
          example: 1234
        cumulativeLimit:
          minimum: 0
          type: number
          description: Maximum allowed cumulative amount
          example: 1000
          format: float
        timeZone:
          type: string
          description: Time zone that is used for age-off calculations
          example: UTC-06:00
        availableBalance:
          minimum: 0
          type: number
          description: The cumulative spend available for the velocity control for the specified period
          example: 1000
          format: float
        currencyType:
          minLength: 4
          maxLength: 8
          type: string
          description: Type of the currency being used. Valid values are BASE and MERCHANT
          example: MERCHANT
          pattern: ^(BASE|MERCHANT)
        currencyCode:
          minLength: 3
          maxLength: 3
          pattern: ^[0-9]{3}$
          type: string
          description: Mastercard supported International Organization for Standardization (ISO) 4217 currency codes
          example: '825'
        negate:
          type: boolean
          description: Defines if the rules should be negated
          example: false
      description: The AgingVelocityControl provides the requester with the ability to set a notional credit line through the CumulativeControl. This control keeps track of the current remaining available credit and approves a transaction only if the requested amount is less than or equal to the remaining available credit
    AmountRangeControl:
      required:
      - currencyType
      - maxAmount
      - minAmount
      - negate
      type: object
      properties:
        minAmount:
          minimum: 0
          type: number
          description: Minimum allowed amount
          format: float
          example: 1000
        maxAmount:
          minimum: 0
          type: number
          description: Maximum allowed amount
          format: float
          example: 10000
        strictPreAuthCheck:
          type: boolean
          description: Defines if strict pre-auth check needs to be applied
          default: false
          example: true
        currencyType:
          minLength: 4
          maxLength: 8
          type: string
          description: Type of the currency being used. Valid values are BASE and MERCHANT
          example: MERCHANT
          pattern: ^(BASE|MERCHANT)
        currencyCode:
          minLength: 3
          maxLength: 3
          pattern: ^[0-9]{3}$
          type: string
          description: Mastercard supported International Organization for Standardization (ISO) 4217 currency codes
          example: '825'
        negate:
          type: boolean
          description: Defines if the rules should be negated
          example: false
      description: The exact amount range control will approve a transaction only if the requested amount is equal or greater than MinAmount and less than or equal to MaxAmount. In other words, if Min Amount <= Amount <= Max Amount
    VcnUserDetail:
      type: object
      required:
      - firstName
      - lastName
      - phone
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          description: First Name of User
          example: Emerson
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          description: Last Name of User
          example: Bloggs
        phone:
          type: string
          minLength: 4
          maxLength: 16
          description: Phone number of User
          example: '+13556434378'
    UpdateVCN:
      type: object
      properties:
        expiry:
          minLength: 7
          maxLength: 7
          type: string
          pattern: ^20[2-9][0-9]-(0[1-9]|1[012])$
          description: Expiry date in yyyy-MM format
          example: 2021-11
        description:
          type: string
          example: This is the description of what the VCN will be used for
          description: The description of what the VCN will be used for
    TokenUpdate:
      allOf:
      - $ref: '#/components/schemas/Card'
      properties:
        status:
          type: string
          pattern: ^(ACTIVE|SUSPENDED)$
          description: Token Status. Valid values are ACTIVE and SUSPENDED
          example: ACTIVE
    TimeOfDayControl:
      required:
      - negate
      - timeZone
      - times
      type: object
      properties:
        times:
          maxItems: 7
          minItems: 1
          type: array
          description: Times of day
          items:
            $ref: '#/components/schemas/TimeOfDay'
        timeZone:
          type: string
          description: Time zone of the from and to times
          example: UTC
        negate:
          type: boolean
          description: Defines if the rules should be negated
          example: false
      description: The TimeOfDayControl provides the ability to limit authorization activity to defined time periods for each day
    Errors:
      type: object
      required:
      - Error
      properties:
        Error:
          $ref: '#/components/schemas/ErrorList'
    Control:
      type: object
      required:
      - action
      - alias
      description: In Control Rule
      properties:
        action:
          minLength: 1
          maxLength: 1
          type: string
          description: control rule actions. Valid values are A (Approve), D (Decline), W (Warn), P (Promo) and F (Forced)
          example: A
        alias:
          type: string
          description: control rule alias name. alias should be unique
          maxLength: 100
          minLength: 1
          pattern: .*\S.*
          example: DAILY LIMIT
        transactionLimits:
          type: array
          description: transaction limit controls provides the ability to limit individual transaction authorizations to a maximum amount
          uniqueItems: true
          items:
            $ref: '#/components/schemas/TransactionLimitControl'
        geographies:
          type: array
          description: geography controls provides the ability to control where a card is physically used
          uniqueItems: true
          items:
            $ref: '#/components/schemas/GeographyControl'
        velocities:
          type: array
          description: velocity controls can limit the frequency, and the total cumulative amount of authorizations performed on the cardholders account within a specified time period
          items:
            $ref: '#/components/schemas/VelocityControl'
        validityPeriods:
          type: array
          description: validity period controls
          items:
            $ref: '#/components/schemas/ValidityPeriodControl'
        amountRanges:
          type: array
          description: amount range controls
          items:
            $ref: '#/components/schemas/AmountRangeControl'
        merchantIds:
          type: array
          description: merchant id controls
          uniqueItems: true
          items:
            $ref: '#/components/schemas/MerchantIdControl'
        ageingVelocities:
          type: array
          description: ageing velocity controls
          items:
            $ref: '#/components/schemas/AgeingVelocityControl'
        curfews:
          type: array
          description: curfew controls allows you to limit authorization activity on a card to a certain time period during set days. You can also set the time zone for this control
          items:
            $ref: '#/components/schemas/CurfewControl'
        timeOfDays:
          type: array
          description: time of day controls provides the ability to limit authorization activity to defined time periods for each day
          items:
            $ref: '#/components/schemas/TimeOfDayControl'
        merchantCategories:
          type: array
          description: merchant category controls
          uniqueItems: true
          items:
            $ref: '#/components/schemas/MccControl'
    GeographyControl:
      required:
      - countryCodes
      - negate
      type: object
      properties:
        countryCodes:
          minItems: 1
          type: array
          description: Country codes to be included in the rule
          items:
            type: string
          example:
          - '840'
        negate:
          type: boolean
          description: Defines if the rules should be negated
          example: false
      description: The GeographicControl provides the ability to control where a card is physically used
    ErrorList:
      type: array
      minItems: 1
      items:
        $ref: '#/components/schemas/Error'
    TimeOfDay:
      required:
      - day
      - fromTime
      - toTime
      type: object
      properties:
        day:
          minLength: 6
          maxLength: 9
          type: string
          example: SUNDAY
          description: Days of week. Valid values are SUNDAY, MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, and SATURDAY
          pattern: ^(SUNDAY|MONDAY|TUESDAY|WEDNESDAY|THURSDAY|FRIDAY|SATURDAY)
        fromTime:
          minLength: 5
          maxLength: 5
          pattern: ^([01][0-9]|2[0-3]):([0-5][0-9])$
          type: string
          description: The start time from which authorizations will be allowed
          example: 08:21
        toTime:
          minLength: 5
          maxLength: 5
          pattern: ^([01][0-9]|2[0-3]):([0-5][0-9])$
          type: string
          description: The end time from which authorizations will be allowed
          example: '12:00'
    VerifiedUser:
      type: object
      properties:
        message:
          type: string
          description: result
          example: Successfully verified user
    EnrolledUser:
      type: object
      properties:
        userId:
          type: string
          description: Unique identifier of the user.
          example: '282947573008198049562610279575'
        userIdType:
          type: string
          description: Identifier type for the given user.
          example: RANCU
        accountId:
          type: string
          description: The unique identifier for the given account.
          example: '609330255453162553303101469598'
        accountIdType:
          type: string
          description: Identifier type for the given account.
          example: RANAC
    AccountBase:
      required:
      - accountId
      - accountIdType
      - productCode
      - programIdentifier
      - status
      type: object
      description: This object will define the users initial account that is being enrolled  at the same time as the user.
      properties:
        accountId:
          maxLength: 30
          minLength: 0
          type: string
          description: The unique identifier for the given account.
          example: '5330333671236516'
        accountIdType:
          type: string
          description: Identifier type for the given account. Supported identifier is BAN.
          example: BAN
        status:
          type: string
          description: Status of the user's account. Valid values are GOOD_STANDING and NEW.
          example: NEW
          enum:
          - NEW
          - GOOD_STANDING
        productCode:
          maxLength: 20
          minLength: 0
          type: string
          description: The account's associated reward product identifier as defined by the client and configured during the implementation of the program.
          example: FIDOCASHBACK
        programIdentifier:
          maxLength: 40
          minLength: 0
          type: string
          description: Program identifier for the program in which the cardholder is enrolled. Program ID is created by Mastercard Rewards System.
          example: PGM42051
        openDate:
          maxLength: 10
          minLength: 0
          pattern: ^\d{4}\-(0[1-9]|1[012])\-(0[1-9]|[12][0-9]|3[01])$
          type: string
          description: The date of account opening as defined by the client.
          example: '2014-12-31'
          format: date
        enrollmentDate:
          maxLength: 10
          minLength: 0
          pattern: ^\d{4}\-(0[1-9]|1[012])\-(0[1-9]|[12][0-9]|3[01])$
          type: string
          description: The date for when the account becomes eligible for the rewards program. If undefined, the enrollment date defaults to the date when Mastercard processes the enrollment.
          example: '2018-03-10'
          format: date
        accruePoints:
          type: boolean
          description: This specifies if the account can accrue points. It is used in conjunction with Account Status to define earn and burn behavior for the account.
          example: false
        householdToken:
          type: string
          description: This field ties together multiple user accounts into one household. This value is typically assigned by the Client. To use this field, a rewards program must be configured to support the Token or Bank Customer Number householding scheme.
          example: '254235'
        primaryAccount:
          type: boolean
          description: Identifies if the account is primary for the User. A User may only have 1 primary account. In situations where householding is used, there may only be 1 primary account in the household, regardless of how many User accounts make up that household. A value of true indicates that the account is primary for the User or the household.
          example: false
        userDefined1:
          maxLength: 40
          minLength: 0
          type: string
          description: User Defined Field 1
          example: UDF 1 Example
        userDefined2:
          maxLength: 40
          minLength: 0
          type: string
          description: User Defined Field 2
          example: UDF 2 Example
        userDefined3:
          maxLength: 40
          minLength: 0
          type: string
          description: User Defined Field 3
          example: UDF 3 Example
        userDefined4:
          maxLength: 40
          minLength: 0
          type: string
          description: User Defined Field 4
          example: UDF 4 Example
        userDefined5:
          maxLength: 20
          minLength: 0
          type: string
          description: User Defined Field 5
          example: UDF 5 Example
        userDefined6:
          maxLength: 20
          minLength: 0
          type: string
          description: User Defined Field 6
          example: UDF 6 Example
        userDefined7:
          maxLength: 20
          minLength: 0
          type: string
          description: User Defined Field 7
          example: UDF 7 Example
        userDefined8:
          maxLength: 20
          minLength: 0
          type: string
          description: User Defined Field 8
          example: UDF 8 Example
        externalAccountId:
          maxLength: 10
          minLength: 0
          type: string
          description: Used for On-Soil customers when optional fields are turned on in the rewards system.
          example: '2222332322'
        cycleId:
          type: integer
          description: Bank cycle number that the cardholder/primary cardholder is assigned to.
          format: int64
          example: 1
        cycled:
          type: boolean
          description: Flag to indicate whether a Rewards account has been cycled.
          example: false
        accountReferenceCode:
          maxLength: 50
          minLength: 0
          type: string
          description: Unique identifier the membership uses to identify an account.
          example: 123456abcdef123456abcdef123456abcdef0
        pcloAccountStatusCode:
          type: string
          description: Status of the user's account. Valid values are GOOD_STANDING, REDEEM_ONLY, NEW, ON_HOLD, CANCELLED, INACTIVE.
          example: NEW
          enum:
          - NEW
          - GOOD_STANDING
          - REDEEM_ONLY
          - CANCELLED
          - ON_HOLD
          - INACTIVE
    UserUpdate:
      required:
      - userId
      - userIdType
      type: object
      properties:
        userId:
          maxLength: 30
          minLength: 0
          type: string
          description: Unique identifier for the user.
          example: '268810378058708149455458707247'
        userIdType:
          type: string
          description: Identifier type of the User. The value of RANCU or RANAC should be used for this field.
          example: RANCU
        firstName:
          maxLength: 25
          minLength: 0
          type: string
          description: User's first name.
          example: John
        lastName:
          maxLength: 25
          minLength: 0
          type: string
          description: User's last name.
          example: Smith
        motherMaidenName:
          maxLength: 30
          minLength: 0
          type: string
          description: User's mother's maiden name.
          example: Jennifer
        birthDate:
          maxLength: 10
          minLength: 0
          pattern: ^\d{4}\-(0[1-9]|1[012])\-(0[1-9]|[12][0-9]|3[01])$
          type: string
          description: User's date of birth.
          example: '1975-03-11'
          format: date
        nationalIdentifier:
          maxLength: 11
          minLength: 0
          type: string
          description: The user's unique identifier is assigned by the national or government system. For example, passport number or tax identification number.
          example: 324-56-7574
        businessPhoneNumber:
          maxLength: 25
          minLength: 0
          type: string
          description: User's unformatted business phone number. Provide an unformatted phone number,  except for a leading "+" if including a country code.
          example: '+11234567890'
        mobilePhoneNumber:
          maxLength: 25
          minLength: 0
          type: string
          description: User's unformatted mobile phone number. Provide an unformatted phone number,  except for a leading "+" if including a country code.
          example: '+11234567890'
        emailAddress:
          maxLength: 120
          minLength: 0
          type: string
          description: User's email address.
          example: john.smith@mastercard.com
        vip:
          type: boolean
          description: Used to assign VIP status to a user. The default value is false.
          example: true
        employee:
          type: boolean
          description: Used to assign Employee status to a user. The default value is false.
          example: false
        acceptTracking:
          type: boolean
          description: This field is to document if the user has agreed to their activity being tracked on  a customer or partner-hosted experience.
          example: true
        managePromotionalEmail:
          type: boolean
          description: Specifies if the Promotional E-Mail contact preference on record is being managed by the user, instead of the issuer. True indicates  that promotional participation is managed by the user.
          example: true
        managePromotionalParticipation:
          type: boolean
          description: Specifies if the Promotional participation preference on record is being  managed by the user, instead of the issuer. True indicates that  promotional participation is managed by the user.
          example: true
        managePromotionalSMS:
          type: boolean
          description: Specifies if the Promotional SMS contact preference on record is being  managed by the user, instead of the issuer. True indicates that promotional  participation is managed by the user.
          example: true
        authorizedUser1:
          maxLength: 80
          type: string
          description: This is the first person authorized to access a user's rewards account(s). Authorized users only  apply to designating a person that can call into the Rewards Call Center and be serviced. This  Authorized user must still provide valid answers to the user's security questions.
          example: testUser1
        authorizedUser2:
          maxLength: 80
          type: string
          description: This is the second person authorized to access a user's rewards account(s). Authorized users only  apply to designating a person that can call into the Rewards Call Center and be serviced. This  Authorized user must still provide valid answers to the user's security questions.
          example: testUser2
        comments:
          maxLength: 200
          type: string
          description: Used to keep comments on updated accounts.
          example: Account closed due to fraud.
        customerReplaced:
          type: boolean
          description: Indicates that the Customer was replaced.
          example: true
        manageEmail:
          type: boolean
          description: Specifies if the email address on record is being managed by the user, instead of the issuer.  True indicates that the email address is managed by the user.
          example: true
        faxPhoneNumber:
          maxLength: 25
          type: string
          description: User's unformatted fax phone number. Provide an unformatted phone number, except for a leading  "+" if including a country code.
          example: '+11234567890'
        genderCode:
          type: string
          description: 'The ISO code is used to specify the gender of the customer.

            Valid values for ISO 5218 standard:


            �    NULL - not known


            �    0 - not known


            �    1 - male


            �    2 - female


            �    9 - not applicable'
          example: '0'
        homePhoneNumber:
          maxLength: 25
          type: string
          description: User's unformatted home phone number. Provide an unformatted phone number, except for a  leading "+" if including a country code.
          example: '384579387593'
        middleName:
          maxLength: 25
          type: string
          description: Middle name of the primary cardholder.
          example: test middle name
        manageMobilePhone:
          type: boolean
          description: Specifies if the mobile phone on record is being managed by the user, instead of the issuer.  True indicates that the mobile phone is managed by the user.
          example: true
        namePrefix:
          maxLength: 4
          type: string
          description: Name prefix (Mr., Ms., etc) of the primary cardholder.
          example: Mr
        nameSuffix:
          maxLength: 4
          type: string
          description: Name suffix (Jr., PhD., etc) of the primary cardholder.
          example: Jr
        preferredLanguage:
          type: string
          description: A code name for a global area or language combination. This is the language the cardholder wants  to do business in. The ISO Language Code and ISO Country Code (separated by an underscore) will  specify the default language for the user. ISO Language Code is 2-characters and lowercase. ISO  Country Code is 2-characters and uppercase. For example, if the user spoke US English, the value  for this field would be en_US.
          example: en_US
        programPreview:
          type: boolean
          description: Determines if the card is being used for program preview. Triggers the Internet Redemptions website to ask for preview date and language.
          example: true
        segmentationCluster:
          maxLength: 50
          type: string
          description: The field stores proprietary segmentation cluster information for the purpose of segmenting users as determined by the customer.
          example: Ruby
        genericIdentification:
          maxLength: 15
          minLength: 0
          type: string
          description: Answer to the user's bank-provided custom verification question. Can be used as a Security Question data point by the Internet Redemptions website, Customer Service, or web services.
          example: Duster
        genericIdentificationDescription:
          maxLength: 25
          minLength: 0
          type: string
          description: The descriptive label for the user's bank-provided custom verification question. Can be used as a Security Question data point by the Internet Redemptions website, Customer Service, or web services.
          example: Pet's name
        userDefined1:
          maxLength: 40
          minLength: 0
          type: string
          description: User Defined Fields can be used to store partner-specific data that can be  used for promotions and other business rules.
          example: UDF 1 Example
        userDefined2:
          maxLength: 40
          minLength: 0
          type: string
          description: User Defined Field 2
          example: UDF 2 Example
        userDefined3:
          maxLength: 40
          minLength: 0
          type: string
          description: User Defined Field 3
          example: UDF 3 Example
        userDefined4:
          maxLength: 40
          minLength: 0
          type: string
          description: User Defined Field 4
          example: UDF 4 Example
        acceptEmails:
          type: boolean
          description: Specifies if the user allows contact via email for promotional purposes.  The default value is false.
          example: false
        acceptSms:
          type: boolean
          description: Specifies if the user allows contact to their mobile phone for promotional  purposes. The default value is false.
          example: false
        acceptPromotionalInfo:
          type: boolean
          description: Specifies if the user is interested in receiving promotional information.  The default value is false.
          example: false
        pcloUser:
          $ref: '#/components/schemas/PCLOUser'
        address:
          $ref: '#/components/schemas/UserAddress'
    PCLOUser:
      type: object
      description: This object should only be used by Personal Card Linked Offers (PCLO) users. This object  will define the users communications preferences for PCLO.
      properties:
        pcloAcceptPromotionalOffers:
          type: boolean
          description: Specifies if the PCLO user would like to receive information about special promotional offers.
          example: false
        pcloAcceptEmails:
          type: boolean
          description: Specifies if the PCLO user allows contact via email for promotional purposes.
          example: false
        pcloAcceptSms:

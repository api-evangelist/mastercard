    UserEnroll:
      required:
      - account
      - companyIca
      - userId
      - userIdType
      type: object
      properties:
        companyIca:
          type: integer
          description: Interbank Card Association number assigned by Mastercard to the financial institution or partner. This is typically a 4-6 digit value.
          format: int64
          example: 9989
        userId:
          maxLength: 30
          minLength: 0
          type: string
          description: Unique identifier for the user.  This is typically referred to as the Bank  Customer Number (BCN).
          example: '5600000000000003000'
        userIdType:
          type: string
          description: Identifier type for the given user. Supported identifier is BCN.
          example: BCN
        firstName:
          maxLength: 25
          minLength: 0

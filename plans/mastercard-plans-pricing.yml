        name: annual
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Negotiated contracts
      - name: Volume discounts
      - name: Service-level agreements
      - name: Dedicated account team
      - name: 'Partner program: https://developer.mastercard.com/'

description: Mastercard does not publish public API pricing. Access is via partner/B2B contracts negotiated
  through the provider's enterprise sales team. Mastercard Developer APIs (Open Banking, Payments, Identity)
  require commercial agreements; pricing varies by API and use case.
sources:
